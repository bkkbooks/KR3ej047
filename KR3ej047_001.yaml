body:
  text: 卷之一麻疹骨髓賦增樸麻雖胎毒多帶時行氣候暄熱常令男女傳染而成其發也與痘相似其變也比痘非輕愚夫愚婦每視為泛常若死若生總歸於天命不知先起於陽後歸於陰毒興於脾熱流於心臟腑之傷肺則尤甚始終之變腎則無證若得治法方稱醫聖閉門問途不知途中尋徑揚湯止沸莫若釜底抽薪朱曰抉出脾心肺三經俾治者知所注意初則發熱有類傷寒眼胞腫而淚不止鼻噴嚏而涕不幹咳嗽少食作渴發煩以火照之隱隱於皮膚之內以手摸之磊磊乎肌肉之間其形似疥其色若丹出現三日漸收為安隨出隨收喘急相干無咳無汗隱伏之端根窠若腫兮麻而兼癮皮膚如赤兮疹尤夾斑似錦而明兮不藥而愈如煤之黑兮百無一痊此麻疹之順逆須臨症以詳觀朱曰自初發熱至色若丹是歷歷指出外證麻毒最重治法不同微汗常出熱勢越而不留二便清調邪氣行而無壅腠理拂鬱兮即當發散臟腑秘結兮急與疏通雖衄不必憂邪從衄解自利勿遽止毒以利松麻後變痢兮熱毒移於大腸咳嗽咽痛兮痰氣滯乎心胸口渴心煩法在生津養血飲食減少治須調胃和中餘證無常臨期變通且如出之太遲發表為貴出之太甚解毒最宜毋伐天和必先歲氣寒風凜凜毒氣鬱而不行赤日炎炎邪氣乖而作癘或施溫補勿助其邪若用寒涼休犯其胃制其過但取其平誅其暴必欲其正遠寒遠熱陰陽之勝負不齊責實責虛人品之強弱或異此乃麻之大旨醫家須當熟記至於藥性更宜洞悉防風荊芥散腠理之寒邪紫蘇葛根解營衛之蘊熱蘇子擅下氣之能前胡有疏表之力款冬消痰止嗽紫菀通肺開結石斛行血中之滯氣而用樗根治麻後之白痢而設蔥白上升而發散肺胃萊菔治氣可推牆倒壁竹茹可止吐嘔柿蒂專療呃逆芥子降氣生地涼血黃連入心而瀉火黃芩入肺定喘急元參石膏治邪火之浮游梔子連翹開惡毒之拂鬱栝蔞潤肺止渴須合麥冬知母降火生津必同黃柏麻仁性能滋潤花粉用以解渴芍藥住腹痛勿施於未收之前白朮止脾泄只用在收盡之日欲行滯兮須青皮枳殼而同檳榔要分利兮用赤苓車前而共滑石尿若澀兮利以豬苓木通咽常痛兮治以大青惡實元胡活血止痛蒲黃逐瘀生血丹皮破積生新而引血歸經紫草利腸涼血而療疹紫黑茅根止吐衄降除伏火紅花解麻毒而散腫赤咽喉若閉兮射干助以豆根牙齒生疳兮文蛤配乎溺白心神驚恐兮鎮以辰砂臟腑閉結兮利以大黃葶藶杏仁治喘氣之吤吤薄荷竹葉解膚熱之烊烊火燒人屎蜜炒麻黃發斑毒之出現令邪氣之舒張枳實山楂助脾胃而化毒兜鈴骨皮清肺熱以回瘡既識藥性用亦有時未透表則前胡葛根荊芥防風必用而已透當除若已出則黃芩黃連梔仁黃柏宜使而初潮勿施便閉以丑牛易大黃免寒胃府喘急用葶藶棄升麻怕增吼嘶麻色焦枯生地歸尾為要味症逢紫黑紅花紫草正相資此用藥之元機則當擴而充之用藥知時治有成方初熱欲出未出際宜用宣毒發表湯見第五條除升麻桔梗甘草劑已出紅腫太甚者當施化毒清表湯見十六條除桔梗甘草證輕者用瀉白散見五十條除甘草合乎消毒飲見二十二條除甘草子毒重者古方黃連解毒渴見三十五條大青湯方見三十五條除甘草與啜嘗若有泄瀉用導赤散見二十六條除甘草以分利如遇嘔吐命竹茹場見五十九條除山楂肉而相將庸工渾使苦寒辛熱之品名師不蹈誅伐無過之殃遵此秘旨無偏涼誤熱之咎守而勿失致起死回生之祥特舉一隅約法三章朱曰石斛甘治胃中虛熱咸能益腎用涼用散全在已透表未透表審證清楚麻疹既出調理甚難坐臥欲暖飲食宜淡風寒若受兮為腫為熱酸鹹不禁分為咳為喘異氣縱威變證宜參便多膿血兮倉廩夾熱咳多痰沫兮華蓋傷寒口爛唇裂心脾之邪火未退毛焦發枯營衛之津液將干苟不明乎是證何以見其折肱治此變證各有奇方身熱不除生地骨皮湯見三十條除甘草合四物湯見二十五條口瘡苦甚秘本洗心散見八十條除麻黃對三黃丸見四十八條消腫定喘兮葶藶丸見五十條除丑牛取效化痰行氣兮加味二陳湯見六十條除半夏甘草為良咳嗽氣急除熱清肺湯見五十條除赤芍甘草解除肺熱而有驗喉痛唇爛敗毒散除柴胡白芍甘草桔梗清胃利咽而消殃氣血已虛八珍湯見九十九條增減而可飲水穀不納石斛清胃散見五十九條除赤芍甘草以堪嘗利血兮清熱導滯湯見七十二條除白芍楂肉厚朴甘草加桃仁而增紅花咳血兮元參解毒散去甘草桔梗粉葛加桑皮貝母黃連加茅根而倍地黃此治麻之大略繼各條而再詳大抵麻屬心火必須解毒清涼敗毒散治麻後口瘡唇爛咽喉疼痛射干天花粉連翹牛蒡子石膏生地黃黃芩黃柏元參淡竹葉犀角磨汁金銀花丹皮薄荷柴胡白芍桔梗甘草燈心引水煎服元參解毒散治衄血失血元參黃芩梔仁炒生地黃荊芥粉葛桔梗甘草水煎加茅根汁京墨水對服靜遠主人麻疹西江月刪訂痧疹俗呼麻子蓋因火熱熏蒸遍身紅點硃砂形發自心脾二經最忌黑斑死證極宜赤似朱紋大抵治法喜涼清不可辛甘犯禁麻子如何辨認分明證似傷寒此多咳嗽有紅斑噴嚏眼中水現或見腹中疼痛或是吐瀉相兼疹家吐瀉不須煎正要毒除熱散麻與痘瘡異治二家不可同方痘宜溫解疹清涼又要現形為上若受風寒不出其間凶險難當急宜發散保平康切忌神昏腹脹麻證因何咳嗽只因肺與心通肺金被火苦熬煎以致咳嗽氣喘治當清金降火不宜誤用辛甘譬如包子蒸籠然只要氣松火暖凡遇麻子出現詳看天令如何假如葉暖又風和荊防敗毒差可若是時行疫癘芩連消毒宜多用心調理救沉疴莫學觀天井坐且說荊防敗毒散此為發散仙方防風荊芥生地黃酒炒黃芩黃連二樣赤苓乾葛燈草連翹枳殼牛蒡子元參杏仁實為良淡竹葉水煎停當又有芩連消毒飲清金散火尤佳黃芩黃連防風及梔仁黃柏枳殼骨皮共把石膏乾葛知母連翹牛蒡子天花粉引用淡竹葉要多加只個方兒值價若是發散不出令人真個憂疑麻黃酒蜜炒如煤梔仁黃柏黃芩黃連一例更加大黃酒炒連翹牛蒡子相隨石膏蟬蛻紅花子不效命離塵世如見出時紫黑這般證候多凶急求人糞路旁東火煅存性取用細研酒調吞服須臾紫黑變紅若還依舊黑朦朧管取黃粱一夢麻子現形發熱尋常只用化斑湯石膏梔仁及元參枳殼連翹牛蒡子靈驗若是毒多熱甚芩連消毒為先大便秘結丑牛添務使微溏數遍麻證頻多咽痛火邪熏灼無他連翹豆根要多加射干牛蒡子煎罷外用十宣妙散見八十八條吹喉休要吁嗟假如見效莫爭差芩連消毒飲堪誇咳嗽聲聲氣促只消降火清金黃芩梔子赤茯苓葶藶石膏一定知母貝母元參地骨皮栝蔞仁麥冬杏仁連翹牛蒡子妙如神淡竹葉將來作引一書有黃連麻證若兼瀉痢預先用藥調醫瀉時須用三苓散見三十七條宜加上車前子滑石如見痢兼赤白加減黃芩湯見七十二條相隨大都痢止便為奇不效令人疑忌麻後須防四證不治常致誤人遍身餘熱欠清寧證一咳嗽連聲牽引證二牙齒疳生走馬證三痢下赤白難禁證四各求方法細論評才是麻科醫聖問甚身間壯熱只因餘毒留連金華丸子是靈丹梔仁黃芩黃連龍膽草鬱金雄黃解毒燈芯地骨皮湯吞若還脾弱熱綿延集聖丸胃芩渴任選集聖丸當歸川芎蘆薈五靈脂夜明砂砂仁青皮莪朮加黃連酒炙蝦蟆即蛤蜊豬膽粟米粉糊丸清晨米飲吞下治疳肥兒功最大這個丸兒堪誇平胃散五苓散相合方兒名曰胃苓湯蒼朮茯苓肉桂與豬苓陳皮厚朴澤瀉分明白朮須宜生用去肉桂甘草煎成浮腫泄瀉食積停人口效應如神咳嗽頻頻不止為因不禁酸鹹又加火毒肺家炎尤恐胸高氣喘體實卻用葶藶丸神虛清肺神丹如斯調理保平安莫向風波弄險葶藶丸除肺熱杏仁葶藶防己牽牛萊菔子相隨紅棗肉搗成為劑清肺神丹降氣鹽水煮焙陳皮黃芩黃連梔仁黃柏杏仁泥蘇子稀糊丸易口齒生瘡臭爛此名走馬牙疳金華丸子內求安外用除疳妙散先取桶中尿白火緞白色如鹽五倍子銅綠蛻殼蠶即蠶蛻紙再加硼砂冰片赤痢下成鮮血黃連柏葉槐花枳殼荊芥穗同加痢止血除才罷白痢茱萸滑石樗根枳殼升麻烏梅取肉作丸佳赤白香連丸可下香連丸又名香橘五錢木香陳皮石蓮子取肉半數宜等分用止一半一兩黃連另制外將茱萸五錢同黃連炒而用之炒後去茱萸勿同施神麯糊丸吞餌痘後麻疹即現治法從未講究專用清肺是妙手發散與補俱謬藥用黃芩桑白皮貝母牛蒡子同儔更宜倍入西河柳特為後學指授麻後如變瘧疾清涼健脾為佳麥冬薏苡仁粉乾葛白茯苓陳皮鱉甲柴胡白芍淡竹葉知母貝母山楂渴甚再把石膏加不渴知母並罷更防四種死證臨時休得殊差毒多體熱瘦如麻證一咳嗽面青聲啞證二走馬牙疳唇齒肉落證三痢疾噤口吁嗟證四這般即是死冤家不可騎牛覓馬婦人出麻時候天癸正當臨期血走氣虛難支持伏陷恐成在斯藥忌辛酸升發養陰湯見三十二條加減最宜用心調理莫待遲臨危法無可施婦人麻初發熱經行非期何因毒火內迫血離經元參地黃湯進或將解毒湯四物湯二方合用調停服後天癸依然行定變伏陷逆證元參地黃湯神方丹皮生地元參炒黑蒲黃梔仁添水煎入口靈驗四物湯除去川芎白芍解毒湯梔仁黃柏黃芩黃連服後經止立便痊不應中虛證交妊娠如逢出疹熱蒸胎必墜傷熱甚兒墜母安康輕或兩全無恙初潮宜用參蘇飲減去半夏木香或已現麻須更方安胎飲用停當初潮宜用參蘇飲加減全憑神醫枳殼前胡與蘇葉除去甘草桔梗陳皮葛根白茯苓同煎人參半夏木香須忌加入連翹牛蒡子貝母宜勿學庸工執泥出現宜用安胎飲川芎白芍當歸身蘇葉甘草條子芩大腹皮烏豆水浸陳皮薑湯泡去白薑汁炒連殼砂仁人參白朮用時須當斟糯米一撮為引白芍出現時須當併除附秘本妊娠出麻括孕婦如逢出疹須防熱甚胎傷川芎當歸白芍生地黃是主方蘄艾條子芩多放砂仁連殼薑汁炒安胎清熱最良用心調理莫倉皇務保子母無恙產後如遇出麻用藥休使寒涼四君子湯見七十二條四物湯見二十五條十全大補湯補養氣血為上綿耆肉桂因人施用全在良師審詳若泥寒涼生氣傷好似雪上加霜且說十全大補湯八珍湯加味成方川芎當歸身生地黃人參白苓白朮甘草相將肉桂白芍俱用酒炒黃耆蜜拌炙為良水煎濃汁與之嘗加減聽憑酌量麻證條目法旨用藥要訣刪訂初起已出及已收證立條目治立方不敢峻熱與用霸隨時解毒萬無妨初潮證治初起潮熱者用宣毒發表湯見第五條除升麻桔梗甘草加紫蘇葉蔥白已出潮熱者用葛根疏邪湯見三十三條加黃芩或清熱透肌湯見二十五條去甘草加黃芩骨皮寒熱似瘧者用防風敗毒散見第五條除桔梗甘草加前胡赤茯苓已收潮熱者用生地骨皮湯見三十條去甘草加黃連枳殼或古方黃連解毒湯見三十五條加地骨皮連翹牛蒡子當歸煩熱證治初潮煩熱未出時煩躁者用防風敗毒散見第五條去桔梗甘草加麥冬黃芩葛根已出煩躁者用白虎解毒湯見二十六條加骨皮黃柏連翹已收煩躁者用白虎解毒湯見二十六條加骨皮黃柏牛蒡子枳殼木通譫語證治初潮譫語者用宣毒發表湯見第五條去升麻桔梗甘草加桂附滑石辰砂末已出後譫語者用加味導赤散見四十九條調辰砂滑石末或古方黃連解毒湯見三十五條調辰砂滑石末已收後譫語者實屬凶兆用古方黃連解毒湯見三十五條合加味導赤散見四十九條調辰砂滑石末咳嗽證治初潮咳嗽乃屬美候用宣咳發表湯見第五條除升麻桔梗甘草加桑白皮如潮熱輕者併除淡竹葉已出咳嗽亦屬美候用聶氏清肺飲見五十條除陳皮柴胡桔梗甘草貝母加枳殼連翹牛蒡子或除熱清肺湯見五十條除甘草赤芍加枳殼連翹牛蒡子或加味瀉白散見五十一條除甘草人參加枳殼連翹牛蒡子已收收後咳嗽者用秘本門冬清肺湯見五十條除甘草桔梗糯米不作口渴者併除石膏泄瀉證治初潮泄瀉乃屬美候用宣毒發表湯見第五條除枳殼薄荷葉淡竹葉升麻桔梗甘草加赤茯苓車前子已出泄瀉者用豬苓湯見六十三條除甘草有用古方黃連解毒湯見三十五條合三苓散見三十七條者收後潮熱泄瀉者用加味導赤散見四十九條嘔吐證治初潮嘔吐者用竹茹湯見五十九條除山楂加荊芥防風前胡葛根連翹牛蒡子枇杷葉已出嘔吐者用竹茹湯見五十九條除山楂加連翹牛蒡子收後嘔吐者用石斛清胃散見五十九條除丹皮赤芍甘草加竹茹枇杷葉柿蒂大便不通證治初潮大便閉者用前胡枳殼散見五十一條除大黃甘草加丑牛連翹牛蒡子防風葛根已出大便閉者用當歸潤腸湯見六十八條通幽湯方尾除升麻牛熟甘草熟地黃加連翹牛蒡子收後大便閉者用河間涼膈散見二十六條除甘草小便不通證治初潮小便閉者用三苓散見三十七條加防風葛根連翹牛蒡子木通車前子枳殼已出小便閉者用導赤散見二十六條除甘草收後小便閉者用通關散見七十條除人參甘草大黃大便出血證治初潮大便出血者用宣毒發表湯見第五條去淡竹葉升麻甘草桔梗加生地黃丹皮甚者更加犀角有用犀角地黃湯見五十八條除白芍加荊芥防風牛蒡子連翹葛根者已出大便出血者用涼血地黃湯見四十五條除甘草加連翹牛蒡子犀角有用犀角解毒湯見五十八條除赤芍加元參者已收大便出血者用犀角解毒湯見五十八條除赤芍加連翹牛蒡子炒蒲黃有更加桃仁者蓋欲去其積血也愚謂用生熟蒲黃以去瘀生新更為妥當小便赤澀證治初潮小便赤者用宣毒發表湯見第五條除升麻桔梗甘草加澤瀉已出小便赤者用加味導赤散見四十九條有用古方黃連解毒湯見三十五條加木通者收後小便赤如泔濁者用加味三苓散見十一條口鼻出血證治初潮口鼻出血者用宣毒發表湯見第五條除升麻桔梗甘草加炒梔仁茅根生地黃已出口鼻出血者用加減犀角地黃茅花湯見五十八條除甘草有用古方黃連解毒湯見三十五條加童便炒梔仁者收後口鼻出血者用犀角解毒湯見五十八條除赤芍加茅根當歸尾百草霜咽喉痛證治初熱咽痛老用敗毒散見骨髓賦內除柴胡赤芍桔梗甘草加射干麥冬山豆根防風已出咽痛者用敗毒散見骨髓賦內除柴胡赤芍桔梗甘草加射於梔仁山豆根收後咽痛者用敗毒散見骨髓賦內除柴胡赤芍甘草桔梗加射干梔仁山豆根黃連腹痛證治初潮腹痛者用宣毒發表湯見第五條除升麻桔梗甘草已出腹痛者用清熱透肌湯見十六條除甘草加枳殼收後腹痛者用古方黃連解毒湯見三十五條加枳殼山楂肉元參聲音喑啞證治凡聲音啞喑者用清金降火湯見五十三條除白芍陳皮甘草桔梗加石菖蒲有用訶子肉磨水服者夾丹證治夾丹者用古方黃連解毒湯見三十五條加連翹牛蒡子當歸尾生地黃丹皮元參有用河間涼膈散見二十六條去芒硝甘草加生地黃當歸者夾斑證治夾斑者用犀角紅花飲見四十八條加黃連紫草大青夾痢證治初潮夾痢者用葛根解肌湯見第五條除赤芍藥甘草蟬蛻加防風枳實已出夾痢者用清熱導滯湯見七十二條除白芍楂肉厚朴甘草收後成痢者用清熱導滯湯見七十二條除白芍甘草又有前後俱用古方黃連解毒湯見三十五條加枳殼白芍或三苓散見三十七條加酒炒黃連黃芩木通白芍者在初潮不宜用大涼之劑收後三苓散分利似乎無濟且白芍始終俱宜酌用此法不大妥當初潮何以不宜用大涼之劑因初潮之時毒正向外一經大涼之劑遏抑毒勢麻不得出致喪生命者比比也此句可作金針之度牙疳證治凡遇牙疳證用加味清胃散見六十二條麻瘋瘡證治用解毒湯見一百另七條有用大連翹飲見十八條加金銀花者增訂治麻問答捷要一問曰麻之初出何以知其發於肺胃二經答曰肺主一身之皮毛胃乃主納五穀若皮膚堅厚腠理閉密而麻難現毛孔開豁毒從里出而麻易透胃火壅滯故不能食火邪清消而口能餐是以知也所以治麻之法初時專以發散解表清胃火為主宜用加減參蘇飲去桔梗甘草加連翹牛蒡子荊芥防風石膏治之又問曰假如用加減參蘇飲發散不出何以治之答曰以麻黃散發之或以三仙散發之即出加減參蘇飲紫蘇葉前胡粉葛茯苓枳殼桔梗甘草生薑蔥白引水煎服麻黃散麻黃蜜同酒炒黑枳殼赤茯苓木通蘇葉前胡葛根連翹牛蒡子蟬蛻紅花蔥白引水煎熱服三仙散紅花牛蒡子炒穿山甲炒成珠水煎熱服二問曰麻證忌用人參半夏升麻而痘證又用升麻代犀角以補其氣何以辨答曰麻乃肺胃蘊積熱毒而發不宜內實又不宜溫補而最喜清涼夫麻出於六腑所以先動陽氣陰血多虧陽者氣也故不漿升麻能升動陽氣上衝是以麻證最忌痘出於五臟宜內實最喜溫補而助膿其以升麻代犀角者乃生犀地黃湯見八十二條中用升麻以引生地黃而入足陽明胃經耳朱曰麻出六腑最喜清涼痘出五臟最喜溫補此條發明用升麻代犀角之法三問曰麻疹初出咳嗽何以治之答曰麻初出咳嗽宜用加減瀉白散去人參甘草糯米合三味消毒散去甘草或用白虎湯除去甘草粳米合三味消毒散去甘草或以三拗湯治之如或不效用加味五仙散去桔梗芽茶加牛蒡子麥冬主之朱曰此條發明初出咳嗽治法加減瀉白散治肺炎喘嗽桑白皮蜜炒地骨皮炒甘草人參白茯苓肥知母枯黃芩粳米一撮引三味消毒散牛蒡子炒二兩荊芥二錢五分每用三錢水煎服按原刻遺甘草一味白虎湯清肺金瀉胃火石膏知母炙甘草粳米一撮引三拗湯治風寒傷肺而咳誤行斂肺而壅咳嗽喘急麻黃不去節三錢杏仁連皮尖用二十粒生甘草一錢水煎服加味五仙散治咳嗽不止知母貝母各二錢款冬花四錢桑白皮七桔梗七錢芽茶五錢為末每用一錢杏仁煎湯下四問曰麻證發熱五六日欲出不出或作驚候吐瀉交攻何以治之答曰發熱而麻欲出不出乃淫火之毒內相攻搏以致胃家受火邪之毒而作吐瀉急宜分利而兼清胃瀉火以加味導赤散主之兼驚者加辰砂滑石粉調服萬無一失或以麻黃散去升麻濟生散等劑治之朱曰此條發明欲作驚候吐瀉交攻治法加味導赤散治心胃利小便止驚泄薄荷葉四錢生地黃酒洗木通元參車前子連翹淡竹葉各七錢黃連三錢燈心石膏引麻黃散麻黃去根節水煮打去綠汁盡用酒蜜拌炒如煤用升麻酒炒人中黃瓦盛火煅牛蒡子炒蟬蛻去頭足水煎服濟生散治麻欲出不出而生雜證入口即效紫草茸梅蕊鳳尾草鬱金各一錢牛黃一分穿山甲五分蟬蛻去頭足一錢為末麥冬煎湯下一錢五問曰麻出一日而又收腹中作脹喘急者何也答曰出而又收乃為風寒所觸腹中作脹乃是麻毒內攻喘急者乃是麻毒攻胃急宜早治若遲則傳三經而難治矣當以葛根疏邪湯加栝蔞仁石膏枳實主之或以回生清毒散治之使麻毒內解則無後患矣朱曰此條發明麻出又收腹脹喘急治法葛根疏邪湯葛根防風荊芥蘇葉牛蒡子連翹地骨皮前胡赤茯苓枳殼木通水煎服回生消毒散治麻出而又收腹脹喘急牛蒡子蟾酥二錢地龍即蚯蚓曬乾去土各二錢殭蠶貝母防風荊芥各一錢為末以淡竹葉煎湯下末一錢六問曰麻證服發散解毒之劑麻不出而發斑何以治之答曰麻證服發散解毒藥麻不出而發斑乃心經君火盛而毒內攻也當用通利之劑名為釜底抽薪使內熱一解則麻易出縱不出亦不為害以化斑解毒湯去升麻主之或以清寧散加減治之亦可朱曰此條發明麻變斑證治法化斑解毒湯元參知母石膏牛蒡子連翹升麻人中黃火煅另研用大黃酒蒸淡竹葉水煎調人中黃服清寧散主瀉心肝即瀉青丸以蜜合丸淡竹葉煎湯下治同大黃酒蒸一兩羌活梔仁炒黑川芎龍膽草防風當歸酒洗各五錢為末蜜水調下七問曰麻後作吐瀉不食發熱多有難救者何也答曰麻收後吐瀉不食乃脾胃二經之證脾虛則瀉胃虛則吐治法當以理脾安胃為主不可遂用人參白朮只宜用六仙散治之若熱不退則以四物湯見二十五條調六仙散治之倘用人參白朮則助虛氣作喘而死朱曰此條發明麻後吐瀉不食發熱治法六仙散治麻後吐瀉不食發熱螞蟻花煅灰二錢薏苡仁二錢藕節一兩蓮肉二錢釵石斛陳早米炒各五錢為末米湯送下三錢八問曰麻後鼻乾黑燥昏沉不睡又有喘急咳嗽多有用白虎湯而死者何也答曰麻後鼻乾黑燥乃火邪刑金作喘急乃胃氣虛也初出而見此候乃肺胃火邪盛用白虎湯見二十六條以清肺經之金而瀉胃火實為得宜麻證日久胃虛收後而見此證用白虎湯則更有傷胃氣不死何為只宜以消毒清肺飲去桔梗甘草加栝蔞仁葶藶主之可保無虞倘服消毒清肺飲而不應可用復元散除罌粟殼桔梗加栝蔞仁葶藶一二服則安或用補肺阿膠散更妙朱曰此條發明麻證鼻乾黑燥喘急咳嗽等證在收後不宜用白虎湯另出治法消毒清肺飲治麻後喘嗽鼻如煙煤防風荊芥牛蒡子連翹桑皮知母貝母陳皮赤茯苓百合桔梗甘草水煎服復元散治麻後喘急鼻孔乾黑如煤貝母百合阿膠炒枇杷葉蜜炙去毛桔梗罌粟殼炒各一錢為末用桑白皮煎湯下一錢補肺阿膠散治法加減詳五十一條阿膠蛤粉炒馬兜鈴牛蒡子炒香糯米炙甘草各一兩杏仁去皮尖七粒水煎服九問曰麻後牙疳多致不治者何也答曰麻後牙疳乃失血證是熱留足陽明胃經餘毒上攻所致而有五不治之候須要看證明白自外延入內者不治無膿血者不治通齦白色者不治牙齒落者不治口臭者不治除此五證內服犀角消毒飲或加味清胃散外用藥方搽之毒消自愈朱曰此條發明麻後牙疳有不治及可治法犀角消毒飲牛蒡子炒研一錢五分荊芥黃芩防風犀角甘草各一錢水煎日二服加味清胃散治口舌生瘡牙齦腐爛生地黃升麻連翹丹皮當歸黃連犀角生甘草水煎服搽牙藥方治麻後走馬牙疳人中白煅雞肫皮各一錢乳香熨沒藥熨兒茶硃砂各五分血竭五倍子各三分赤石脂煅海螵蛸明礬煅各七分麝香冰片各二分為末用粟殼煎湯洗淨搽之要速效須加牛黃二分珍珠末二分和勻搽之又搽牙藥方紅褐子燒灰人中白煅各二分白梅燒灰五分麝香二分冰片一分五穀蟲炒一錢為末先以韭菜煎湯洗患處搽之十問曰麻證又有發斑紅而麻反不紅者何也答曰麻出於胃斑亦發於胃斑是火大盛而麻縱不紅亦無大害只宜以清熱消毒治之用犀角消毒飲見九問可也或以犀角一味磨汁與服亦可若發紫斑則為胃爛不治朱曰此條發明麻證發紅斑而麻反不紅之由與治法十一問曰麻初出四肢浮腫何以治之答曰四肢浮腫乃是濕熱流於四肢也以五皮飲加葶藶治之如不應用木通散與之一二服即愈朱曰此條發明麻初出四肢浮腫治法五皮飲大腹皮茯苓皮陳皮五加皮姜皮水煎服木通散地龍曬乾燒灰一錢通草焙焦木通焙乾各五錢為末用米湯調下一錢麻疹形式要旨證治秘訣麻初呵欠噴嚏嗽密密無縫痱蚤形下出上收煩躁渴毒從臟腑發皮生麻疹之證而必紅咳嗽噴嚏鼻流膿兩淚汪汪如哭狀莫作傷寒一樣攻麻疹證治大略括麻疹若不出宣毒發表湯見第五條先咳嗽宜清肺湯見五十條熱多用化斑湯靜遠主人方見五十七條密齋治法大略括麻疹未出用荊防敗毒散前胡葛根炒牛蒡赤苓枳殼同連翹薄荷石膏多用良麻疹出甚用黃芩黃連知母石膏加元參麥冬生地黃牛蒡子竹葉骨皮名化斑湯麻後咳嗽仍不退清肺散子同竹瀝黃芩貝母栝蔞仁牛蒡子麥冬防風桑白皮地骨潮熱元參麥門冬木通知母貝母桑白皮入生地黃黃芩與地骨皮解熱寧心清肺葉泄瀉三苓散見三十七條或導赤散見二十六條更將六一散見六十七條子對若變痢證問香蔻又名香連丸見六十三條走馬牙疳清胃散見七十九條最驗麻色吉凶麻疹色紅者吉麻疹色赤者重麻疹色黃者危麻疹色黑者死麻疹輕證或熱或退五六日而後出者輕身有微汗滋滋潤潤氣不甚粗身不焦熱麻出必輕淡紅滋潤頭面勻靜而多者輕透發三日而漸收者輕麻已出明白後而身上皮膚或青色或紅紫色者俱無妨上身熱下身涼此乃隔熱下涼不妨麻疹重證鼻出血者毒重口出血者毒尤重二便出血者毒更重且危初起時手足心如火熱者重初起腳冷如冰者重氣喘鼻乾且又鼻掀而作嘔吐驚搐狂燥無汗者最重頭面不出者重紅紫黯燥者重咽喉痛不食者重胃風收早者重移熱大腸變痢者重夾斑夾癮夾丹者重舌出血者重麻疹不治證黑黯乾枯一出即收者不治氣喘心前吸者不治身上一遍紅與肌膚平者必當發表如發表後仍復如故不治鼻扇口張兩目無神者不治鼻青糞黑者不治當面牙齒黑者不治走馬牙疳者不治舌長過寸者不治胃爛者不治麻後泄瀉不止者不治麻疹死證括已收渾身熱不涼昏沉恍惚語無章飲食不進舌胎白失智循衣與摸床元氣精神混懶散一魂尚爾未飄揚逢斯強藥求全毀任是高明莫主張應用藥性防風入小腸大腸膽心胞絡膀胱治風去濕之仙藥乃卒伍卑賤之職隨所引而至其性上行故治上盛風邪瀉肺實喘滿周身痹痛四肢攣急目盲無光風眼冷淚一身盡痛脊痛項強不能回顧腰似折項似拔瘡在胸膈以上俱宜用為其散結去上風熱也肺虛有汗喘乏氣升作嘔火升發嗽陰虛盜汗陽虛自汗瀉後脾虛發搐產後血虛發痙忌用荊芥入肝肺氣分祛經絡中之風熱能清頭目去瘀血破積氣消瘡毒表虛自汗陰虛面赤者忌用薄荷入肝肺消風散熱治咳逆失音頭痛頭風眼目口齒諸病利咽喉去舌胎除小兒驚熱瘰癧瘡疥之要藥又能開鬱散氣蘇葉入氣血兩分解表利咽開胃通腸下氣除寒升中有降久服泄人真氣脾胃虛寒人過服多致滑泄前胡入肺脾胃大腸膽三焦其功長於下氣氣下則火降痰亦降矣故能治痰熱喘嗽痞膈諸疾為痰氣之要藥其性治氣實風痰凡陰虛火動之痰及不因外感而有痰者禁用葛根入大腸胃能鼓胃中清陽之氣主消渴身熱嘔吐使胃氣敷布能啟陽氣解諸毒使胃氣升發邪毒自散而不留乃大腸胃經之專藥治頭額痛眉稜骨痛天行熱嘔逆發散解肌開胃止渴宣發痘疹葛花能解酒毒蔥白入肺胃專主發散以通上下陽氣能出汗胡荽通身痹達四肢能避一切不正之氣痘疹不出者搗潠衣被髮之春夏陽氣發升之時用之反助熱毒恐變黑色不可不慎連翹大腸心胞絡氣分藥瀉心經客熱破血結散氣聚消腫毒利小便瀉心火故諸痛瘡癢皆治又能清膽經鬱熱牛蒡子又名大力子又名惡實肺經藥治風濕癮疹咽喉風熱散諸腫濕瘍之毒為痘疹之仙藥又能去皮膚風熱斑毒犀角入胃涼血散血清血解痘毒斑疹毒治驚狂解蠱毒又治吐血衄血使血尿血痘麻血熱毒甚者尤為必需綠豆解丹毒煩熱治風疹及藥石發動並解熱氣治奔㹠山豆根治咽喉諸疾及喉痹解痘疹熱毒止痛消瘡腫毒治發熱咳嗽善治人馬急黃殺小蟲腹脹喘滿卒患熱厥心痛俱宜脾胃虛寒作瀉者忌用人中黃解天行狂熱溫毒發斑一切諸毒惡瘡人中白治口瘡舌諸瘡最效為降火之妙味蚯蚓又名地龍白頸者良解熱毒入鹽化為水通經絡炙乾用專殺蛇蠱三蟲伏屍諸毒解濕熱利小便通經絡治痘瘡脾胃虛熱嬌紅五六日漸變乾黑伏陷者又治溫病大熱狂妄天行大熱小便暴閉不通西河柳入胃大腸其功專發麻疹兼解酒毒去風以之煎水洗風疹身癢最效雄黃入胃破陰邪殺百蟲避百邪治寒熱鼠瘻惡瘡疽痔死肌蟬蛻治皮膚瘡瘍風熱破傷風痘疹發癢痘後目翳小兒夜啼驚癇川黃連入心肝瀉實火治目痛眥傷淚出明目治腹痛下痢止消渴鎮驚厚腸治口瘡枯黃芩入肺瀉肺火清肌表之熱條芩瀉肝膽大腸火除胃中熱子芩治血熱妄行黃柏入腎經血分治肺脾大腸胃心胞絡肝經濕熱之專藥又治腎水膀胱不足諸痿厥無力梔仁除心肺客熱兼治五內邪熱胃中熱氣炒黑用專瀉三焦之火及痞塊中火最清胃脘之血屈曲下行能降火從小便泄去石膏入肺胃治熱病喝病口乾舌焦大渴引飲自汗頭痛溺澀便閉齒浮面腫腹中堅痛諸熱證大青即蓼蘭入肝性稟至陰其味苦寒專於清解濕熱諸邪陽毒發斑咽痛必用之藥天行熱狂疔腫風疹並治俱用其葉蓋葉瀉肝膽之實火正以祛心胃之邪熱所以小兒疳熱丹毒必用之莖之性味亦治溫熱毒盛發斑等候青黛乃藍澱浮沫攪沉掠出陰乾用瀉肝膽散鬱火治瘟毒發斑及產後熱痢下重天行寒熱頭痛與藍性同而止血拔毒之功殺蟲之力似勝於藍又治噎膈之疾和尿白垢土冰片吹口瘡最效元參入腎主腎水受傷真陰失守孤陽無根亢而僭逆咽喉腫痛之專藥能清上焦氤氳之乞無根之火又治目赤腫痛脾虛泄瀉者忌用淡竹葉性專淡滲下降故能去煩熱清心利小便根能墜胎催生大黃脾胃大腸三焦血分藥凡病在五經血分者宜之能行瘀血導血閉通積滯破癥瘕瀉痞滿潤燥結敷腫毒瀉腸胃燥熱丑牛專一行水下氣之藥白者利肺治上焦痰飲除壅滯氣逆通大腸風秘除氣分濕熱黑者瀉堅兼瀉脾胃之濕消腫治腳氣利大小便閉凡病在血分病人稍弱而痞滿者不可用枳實入脾肝血分消食瀉痰滑竅破氣治宿食不消心下痞悶枳殼泄肺走大腸破氣化痰除寒熱結芒硝即朴硝出齊衛者上生鋒芒謂之芒硝治五臟積熱胃脹閉滌蓄結飲食推陳致新除邪氣治小兒走遊風以硝傾湯中取布蘸濕拭之熱結不至堅者不可輕用火麻仁入大腸脾經其性滋潤初服能令作瀉久服能令人肥健有補中益氣之功臟腑結燥者宜之又治胃熱便難止消渴通乳汁催生難產及老人血虛便閉婦人產後便閉最宜豬苓入膀胱腎經血分性善疏利經府能利水而瀉脾胃水蓄之證又治痎瘧蟲痓澤瀉入膀胱治身熱汗出利膀胱濕熱逐心痰氣治水蓄煩渴其功長於行水素多濕熱之人甚宜然亦不可過用多服病人眼赤茯苓入心但主導利而已能瀉心經水蓄之證川木通入心心胞絡小腸膀胱脾胃不和水道不利致郁為寒熱為腫脹為淋秘為痹癉俱宜用此淡滲之分利陰陽則水行火降脾胃和而心腎平矣其性除脾胃寒熱利九竅血脈關節上通心清肺達九竅下瀉濕祛熱能瀉心經水蓄之證京花通入肺胃入肺引熱下降而利小便入胃通氣上達而下乳汁治五淋癃閉妊娠忌用車前子入膀胱腎經利小便而不走氣治氣癃止痛通腎氣以利小便則濕去而癃閉除清熱利竅專通利行水道疏通膀胱熱不致擾動真火能瀉腎與膀胱水蓄之證滑石上能散表下能利小便為蕩熱散濕通利六腑九竅之專品清肺胃之氣下達膀胱蕩胃中積聚寒熱燈心草瀉肺利水治急喉痹燒灰吹喉燒灰塗乳上與兒食止小兒夜啼瞿麥利小便主關格諸癃結出竹木刺決癰腫明目去翳破胎墜子下閉血萹蓄利水散濕熱治黃癉霍亂療小兒鬾病女子陰蝕及浸淫瘡疥疽痔殺三蟲山茵陳入膀胱又名角蒿生子如鈴味辛苦有小毒專於殺蟲治口齒瘡絕妙有逐濕化熱之功綿茵陳入膀胱葉細如青蒿專於利水為濕熱黃癉要藥治風濕寒熱熱結黃癉濕伏手陽明大腸足陽明胃所主之病白茯苓入脾胃心肺腎膀胱開胃化痰利水定悸止嘔逆泄瀉除濕氣散虛熱治胸脅氣逆上通心氣治憂恙驚悸心下結痛導熱滋干流通津液治煩滿寒熱口苦舌乾利小便杏仁入肺散邪除氣定喘瀉滯散結潤燥除肺中風熱咳嗽不去油用亦能潤滑大腸貝母肺經氣分藥反烏頭一名虻兼入心經善解心胸鬱結之氣肺受心胞火乘因而生痰或為邪熱所幹喘嗽煩悶非此莫治實為肺家燥痰開鬱散結化痰解毒之專品乾柿白霜專清肺胃之熱在元氣未漓可勝寒潤者則宜若虛勞煩嗽喘乏者用則鬱閉虛陽病根日固與埋薪灰燼中無異柿蒂味澀無毒取其澀以斂內蘊之熱故專治呃逆麻雖忌澀而柿蒂之澀非若五味之酸收閉澀比也故疹家呃逆及心中作逆者公然用之而不忌枇杷葉入肺胃治夏月傷暑氣逆最良能和胃下氣蓋氣下則火降痰消胃和則嘔定噦止故為治心逆嘔噦及癆嗽之上品胃熱嘔吐風寒咳嗽者忌用桑根白皮瀉肺氣之有餘止嗽而能利水肺中有水氣及肺火有餘者宜之又治唾血熱渴水腫腹滿顱脹利水道去寸白蟲可以縫金瘡縫後用熱雞血塗之肺虛無火因風寒而嗽者服之風邪反閉固不散而成久嗽馬兜鈴入肺散氣肺熱痰喘聲音不清者宜之能清熱降氣麻疹內陷喘滿聲喑啞者宜多用之肺冷金寒喘嗽失音者忌用款冬花蜜水拌炒性溫而不燥血為溫肺治嗽之要藥潤肺消痰止嗽定喘喉痹喉喑肺痿肺癰咸宜治麻亦宜慎用但非若桔梗為害之大耳金沸草即旋覆花肺經大腸要藥能開結下氣行水消痰治驚悸祛痞堅除寒熱散風濕開胃氣止嘔吐故肺中伏飲寒嗽者宜之但性專溫散陰虛勞嗽風熱燥咳不可誤用用之嗽愈甚栝蔞仁去殼打去油潤燥為治嗽消痰止渴之要藥能洗滌胸膈垢膩鬱熱並治喉痹痛引心腎咳嗽喘息及結胸滿痛能降上焦之火使痰氣下降麻疹氣喘鼻扇者必用脾胃虛嘔吐自利者忌用天花粉降上膈痰熱潤心中煩渴除時病狂熱祛酒癉濕黃治癰瘍解毒排膿清胃祛熱生津凡痰飲色白清稀者忌用甜葶藶隔紙炒香研宜用絹濾過服入大腸膀胱專泄肺中之氣主癥瘕積聚破堅逐邪通利水道亦能滑大便為能引領肺氣下走大腸也又治肺癰喘逆痰氣積聚通身水氣肺中之水氣膹滿者非此不能除故能瀉肺經水蓄之證又能消麻疹頭面手足遍身浮腫脾胃虛者忌用北芥子入肺散表利氣豁痰散腫消脹辟惡痰在脅下及皮裡膜外者非此不達泄瀉傷精肺經有熱虛火亢炎者忌用家蘇子諸香皆燥惟此獨潤虛勞咳嗽必用之藥性能下氣胸膈不利者宜之與橘紅均為除喘定嗽消痰順氣之品但性主疏泄氣虛久嗽陰虛喘逆脾虛便滑者皆忌用萊菔子即蘿蔔子治痰有推牆倒壁之功長於利氣生者升炒熟者降升則吐風痰降則定痰嗽竹瀝善透經絡治筋脈拘攣痰在皮裡膜外筋絡四肢者非此不能化之胃虛腸滑及氣粗便閉者誤用每致呃逆不食脫泄不止而死紫菀茸肺經血分之藥止咳逆上氣胸中寒熱結氣能疏利肺經血氣去蠱毒痿癖能散結降氣專通肺氣使熱從尿出而去療咳唾膿血消痰止渴又治下痢肺癰善調五勞體虛止咳定咳療驚悸吐衄諸血陰虛肺熱乾咳者忌用麥冬入心肺胃腎定心熱驚煩療肺痿吐膿專泄而不專收能清燥而滋水源寒多人忌服肥知母入膽胃脾肺能瀉有餘相火理消渴煩蒸下潤腎燥而滋陰上清肺熱而除煩表證未除瀉痢有燥渴脾胃虛人忌用天冬肺經氣分藥兼通腎氣治咳逆喘促肺痿肺癰吐衄乾咳痰結能滋肺肺燥者宜之能保肺不受火擾清金降火益水之上源故能下通腎氣藕汁性專散血止血除痛梨汁消痰降火止心煩地骨皮三焦氣分藥下焦肝腎虛熱骨蒸自汗者宜之有益精氣退邪火之妙家生地黃入心腎心胞絡肝經兼行脾與小腸為散血之專藥主傷中逐血痹填骨髓長肌肉作湯除寒熱積聚療折跌傷筋久服身輕不老又治心熱五心熱益腎水涼心血脈洪實者更宜戴元禮曰陰微陽盛相火熾強來乘陰位日漸熬煎陰虛火旺之證總宜用家園生地黃以滋陰退陽故麻宜始終用之乾生地黃入脾腎涼血滋陰潤皮膚虛而有熱者宜故麻不宜用之紫草入心胞絡及肝經血分專於涼血活血利大小腸血痘疹未出熱毒甚大便閉澀而毒不得發越者及已出紫黑便閉者俱宜痘疹色紅或白二便利者忌用紫草茸麻證不用乃麒麟竭樹上蟻壤聚其脂液而成與蜂釀蜜無異出真蠟國者為上波斯國者次之古方以治五臟邪氣金瘡崩漏破積血生肌止痛今人專用之治痘瘡為其有活血起脹之功無鹹寒作瀉之患其功倍於紫草故以紫草茸呼之實非紫草同類也其性甘鹹平有小毒近時人多不知此品故附入於此紅花又名紅藍花能行男子血脈通婦人經水活血解痘麻毒散赤腫治產後血暈及胎死腹中少則養血多則行血過用使人血不止且性兼上行不可不知亦主蠱毒下血白茅根降除伏熱利小便止渴治吐衄便尿諸血淨白茅花入肺性上升散熱止衄鮮射干治咳逆上氣喉痹咽痛不得消息散結氣除腹中邪熱食飲大熱等候竹茹專清胃府之熱為虛煩煩渴胃虛嘔逆要藥咳逆唾血產後虛煩無不宜之性雖寒而滑能利竅可無郁遏客邪之慮漢防己去身半以下濕熱善走下行長於除濕主下焦血分之病除邪利大小便去風寒溫瘧熱氣諸病療水腫膀胱熱通腠理利九竅大抵二便不利下焦濕熱者可用凡上焦濕熱忌用其苗名木防己當歸入心脾肝凡血受病及諸病夜甚者必須用之專破惡血養心血潤腸胃榮筋澤皮膚理癰疽排膿止痛和營血散內寒身能養血尾能行血乃血中氣藥故咳逆上氣陰虛陽無所附者用之補陰則血和氣降矣牡丹皮入心腎心胞絡肝經治血中伏火故相火勝腎無汗骨蒸為專藥其味辛氣竄能開發陷伏之邪外散故主治寒熱中風瘛瘲驚癇等證症堅瘀血留舍腸胃五臟及陰虛吐血衄血必用之藥有行瘀血生好血破積生新引血歸經之功能走泄精液汗多自汗者忌用然性專散血痛瘡初起用之恐致根腳散闊及婦人血崩與經行過期不淨屬虛寒者俱禁用銀杏又名白果能定喘生嚼止白濁降痰消毒殺蟲塗鼻面手足去皶疱䵟生搗能浣油膩同汞搗漿衣被殺蟲蝨去痰垢之功可例推矣熟則壅遏閉氣冬食令人顱脹昏悶凡食此過多脹悶欲死者急以鵝翎蘸香油於喉中攪之得吐則生或以糞清灌之亦可元胡索入脾胃能活血止痛治小便尿血炮炙論曰心痛欲死急覓元胡以其能散胃脘氣血滯痛也善行血中氣滯氣中血滯性走而不守惟有瘀滯者宜之麻證腰疼在未收之前生用已收之後醋炒用金釵石斛入脾胃甘可悅脾故厚腸胃而治傷中咸能益腎故益精氣而補虛羸為治胃中虛熱之專藥又能堅筋骨強腰膝骨痿脾弱囊濕精少小便餘瀝者宜之麻後不食多用與服即能食蒲黃入心胞絡肝經治血止痛生則行血炒則止血生炒並用則能逐瘀生新主心腹膀胱寒熱利小便止血消瘀血凡婦人麻證正產墜胎天癸正臨及妄行等候必需之藥牡蠣治傷寒亡陽汗脫敗蒲扇敗蒲席汗積日久鹹寒相濟故用以燒灰撲身止汗其用蒲扇者乃取扇動招風止汗之義耳非謂蒲能禁汗也紫芫花陳者良水浸一宿曬乾醋炒以去其毒反甘草消痰飲水腫治咳逆咽痛疝瘕癰毒逐水瀉濕能直達水飲窠囊隱僻處取效甚捷不可過劑泄人元氣又能瀉肝經水蓄之證勿因其為放水之品於麻疹水蓄之候置而不用百部根肥白者良抽去心用不去心用則生煩悶但其氣溫為殺蟲要藥故肺熱癆瘵喘嗽有寸白蟲者宜之蟯蟲痢及傳屍骨蒸多用之凡肺胃寒者宜之麻證有生肺癰者權用又以水濃煎洗牛馬蝨樹木蟲蛀用填孔中更削杉木塞之其蟲即死殺蟲之功於此可見陳皮入脾肺氣分治胸中痰熱逆氣為消痰運食之要藥留白則補脾胃去白則理肺氣能瀉肺損脾理氣燥濕為麻疹之禁藥元咳者用留白陳皮樗根白皮苦溫有毒入氣分暴痢滯者宜之槐花入大腸胃心胞絡肝經治大小便血目赤腫痛腸風下血痔血臟毒辰砂主身體五臟百病養精神安魂魄益氣明目殺精魅邪惡鬼久服通神不老龍膽草性沉降治肝經邪熱下焦濕熱目赤腫瘀肉小兒肝氣去腸中小蟲驚癇與濕熱邪氣之在中下二焦者非此不除以其專伐肝膽之邪也桃仁入心胞絡肝經為血瘀血閉之專藥雖苦能泄血滯甘可生新血畢竟破血之功居多治熱入血室瘀積癥瘕經閉瘧母等候而麻證心腹痛大腸閉結亦有權用者百合補土消瘀止嗽利小便散積蓄之邪主邪氣腹心痛然性專降瀉中氣故麻證亦間有用者虛寒二便清泄者忌用側柏葉性寒而燥大能伐胃雖有止血之功而無陽生陰長之力亡血虛家不宜擅用麻黃去根節湯泡去沫晾用麻證用酒同蜜炒須去根若連根用令人汗不絕入膀胱乃肺經之專藥故治肺病多用之去皮毛氣分寒邪以泄寒實蓋皮毛外閉邪熱內攻肺氣拂鬱乃衛實之候宜用之以發汗若過汗則汗多亡陽飲食勞倦及雜病自汗表虛之證用之則脫人元氣禍患莫測故麻證不輕用以麻黃根專能止汗但不宜連根而用麻後宜用藥性川文蛤入腎為潤下之味止渴利小便治咳逆胸痹腰痛脅急鼠瘻崩中等證蠶蛻又名馬鳴脫微炒用即老蠶眠起所脫之皮今以出過蠶之紙為馬鳴退非也治目中翳障較之蟬蛻更捷惜乎一時難覓密蒙花入肝經血分潤肝燥為搜風散結目疾專藥治青盲昏翳赤腫多眵淚消目中赤脈及小兒痘疹餘毒疳氣攻眼川木賊能發散解肌升散火鬱風濕專主眼目風熱暴翳止淚取其能發散肝肺風邪多用令人目腫久翳及血虛者傷暑與暴怒赤腫者忌用白蒺藜酒浸炒焦去刺入肝腎治痰消癰腫搜腎臟風氣為治風明目要藥風入心腎心胞絡者此為響導目疾為風木之邪風盛則目病風去則目明矣其性苦能泄溫能宣辛能潤故專治惡血破癥結積聚治喉痹乳癰草決明又名決明子炒研能清熱明目治青盲目淫眼赤淚出不宜久服久服令人患風相感志云園中種決明蛇不敢入石決明九孔者佳麵包煨熟研水飛過用反雲母石入肝腎為磨翳消障之專藥又治風熱入肝煩擾不寐遊魂無定不宜久服恐消乏過當令人寒中金銀花入脾通肺主下痢膿血為內外癰腫之要藥解毒祛膿瀉中有補癰疽潰後之聖藥能消腫又能利風虛氣虛膿清食少便瀉者忌用紫背浮萍又名水萍入肺其性輕浮入肺經達皮膚故能發揚邪汗為祛風專藥發汗勝於麻黃下水捷於通草惡疾癧風遍身者濃煎浴半日多效本經主暴熱身癢者以其專疏肌表之風熱也下水氣者以其兼通胃大腸肉理也勝酒者謂胃與大腸通達而能去酒毒也長鬚發者謂毛竅利而血脈榮也止消渴者謂經氣和而津液復也去風丹治大麻風癩風一切有餘風濕腳氣及三十六種風皆驗元氣本虛人服之未有不轉增劇者至於表虛自汗者尤為戈戟用者須慎附治風丹方紅萍為末蜜丸彈子大以豆淋酒下一丸並附豆淋酒法黑豆半升炒令煙出以酒三升浸之去豆以酒聽用苦參直入腎經凡內有實濕者足以當之若濕熱既去而更用之必致苦寒傷腎定生腰重腳弱之疾威靈仙性善下走通十二經故能宣通五臟治胃脘積痛腳脛痹濕痛風之要藥消水破堅積朝服暮效痘疹毒壅於上不能下達腰上脛膝起灌遲者用為引下立效其性利下病人壯實者誠有殊功但能耗血走氣氣虛者服之必虛瀉而成痼疾血虛不因風濕者忌用白菊花去風熱之要藥治諸風頭眩腫痛目欲脫淚出又治皮膚死肌惡風濕痹久服利風血石菖蒲入心胞絡腎經心氣不足者宜之主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出聲音主耳聾癰瘡溫腸胃止小便利久服不忘不惑胡黃連大伐臟腑骨髓邪熱小兒腎氣實猶可當之腎臟不足者用之奪人天元性能直達下焦善搜淫火之毒忌豬肉犯之漏精川鬱金入心及心胞絡治吐血衄血唾血血腥破惡血血淋尿血婦人經水逆行產後敗血衝心及宿血心痛川薑黃入脾有二種蜀川生者色黃質嫩有須折之中空有眼切之分為兩片者為片子薑黃江廣生者質粗形扁如乾薑僅可染色不入湯藥今藥肆混市誤人徒有耗氣之患而無治療之功也治血中之氣又治風寒濕氣手臂痛又治癥瘕癰疽通經消腫毒殭蠶祛風化痰治驚癇夜啼去三蟲滅黑䵟男子陰瘍又治咽喉腫痛喉痹立愈又治風痰結核頭風皮膚風癮丹毒作癢疳蝕金瘡疔腫風疾皆取其散結化痰之義也天麻肝經氣分藥肝虛不足用以補之諸風掉眩眼黑頭旋風虛內作者非此不治小兒驚痰風熱服之即消凡久服則遍身發出紅斑是其定風之驗也血虛無風火炎頭痛口乾便閉者不可妄投遠志入腎非心藥也能強志益精酸棗仁入肝膽兼入脾經酸棗味酸性收其仁則甘潤而性溫故能散肝膽二經之滯炒熟用則收斂津液故療膽虛不得眠及煩渴虛汗之證生用則導虛熱故療膽熱好眠神昏倦怠之證又治心腹寒熱邪氣結聚痠痛血痹等證皆生用以疏利肝脾之血脈肝虛心煩不能藏魂及傷寒虛煩多汗與虛人盜汗者皆炒熟用以收斂肝脾之津液青皮入肝脾破滯氣削堅積及小腹疝疼凡久患瘧而熱甚者必結痞塊宜多服能疏利肝邪但伐肝太甚中虛者忌用恐傷生髮之氣又最能發汗汗多者忌用山茱萸止小便利秘精氣治腦骨痛療耳鳴補腎氣興陽道堅陰莖添精髓止老人尿不節治面上瘡能斂汗命門火旺赤濁淋痛及小便不利者忌用柴胡入膽經本手少陽三焦足少陽膽經藥若病手太陽小腸足太陽膀胱用此味太早則引寇入門麻證所以始終忌也其性升發虛而氣升嘔吐者及陰火炎上者忌用若陰虛骨蒸服之助其虛陽上逆勢必耗盡真陰而後已麻證血多虛耗故切為戒忌操司命之權者不可不察銀柴胡入腎胃性味與石斛不甚相遠不獨清熱兼能涼血虛勞宜用且能推陳致新明目益精麻後身熱不除日久尫羸者甚宜九肋鼈甲治痎瘧瘧母虛勞寒熱癥瘕痞疾經水陰瘡骨蒸勞熱自汗等證阿井膠益肺補腎治心腹內崩勞極洒洒加瘧狀腰痛四肢痠疼女子下血安胎為諸失血要藥勞證咳嗽喘急肺痿肺癰潤燥滋大腸治下痢便膿血所謂陰不足者補之以味也久服輕身益氣其辨真偽法以頂上有鬃文極圓整者為真折之沉殼不作屑不作皮臭以蛤粉炒成珠經月不軟者為佳東阿產者雖假猶無妨害其水膠入木煤贗造有傷脾氣慎不可用五穀蟲又名天漿子治小兒諸疳積滯腹大腳弱翳膜遮睛穀麥芽消穀食芡實米益脾利濕遺精濁滯小便不禁者宜之白扁豆助脾胃和中下氣治霍亂薏苡仁升少降多能清脾祛肺熱及久虛勞嗽肺痿肺癰虛火上乘皆宜用為下引又能利筋去濕治久風濕痹拘急不能伸屈之病其功專於利水濕此虛人小便不禁如治水濕則生用津枯便秘陰寒筋縮及妊娠禁用以其性專下泄也六神麯入胃其功專於消化穀麥酒積脾陰虛胃火盛者忌用山楂肉入肝脾胃大能克化飲食其功長於消肉積行滯血痢疾初起多積垢用薑汁炒生薑入脾肺散風寒止嘔吐化痰涎消脹滿去臭氣通神明治傷寒頭痛鼻塞咳逆上氣嘔吐等證煨熟用則降而不升止腹痛泄瀉扶脾氣散鬱結紅棗脾經血分藥和榮衛滋脾土平腎氣中滿者忌用桔梗清肺氣利咽喉為肺部引經藥又能開提腠理與甘草同為舟楫之劑諸藥有此一味不能下沉但其性升麻證最忌升發之味甚不宜用即痘瘡下部不能起發亦為之忌蓋其能阻藥力於上不得下達也甘草反海藻大戟芫花甘遂主五臟六腑寒熱邪氣堅筋骨長肌肉倍氣力解金瘡腫毒炙用補中散表雖能和藥性為常用之品然能調補中氣故麻證切為禁忌白芍藥反藜蘆用入脾藥以酒炒入止血藥以醋炒入和營藥及下痢後重血熱癰毒俱以酒洗生用性酸斂膀胱得收斂愈閉故小便不通者忌用麻證最忌收斂之味最宜利小便之品是以麻證切忌赤芍藥性專下氣止痛而麻證亦忌檳榔泄胸中至高之氣使之下行性如鐵石之沉重能墜諸藥至於下極逆氣裡急諸氣壅腹脹後重胸腹蠱食積滯作痛下氣消脹逐水除痰殺蟲治痢攻食破積止瘧療疝腳氣痞癘等候並治大腹茸散無形之滯治痞滿膨脹水氣浮腫腳氣壅逆厚朴能破血中氣滯治中風傷寒頭痛寒熱驚悸逆氣血痹死肌去三蟲蕪荑辛散能祛五內皮膚骨節濕熱之病去疳殺蟲及腸風痔瘻惡瘡疥癬五靈脂氣腥味苦酸大傷胃氣雖有治目翳療中脘疼痛之功藜霍之人稍可以用膏粱之士大為不宜麻證亦僅於香茱湯中用之香附米三焦肝經氣分藥開鬱消痰食止諸痛散風寒行血氣月候不調胎產崩漏多怒多憂者之要藥治兩脅氣妨心忪少氣生用則上行脅膈外達皮毛故能散風寒熟用則下走肝腎外徹腰足故能調氣血烏藥散諸氣治中風中氣諸證能理七情鬱結上氣喘急能治氣血凝滯霍亂吐瀉痰食稽留但膏粱之輩血虛內熱者忌用吳茱萸入肝行脾散邪溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理定吐止瀉理關格中滿腳氣疝瘕制肝燥痹風厥氣上逆陰寒膈寒氣不得上下腹脹下痢又治氣逆裡急等證藿香葉入脾肺助脾醒胃故能止嘔逆開胃進食溫中快氣去瘴氣止霍亂治心腹痛凡時行疫癘山嵐瘴瘧用此醒脾健胃則邪氣無可容而愈陰虛火旺胃虛作嘔內無留滯者忌用恐傷正氣引邪入內川芎入肝血中理氣藥搜肝氣初肝血潤肝燥又治一切風氣血氣及面上遊風目疾多淚俱宜且上行頭目下行血海為三焦膽心胞絡肝頭痛及血虛頭痛之聖藥助清陽之氣去濕氣在頭頭痛必用之藥麻證若未收之前用之反致頭疼故麻證忌用血痢已通而痛不止用之以行氣又治婦人血閉無子凡骨痛盜汗陰虛火炎咳嗽吐逆及氣弱之人不可服為其性辛散令真氣走泄而陰愈虛也縮砂仁脾胃肺腎大腸小腸膀胱七情之氣藥能引諸藥歸丹田治脾虛泄瀉宿食不消瀉痢白沫腹中虛痛寒飲脹滿噎膈嘔吐和中行氣止痛安胎用之悉效又治血痢火炎咳嗽忌用半夏入膽兼入胃脾虛而有痰氣者宜加用之胃冷嘔噦最要之味治心下堅胸脹咳逆頭眩咽喉腫痛又能利水開痰故能治腸鳴下氣止汗但其性悍燥辛溫有毒能去濕豁痰健脾麻證故切禁之南星又名虎掌為開風痰之專藥能下氣利膈破堅積除麻痹散血墮胎治風勝濕除痰攻積拔腫又治口喎舌糜諸風口噤但其味辛而麻氣溫而燥性緊而毒故麻證禁用人參補五臟安精神定魂魄止驚悸除邪氣明目開心益智補元氣止渴生津和營養衛久服輕身延年沙參專瀉肺氣之熱喘嗽氣壅小便赤澀不利金受火克陰虛失血或喘嗽寒熱及肺痿等候宜之升麻胃經本藥性升上行治中惡腹痛用以開發胃氣治喉痹口瘡用以升散大腸胃三焦膽之大熱以其氣發動熱毒於上為害莫測故麻疹尤為切禁誤用喘滿立至惟麻後口瘡牙疳及脫肛等候方可略施張璐先生曰按古方麻疹升發藥中多用升麻曷知升麻性升能升動陽氣每致邪熱上浮而作喘逆當以紫蘇蔥白代之非但升麻當慎即如桔梗初起之時亦須酌用恐其載引濁氣於上也白朮又名山姜入脾胃生用除濕燥脾消痰利水治風寒濕痹死肌癰疽散腰臍問血及衝脈為病逆氣裡急等證制熟用和中補氣止渴生津止汗除熱進飲食安胎等證又主大風在身而風眩頭通目淚出逐皮膚間風水結腫除心下急滿及霍亂吐下不止益津暖胃消穀嗜食但其純陽之氣而無益陰之能故麻證禁用附製法入諸補氣藥中飯上蒸數次用入肺胃久嗽藥中用蜜汁拌蒸用入脾胃痰濕藥中用薑汁拌曬用入健脾藥中用土炒用入瀉利虛脫藥中炒存性用入風痹痰濕藥中利水破血藥中俱生用蒼朮可升可降能徑入諸經疏泄大腸與胃之濕而安脾肺闢時行惡氣用米泔水浸炒故能除上濕發汗能發汗故能去風寒濕氣祛濕而去死肌癰疽下氣而消痰食飲癖又能總解諸郁性雖開腠理而辛熱溫燥故麻證禁用
