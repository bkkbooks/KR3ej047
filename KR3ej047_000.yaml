body:
  text: 附録麻疹論經云痘稟於陰而成於陽麻稟於陽而成於陰此陰陽互根之妙也麻乃先天真陽中之胎毒然必得陰與之交感而後能生其化故曰成於陰也方其初熱三日必周身漐漐微似有汗而苗乃見汗者陰之液發熱而漐漐者陰陽交感施化之驗也苟非有漐漐之汗營衛乾澀腠理閉固其苗何由而得出耶若已齊苗務令顆粒紅活鮮明是乃營血附隨其氣育成佳碩而精華髮見於外也其後以漸回塌塌後之暴悍餘氣亦必由交感而化陰得之而為癍跡癍跡者陰血之所為也不欲其速收恐其餘毒復返入內必有後患是功成於此豈非成於陰乎所謂麻稟陽而成於陰如此然必內外無邪方能成功邪則傷正有害於麻法當分經辨證依法定方使邪去而正無害則營衛和順陰陽交會無所往而無不得之矣凡痘症重在養漿麻症只要齊苗苗齊功居八九其後不過調理而已形色喜鮮明而嫌暗滯不妨其多總要出得透透則內無留邪其症常兼咳嗽及咽喉痛咽痛治法以甘草桔梗為主相症加減若紅腫惡熱口渴尿赤宜加黃芩生地牛蒡子外用蘄艾蛇床子研末新煙銅盛燃吸烟取出痰涎咽痛漸愈若不惡熱舌胎白滑宜加半夏南星外用蘄艾半夏南星研末吸烟取涎若聲音重濁更加阿膠玉竹雞子白之類若不紅腫舌胎滑而冷不渴惡寒喜熱宜用半夏南星附子肉桂之類外用油蘸大紙捻照其後頸或用生附子研末吹之自愈凡此不過但引其端而未詳其法非略也用法不外六經驗證重在本氣毋庸復贅附案曾醫老庚者年二十有七夏月出疹頭身微熱苗色淡紅咽喉痛甚時醫誤用柴葛牛子甘桔等藥轉加作泄大泄數次疹頓沉沒咽喉轉閉口不能言人事恍忽暈眩欲絶時天有在坐豫謂天有曰此證全是一團陰寒在裡若用疹家通套藥必不可生天有曰何以言之豫曰若內實有火苗當紫赤何得淡紅且咽喉雖痛而不赤腫又無煩渴惡熱等證明明腎臟虛寒陰火上攻也且陽和布令百體順昌麻疹屬陽必純陽始得出透見點之時如萌芽初吐遇陰慘肅殺之氣摧殘所生靡有孑遺今值此陰邪橫發埋沒真陽而疹不沉沒者幾希矣於是陡進附子乾薑半夏甘草白朮茯苓肉桂黃耆溫補兼行以驅陰回陽俾駁劣悉返沖和乃得功收再造危乎微乎從侄經千年三十出疹初熱時心中煩躁腹內疼熱甚為剝床彼因問三豆湯可服乎余曰可急煎服於是心腹煩熱乃解苗不出現人事暈眩咳逆喘促鼻靨扇動詳察其證知其為熱毒壅塞於肺肺壅則津液不行肌竅不開苗故不見因用黃芩以清裡熱阿膠麥冬以潤肺燥桔梗開提肺氣紫葛蒡薄清解外熱甘草緩中杏仁定喘服二劑苗雖出透而色皆紫黑人事更覺沉重飲食一點不能下余悄謂其家曰麻書有云淡紅者生紫黑者死其家駭怖無似余復安之曰豈真死症耶但其症極險耳此為內熱甚而血結也其證舌乾口臭惡熱喜冷聲音響亮仍用黃芩麥冬阿膠以清內熱而潤肺燥加以丹皮瀉血中之熱合紅花之活血者以散血結蟬蛻牛蒡解其外毒黃連甘草解其內毒連進三劑人事漸安飲食漸可紫黑漸退而麻疹起矣然有陰邪內盛者苗赤紫黑法宜驅陰回陽其證舌潤不渴聲低息短惡寒喜熱與此不同朱曰證之陰陽務宜細辨陽證喜寒涼若陰邪內盛寒涼即死前月其弟字志千者年二十一歲疹出甚艱信任內戚所薦之醫不知解托概用寒涼遏郁苗氣而不能出透至九日而死經千謂其弟不自謹慎起居失節飲食失調以致此耳傷哉其弟為庸醫所殺不歸罪於醫而反躬自責足徵心地惇良皇天豈無默庇所以自出麻疹其證雖險而終無害也竊謂賞善自應罰惡殺命之醫寧不速誅之耶抑何日得蒙上天並顯誅其薦醫之人方快吾心焉耳諺云賢不薦醫醫為賢人所不薦獨愚人可得而薦乎於是余又痛恨夫薦醫殺人者曾醫天瑞之子大熱大渴舌乾口苦咽喉腫痹氣喘腹痛下痢紅白小便赤熱苗色紫而暗滯此為火邪充斥三焦俱為熱壅傷津而渴觸肺而喘上攻而為喉痹下迫而便紅白精津血脈受其煎熬致苗色不紅活口苦者少陽之裡熱也方用柴胡黃芩消解少陽大黃通瀉三焦實熱梔仁引三焦之火屈曲下行生地紫草以解血分之熱杏仁定喘桔梗開提甘草和中服一劑諸證略殺但腹痛未減小便如故是夜用神砂六一散二錢桔梗煎湯化服使桔梗通天氣於地道則氣不滯而壅自疏六一散開支河以瀉小腸之熱一服而小便通腹痛即愈次日苗轉紅活諸證俱已於是方中減去柴胡黃芩大黃梔仁更加當歸茯苓數劑而全愈矣曾醫國先之孫苗色淡紅煩躁口渴唇爛面腫清涎成流飲食不思小便短大便祕豫細察之此證內真寒而外假熱其人惡寒身倦欲寐乃少陰證也內有真寒舌胎滑而冷口雖渴而喜熱飲且不能多飲小便短大便祕者以清涎上湧津液逆而不降也諸證皆非真熱乃假象也方用附子白朮茯苓半夏吳萸服一劑苗色略轉人事飲食亦漸就康再投一劑口唇全愈清涎亦不吐矣大便初硬後溏旋即又行轉紅白痢吾知其里邪從下行矣亦胃氣有權穢腐當去之徵也但小便仍短方中重用肉桂末藥內化服三四劑諸證皆愈而成功矣瘄論胥山王琦先生醫林指月內瘄論一篇附證一則瘄猶錯也皮膚甲錯之謂也俗名曰瘄實系疹也紅點隱隱調之隱疹疹之根源乃毫毛之內皮腠之間因於寒致血凝澀其凝澀之血散發於皮膚之外則發而為疹蓋人身通體毫毛之氣肺所主也毫毛之內腠理之外則秉胞中之血熱肉充膚淡滲皮毛肝所主也皮膚寒而血凝澀始得凝澀繼欲流通則發熱咳嗽散而為疹疹之發也有稀少有稠密極稀少者不過數點以及數十點極稠密者則周身頭面無有空隙醫者不知其故見有數點即行攻發若皮膚肌腠之間果有凝澀則發熱咳嗽自當湧出其不能即出者非肌表不和即氣虛不振治之之法當以紅花歸芎荊柴羌丹之劑和其肌表或以桂枝耆朮歸芍苓甘之劑助其氣虛若概以蘇麻前杏芩連石膏之劑投之其氣虛不出者此為虛其原本本自稀少者此為無故受賊非惟疹不能出其經脈表裡受虧致身大熱而喘急生愈熱愈表愈喘愈發輕者重重者死矣蓋痘之發也見有一二點其勢必出疹之發也見有一二點可出可不出若肌表果有凝澀之疹則身熱咳嗽其勢自出若無疹則止此數點不能再增善治者明乎此理不行攻發但調其經絡和其榮衛虛者補之寒者溫之則熱退身安而愈無奈矇昧不明當疹毒盛行之時見有數點即行攻發轉攻轉劇愈發愈危必致真藏虛敗而死真可痛耳夫痘毒起於腎不從經脈而出為腎經痘雖有良醫不能挽回若疹則其根源在於肌腠皮膚膚腠之血根於胞中血海膚腠寒而胞血稽遲則有疹毒之證得其源而活法以治或聽其自然而不加妄治百無一死也附證己巳春長男甫六歲次男甫三歲於元旦次日俱發熱見疹余初不知疹之根源以為嬰兒生下時口含惡血開聲咽下其後發為疹毒治疹自當攻發即用清涼透發之劑服之次朝略增十餘點究不暢達心甚惶惑長男七月而生先天怯薄問其胸膈寬否何如答曰飢甚又問口味燥苦何如答曰淡甚因知其虛即投耆朮苓甘桂枝紅花一二劑次朝疹發遍身熱稍退而神情猶煩躁夜發熱頻咳嗽至一月方安蓋因見點之初過服表劑虛其經脈故也次男尚幼未省人事不能致詞上冬患肺風痰喘證諸藥不效服麻杏桂枝石膏湯一劑而痊謂其稟質略強不與長男同其疹不透必寒凝毒甚因與蘇麻前杏黃芩石膏藥紅點不增又與紫蘇蔥薑芫荽等熏之尉之疹總不出乃與同道諸公商之俱云舍透發並無別法至五日而口吐蛔蟲兒醫曰此熱極蟲生余有牛黃散可以服之牛黃散即大黃末也一服痰喘止而神氣稍平自是此兒遂無言矣計無可施復針百會穴開其瘄門服西黃分許及諸單方觀其形證實不能生友人張衛生來望因曰此大虛大寒證也今既無言又不能食恐無濟矣然心猶不忍勉投參附含藥而亡因自嘆曰此庸醫現身食報天理當然自身行醫何尤乎人因悔昔日所見之皆非益信治病求本之不謬次日有同居甥汪姓者伊子出瘄已經三日見余際悲傷不邀診視自用前杏麻黃石膏藥一二劑疹出二十餘點不能再增心胸煩悶不得已而告余乞余診視余曰若再攻發即如吾子矣急與耆朮芎歸桂苓紅花等服一劑而熱退身安余自此始悟疹之根源凡治疹但調其氣血和其經絡寒涼攻發概置之不用所以屢治而屢效也朱曰寒涼攻發而外又有調氣血和經絡一法金針度人須當切記次年春友人吳題仙之子甫二歲出瘄延兒醫馬聖則兄診治之攻發不透神情恍惚喘急不寧又延余診視余往吳宅聖兄先至余視之知其虛也因告主人曰若但發瘄瘄斷不出必至身命不保主人曰為之奈何余曰惟有溫補藥一劑益其臟腑安其腸胃助其氣血方可聖兄曰吾治四朝不能透發悉聽尊裁余即與耆朮薑桂歸芍苓甘銀花紅花諸味一劑而安次日仍用原方加人參一錢此後並不服藥連服獨參湯數日霍然矣又有夏姓耀如之子出瘄其顏色紫黯神氣不寧余曰此證大凶治須得法連看二次皆用溫散藥次早其家人來告曰口吐蛔蟲另有藥否余曰昨藥二劑俱服否耶曰尚存一劑因與附子八分令入藥內煎服自此遂無音耗越三載至其家見其子長大余因問曰昔年出瘄吐蛔何由得愈其家答曰服先生之藥後因無力相延仗天覆庇得以漸愈余默嘆曰因死吾子得生他人治疹之法可無憾矣余因附載斯冊雖不能見信於兒醫而正道闡明實有裨於兒科治疹之根源而為有子出瘄者所當致慎也夫麻症補論麻科一症內經未嘗談及近行世諸書皆云麻稟陽毒藥宜涼解其說是矣但麻之將出熱亦三日體亦微汗須慎風寒戒葷腥苗以紅活為貴若飲食有味二便如常自可勿藥有喜惟小兒平日氣體壯實飲食易化出麻時惡熱喜冷大便結而燥小便赤而短口鼻出氣如火得一二涼劑而火退矣倘多服涼劑變症百出或神目昏暗或手足瘛瘲或寒熱乍發或吐瀉交作舌雖黑而有液唇雖焦而帶涼此乃實熱化為虛寒若概用寒冷克削勢必驅之於不活而後已竊謂當此吃緊之時急用峻補二三劑繼用平補二三荊峻補宜近效湯平補宜理中湯二湯重加分兩有鬼神不測之機有造化可回之力仲景所謂補天手段者此其候也願以質諸世之知醫者近效湯時方大川附熟附不用漂白朮焦術不用炙甘草生薑三片紅棗四枚引理中湯經方漂白朮老幹姜潞黨參炙甘草不用引上補論一首並附二方蓋廬陵王耕心茂才嘗出方經驗而創此論也頃重刻麻科活人全書工甫竣獲見之其意旨全書中亦嘗論及閲者或致忽略因附刻於後以為神而明之者一助
