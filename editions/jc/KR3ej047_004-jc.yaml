body:
  text: 卷之四眼光如水眼眶紅爛羞明赤腫眼淚生翳第七十四眼光如水是何因肝腎之熱極而興未發初潮必見此如無斯候別病侵目赤弦爛淚常淋非因被風即煙燻治若不早成痼疾急為疏通奏奇勳熱毒餘毒上攻目羞明怕日眵淚多暴赤腫閉目生翳眼眶皮爛宜清毒眼光如水此肝腎兩經熱極所致乃麻之正候也未發熱與初熱之間有此症者方為出麻之候如無此症即非麻候如有麻毒入目生翳障者以蟬菊散主之如熱毒上攻眼目生翳並暴赤羞明者用羌菊散主之朱曰麻後白翳攀眼不退有秘方用雞肝一具麝香少許拌入雞肝內隔水蒸熟食之食七次必見效大便滑者去大黃少加生枳殼微導之如麻後餘毒不解上攻眼目羞明怕日雲翳眵淚俱多紅赤腫閉用羚羊角散去黃耆升麻加連翹牛蒡子黃連主之如麻後眼目生翳目赤紅腫眼眶皮爛俱宜用朱純嘏加減清毒撥翳湯主之其有眼眶紅爛常多淚者其症多因麻之正收時及麻收後不避風寒為風熱所侵或被煙燻皆能令目赤弦爛而常流淚當即為疏解急以柴胡飲子治之若日久不治則為終身痼疾朱曰眼眶紅爛小兒麻後往往有此皆因不避風寒風挾熱上攻所致蟬菊散治痘麻入目或病後生翳障蟬蛻去土淨白菊花去梗葉淨各等分為末水煎加蜜汁少許再煎食後溫服羌菊散羌活白菊花蟬蛻防風木賊梔仁大黃穀精草白蒺藜黃連沙苑蒺藜甘草為末清米水調下一錢羚羊角散羚羊角鎊屑黃芩草決明車前子防風大黃芒硝黃耆升麻水煎稍熱服朱純嘏加減清毒撥翳湯此方最驗可隨症加減生地黃一錢五分甘菊花黃芩酒炒牛蒡子連翹各七分當歸尾柴胡各八分川芎六分紅花木賊各五分草決明炒白蒺藜炒去刺各一錢甘草去皮三分水煎服柴胡飲子治風熱眼眶赤爛柴胡羌活防風赤芍桔梗荊芥生地黃各一錢甘草五分水煎熱服眼閉第七十五未曾睡著閉雙眸脾經火旺欠清消正收收後多見此急宜利水清上焦眼閉之症非熟睡而兩目閉謂未曾睡著而雙目自閉也其症多見於正收及收後蓋因脾經之火旺盛未消而然治宜清上焦之熱兼以利水為急以瀉白散加木通薄荷葉玄參牛蒡子連翹荊芥治之火退而目自開矣或問脾火旺當用瀉黃散而用瀉白散何也曰土為金之母實則瀉其子朱曰眼閉一證亦有因多服清涼之劑而然者蓋太陰主開多服清涼脾陽受耗失太陰主開之效用瀉白散治肺熱咳嗽手足心熱桑白皮薑汁和白蒸地骨皮去骨各一兩炙甘草五錢淡竹葉一把糯米一百粒引水煎服加陳皮桔梗亦名加味瀉白散有熱更加知母黃芩或問地骨皮乃三焦氣分藥而瀉白散用之何義也曰三焦屬腎腎為肺之子實則瀉其子也眼多眵涕第七十六眼多眵涕本屬熱脾肺二經火未息無分初起與收後清降肝脾火為急眼生眵涕者脾肺火甚故也見此症者無分前後即當清降肝脾之火以瀉白散見七十五條除甘草加龍膽草治之白珠紅赤第七十七白珠絡屬手太陰初熱紅赤是本經正收收後仍赤紅肺家風熱猶未清目之白珠屬肺今麻之發正合本臟故初發熱之時未出麻之際目即赤紅此正候也如出現後及正收與收後而白睛仍前赤紅者此乃肺經風熱未盡所致宜清肺瀉火為急以瀉白散見七十五條加荊芥薄荷葉連翹元參牛蒡子治之赤而腫痛者風熱上壅也以加味導赤散見四十九條加荊芥治之朱曰凡風熱白睛紅赤此二方皆可生效雀盲第七十八麻發於心火烊烊丙子反侮壬癸鄉以致麻後患雀盲照月夜靈四六湯雀目者每至日暮而眼不能見物是也又名雞目瞎又名高風障經曰眼得血而能視肝臟血肝血有虧兼之火邪旺盛熬於壬癸津血虧耗致病雀目至日暮屬陰之時而目不能視物矣治法宜以四物湯見二十五條合六味地黃湯加石決明夜明砂主之或以照月飲決明夜靈散治之亦可六味地黃湯熟地黃一錢山茱萸五分淮山藥炒五分白茯苓七分五釐牡丹皮去骨七分五釐澤瀉七分五釐水煎空心服照月飲治雀目立效真雄黃研細水飛過用活雞剖開取熱肝搗極爛入雄黃末五釐溫酒調服決明夜靈散治男婦大小眼目至暮則昏夜間雖有燈光月亮不能視物朱曰此方治雀盲頗有奇效惟必多食石決明炒夜明砂水淘淨各二兩公豬肝一兩母豬及瘟豬之肝切不可用用羯羊肝更妙右肝勿犯鐵器以竹刀切肝作兩片將藥末鋪於一片肝上將第二片肝蓋合用線紮緊勿令藥末漏出放入砂罐內以淘米泔水一大碗煮肝煮至米泔僅存小半碗時去火於臥時以藥肝與汁一齊與服前方石決明鎮腎益精以之為君夜明砂升陽主夜以之為臣米泔水主脾胃以之為佐肝與肝合以類相從引入肝經以之為使口氣臭第七十九足陽明經有蘊熱口中因之有穢息倘或臭氣不可聞縱是神仙醫不得口氣穢濁乃熱邪蘊積於胃宜用清金降火之劑為急以清胃散少用升麻以開提胃氣加連翹牛蒡子治之如麻收之後有口臭口瘡唇爛兼之咽喉疼痛者以生地敗毒散除去赤芍桔梗甘草柴胡加黃連治之其有口臭不可聞者此是胃爛必死之症若其人原有口臭者則不在此例當詳問施治朱曰口臭一證有自少至老不愈者惟麻時口臭不可不注意清胃散症治與六十二條加味清胃散同生地黃四錢當歸黃連酒蒸各三錢升麻一錢五分丹皮五錢石膏引生地敗毒散生地黃一錢五分丹皮黃芩酒炒柴胡各七分牛蒡子炒連翹天花粉元參金銀花桔梗各八分薄荷葉黃柏赤芍各五分生甘草去皮三分熟石膏淡竹葉各一錢燈心五十寸引水煎另以犀角磨汁對服口瘡第八十心脾胃經毒未降熱壅上焦口生瘡滿口唇舌俱赤爛獨有牙齦不受傷口瘡之症滿口唇舌生瘡或黃或赤或白而爛獨牙齦無恙者即是也其症多見於正收及收後乃心脾胃三經火甚餘熱未盡而毒壅上焦下必大便燥結小便赤澀治宜清利心脾之火兼潤大腸之劑以導赤散見二十五條去甘草加豬苓澤瀉以導脾胃之火火麻仁杏仁以潤大腸之燥若得大便通利小便頻行其毒自退外以綠袍散吹之如乳下嬰兒乳母有熱亦當服藥使乳無熱兒亦清安以釀乳方去甘草與乳母服之若麻收之後口瘡唇裂者均宜以秘本洗心散去麻黃或以河間涼膈散見二十六條去芒硝甘草俱加石膏牛蒡子下之如系牙疳之症則又從牙疳門施治綠袍散治一切口瘡腐爛朱曰綠袍散治口瘡神效荊芥穗薄荷葉青黛各三錢元明粉硼砂各二錢百藥煎二錢五分甘草一錢五分為末點舌上令其自化或用新汲井水和蜜調點舌上亦可釀乳方木通澤瀉豬苓生地黃赤茯苓天花粉連翹黃芩西茵陳甘草梢燈心引水煎上藥候乳母食後令捏去宿乳服之服後令乳母仰臥使藥味傳貫於乳再令乳母略去乳汁少許然後以乳哺兒仍以此藥與兒同服秘本洗心散專治口舌生瘡當歸生地黃木通黃連大黃薄荷葉麻黃茸各等分燈心引水煎服舌生白珠第八十一舌上累累生白珠心脾鬱熱致災危急宜清心與降火依法調治症自除舌者心之苗而脾脈又絡於舌心脾二經之熱無所泄而發於舌故舌生白珠累累如粟甚則上齶牙齦滿口遍生其症多見於正收及收後法當以朱氏洗心散去甘草加黃連或加味導赤散見四十九條加麥冬治之如大便不通者以洗心湯去赤芍甘草合瀉心湯加石膏牛蒡子或以河間涼膈散見二十六條去芒硝甘草加黃連石膏牛蒡子治之外以桑白皮搗自然汁塗之或用塗方塗之或用綠袍散見八十條點之如食乳孩子以釀乳方見八十條去甘草與乳母服之朱曰凡一證當知從何經發出如此證讀內經者即知發於心脾二經之熱據經用藥自可迎刃而解朱氏洗心散治心經有熱口舌生瘡白珠等症生地黃枯黃芩麥冬歸尾知母薄荷葉甘草鮮藕節側柏葉引甚者加黃連水煎服洗心湯治心熱白珠滿口二便不通防風荊芥黃芩木通大黃連翹生地黃歸尾赤芍甘草燈心引水煎服一書無赤芍有黃連有潮熱加柴胡羌活一書有潮熱加黃連骨皮元參黃柏梔仁瀉心湯川黃連為末臨臥蜜水調服塗方治口瘡甚者黃柏去粗皮銼碎以蜜炙黃色青黛各等分為末以蜜調塗患處塗方薄荷葉黃柏硼砂冰片黃連為末以蜜調塗患處牙疳第八十二陽明胃火留為殃毒上衝牙生疳瘡此症非同口瘡比頃刻能令性命傷麻毒流連走馬疳牙齦黑爛食難嘗敗唇崩鼻牙齒落漏頰穿腮旦夕亡牙疳者專於上下牙齦腐爛其毒最重其症最危非若口瘡舌珠之比此乃胃火留而不去餘毒上衝所致急宜清胃涼血佐以潤大腸之劑以秘本加味清胃散加石膏荊芥火麻仁杏仁治之大便秘者以秘本洗心散見八十條去麻黃加牛蒡子石膏微利之有用當歸散者實屬無濟方仍存之外以桑根白皮煎湯漱洗以馬鳴散文蛤散救苦散無比散燒鹽散等方隨用以塗之若麻一出即收麻毒收入於裡致生牙疳大熱譫語不食等症內宜用涼解之劑以加減清胃湯去陳皮桔梗甘草加黃連葛根牛蒡子主之外以熟附子切片將水煮軟敷患者兩手心兩足心以拔之如麻後牙疳腫痛者以清胃散見七十九條加荊芥元參牛蒡子主之外以尿桶中白垢火煅如鹽加冰片研和蜜調搽之凡麻後牙齦黑爛肉腐出血呼吸氣息臭氣衝人者名為走馬牙疳急用尿白火煅加冰片以蜜調頻塗或用馬鳴散等方或以龍硼散黃龍散雄黃散神授丹等方吹之又或以黃連硼砂各一錢膽礬三分冰片五釐研末搽之再加白鹽梅燒灰存性人中白火煅同研搽之更應內急以生犀地黃湯加石膏治之俟症平以四物湯見二十五條用生地黃加木通梔仁生犀角西茵陳以利小便使熱血下行而毒火不致上衝矣若牙疳白色為胃爛不治之症有用慄樹根白皮煎水洗患處而以五倍子雄黃百草霜枯明礬為末吹之者間有取效未必全驗也若通齦白色自外延入內者無膿血者牙眶爛而口臭者喘促痰鳴者面頰浮腫者環口青黑者頰漏腮穿者喉穿齒落者唇崩鼻壞者皆不治之症也朱曰牙疳證雖危險內外治法極多按法治之自可奏效尚有一種似牙疳者如小兒口內生毒塊不能食乳名螳螂子用生地酒浸搗爛塗腳心男左女右自愈又一外治法用生香附生半夏等分為末雞子白調作餅貼湧泉穴男左女右一周時愈秘本加味清胃散治斑疹口舌生瘡牙齦腐爛丹皮當歸生地黃黃連犀角連翹升麻甘草水煎服馬鳴散治走馬牙疳良方人中白即尿桶中白垢以竹刀刮取用新瓦盛以火煅之俟其色白如鹽取用五錢蠶蛻紙又名馬鳴退燒灰二錢生五倍子一錢明礬研細二錢又五倍子一個入明礬末於內裝不盡再用五倍子一個裝盡以火煅之俟以礬枯為度取用同為細末先用米泔水洗患處然後以末搽之文蛤散雄黃五錢枯明礬五分蠶蛻紙燒灰一錢生五倍子一錢又五倍子一錢同明礬炒枯用為末先將米泔水洗患處然後以末搽上一日數次以愈為度救苦散治口瘡牙疳人中白火煅五錢寒水石飛過三錢青黛五分殭蠶炒黃柏冰片各一錢五分牛黃二分為末先以苦茶洗患處然後以末搽上三五次少愈十次全愈無比散治牙疳腐爛黃牛屎煅冰片少許為細末吹患處燒鹽散治牙疳潰爛取椽斗大者實鹽滿殼合起將鐵絲扎定燒化存性以椀復地片時取起加入麝香少許研細塗之椽音許即栩字詩陳風宛丘之栩柞櫟也一名杼三四月間開黃花八九月內結子子如皂鬥子外有房可染皂加減清胃湯治麻後口瘡元參連翹生地黃黃柏麥冬木通白茯苓天花粉陳皮桔梗甘草燈心引龍硼散治麻後口瘡牡黃牛屎尖煅明礬五分冰片一分五釐朴硝一錢硼砂二錢為末以鵝管盛末吹患處黃龍散牡黃牛屎尖煅冰片一分為末以鵝管吹患處雄黃散雄黃一錢黃柏二錢麝香一分為末先以艾葉煎湯洗患處然後以末搽之以愈為度神授丹枯明礬七分麝香一分白氈灰三分為末以竹管盛吹患處生犀地黃湯連翹葛根元參黃連生地黃荊芥穗升麻甘草生犀角另磨水煎入犀角汁二三匙對服狐惑第八十三上唇生瘡蟲食臟下唇生瘡蟲食肛此名狐惑非佳候化䘌丸兒酌治良上下唇口多瘡其聲嗄啞者名曰狐惑其義云何乃出自傷寒指掌之言謂上唇多瘡者蟲食其臟名曰狐下唇多瘡者蟲食其肛名曰惑蓋取其進退猶豫之義也大非美候宜以秘本化䘌丸或古方化䘌丸酌量而治之如更煩躁昏悶失聲者死症也秘本化䘌丸君子肉蘆薈煅龍膽草各二錢五靈脂一錢五分黃連二錢川楝子一錢五分烏梅為末以烏梅去核搗爛合丸白水下古方化䘌丸黃連五錢蜀椒閉目者勿用去杆炒二錢苦楝樹根白皮曬乾二錢為末用烏梅肉七枚以艾湯浸搗爛合丸艾湯下咬牙第八十四咬牙之症非痘比痘有寒熱二症分喜食熱物四肢冷下血咽痛見閻君咬牙雖非痘症比亦有寒熱二症分未曾服藥從熱治過用寒涼又宜溫麻之咬牙非若痘比痘症咬牙有寒熱二症之分而麻症咬牙皆屬熱候乃陽陷於陰故多發渴而手足俱熱喜飲食冷物治宜滋陰降火以麥冬湯去白芍加丹皮治之若手足俱不熱而反厥冷喜食熱物此為熱邪內亢後必下血咽痛痰鳴而死即以白虎湯見二十六條治之然多不可救若飲食犯椒姜辛辣助熱等物更非所宜然麻後咬牙亦有虛實不可執泥無虛實之說但不與痘症比耳麻後咬牙其先未曾服藥而咬牙者乃實症也解毒乃止而三味消毒飲見三十三條之類可以隨證加減而用若已經服藥而咬牙者恐服寒涼之藥過多有傷氣血而然宜以四物湯見二十五條加人參治之朱曰實證宜解毒易治多服寒涼傷氣血非大醫不能治矣麥冬湯治痘症便實而渴生地黃當歸身白芍藥麥冬水煎服舌胎第八十五舌胎雖當分顏色黃為胃火白肺熱惟有黑胎莫相逢麻症逢之心經絕舌者心之苗心為君火麻本火候故舌有胎胎有黃白黑三種白胎為肺熱黃胎為脾胃熱均當清解疏利更兼外症參詳而治如宣毒發表湯見第五條去升麻桔梗甘草葛根解肌湯見第五條去赤芍甘草葛根疏邪湯見三十三條防風敗毒散見第五條去桔梗甘草蘇葛湯見第六條去柴胡赤芍甘草俱可隨症加減而施純黑者則為心絕黑而濕者熱淫血分黑而燥者熱淫氣分皆為危候此症無分首尾均宜清熱疏利一例而治並宜用白虎解毒湯見二十六條黑而濕者多用生地黃元參燥者倍用黃連黃芩麥冬淡竹葉加地骨皮木通黑色漸退者吉不退者不治唇燥第八十六唇燥火熱在胃脾紅赤熱重淡白微若帶紫黑而燥者苦寒之味始相宜唇燥乃脾胃二經之熱其症有三一則唇淡白而枯燥者其熱尚微以白虎湯見二十六條去甘草粳米加麥冬木通牛蒡子治之一則唇赤而枯燥者其熱極深以白虎解毒湯見二十六條加元參牛蒡子連翹木通治之一則唇帶紫黑而枯燥者其熱劇而重也以白虎解毒湯見二十六條加犀角汁元參牛蒡子木通車前子治之惟宜隨症輕重以清熱分利方稱良工唇舌破裂第八十七少陰太陰火上衝唇舌必然見赤紅正收收後唇舌裂心脾已絕歸羅酆唇舌破裂此心脾之火甚上衝也其色必深赤間有紫黑者若初發熱及正出之間唇舌紅而破裂者此症還輕斯時其毒在未出將出之際若得火輕血活內能托出口能食物斯為可治藥宜用寒涼加以疏托之劑以白虎解毒湯見二十六條加元參牛蒡子荊芥葛根薄荷葉治之若正收與收後而唇舌破裂者以白虎解毒湯見二十六條加黃柏元參山豆根木通治之若唇舌破裂而紫黑枯燥此心脾二經俱絕兼之血不活者則難治矣咽喉痛第八十八火邪拂鬱咽喉痛射干鼠黏湯可用吹喉惟有十宣散莫犯金針病增重毒火熏蒸氣上炎咽喉自此正疼煩從來麻症多咽痛莫作尋常喉痹看麻症屬火咽喉疼痛亦是常候乃毒火拂鬱上熏故咽痛也切勿誤認作喉痹而妄用金針去其血初潮咽痛者以宣毒發表湯見第五條去升麻甘草桔梗加射干山豆根主之外以十宣散吹之有以甘桔湯加牛蒡連翹升麻治之者萬不可用方已芟已出而咽痛者以靜遠主人射干鼠黏子湯去升麻桔梗甘草或錢氏甘露飲去熟地黃酌用石斛茵陳加牛蒡子射干防風主之麻症有咽喉痛者不拘初熱正出已收俱以射干牛蒡子山豆根防風煎湯與服外用十宣散吹之或用二聖散吹之如麻症有結喉等候以射干消毒飲見五十三條去甘草加防風主之如麻毒上攻咽嗌腫痛熱渴或腫毒不消等症以加味骨皮清膈散見五十條去當歸滑石桔梗甘草紫菀加石膏元參麥冬薄荷防風牛蒡子主之有以大如聖飲子治之者非惟不識避忌而實於病無濟方姑為收錄如麻症血熱咽喉不利者以加味消毒飲去甘草加射干生地黃或以紫草消毒飲去甘草加生地黃防風射干治之如咽不利而兼風熱咳嗽者以射干消毒飲見五十三條去甘草加防風連翹桑白皮貝母治之如咽痛而麻不大起發者以消毒飲見二十三條去甘草加葛根前胡射干主之如肺熱咽痛聲音不清者以全書除熱清肺湯見五十五條去石膏加射干牛蒡子黃連主之有以甘桔清金散治之者不可輕用方仍收大凡麻症咽痛不堪者照症用藥而外不拘前後外用十宣散二聖散玉鎖匙化毒丹等方任憑選用吹之靜遠主人射干鼠黏子湯射干山豆根各一錢五分牛蒡子紫草紫菀茸各一錢蟬蛻升麻各六分木通石膏桔梗各八分甘草五分燈心九根引水煎食後服錢氏甘露飲治心胃熱咽痛口舌生瘡痘疹熱毒上攻牙齦腫牙齒動搖天冬麥冬生地黃枳殼炒釵石斛去苗黃芩熟地黃茵陳枇杷葉甘草水煎食後服牙齒動搖者並以此漱口加味消毒飲牛蒡子一錢五分荊芥七分防風六分紫草茸一錢甘草五分糯米一撮引水煎不拘時服紫草消毒飲紫草連翹牛蒡子各一錢荊芥七分山豆根甘草各五分水煎不時溫服十宣散黃連黃芩黃柏各一錢兒茶雄黃苦參各五分硼砂五分乳香一分元明粉三分冰片少許臨用時下入藥內為末每用五釐以竹管吹入喉中二聖散苦參三錢殭蠶二錢為末吹喉二三次即痛止腫消玉鎖匙焰硝二兩五錢硼砂五錢殭蠶二錢五分冰片一釐為末每用五分吹喉化毒丹薄荷葉荊芥穗雄黃辰砂各二錢朴硝一錢牙硝硼砂甘草各二錢五分桔梗五錢山豆根一錢五分為細末以竹管吹入咽中或以水調服大如聖飲子牛蒡子桔梗甘草各一錢麥冬五錢水煎服甘桔清金散牛蒡子七分連翹甘草各五錢桔梗一兩訶子皮三錢為末薄荷少許煎湯下一錢或加薄荷水煎服亦可若非聲音不清者則去訶子皮附治平常咽喉方備用射干鼠黏子湯治咽痛牛蒡子四兩射干升麻甘草各一兩水煎服甘草防風湯甘草一錢防風二錢桔梗六錢水煎服加味甘桔湯治咽喉暫用桔梗八分甘草一錢二分牛蒡子射干各六分防風元參各四分生薑一片引熱甚者去防風加黃芩五拗湯治咽痛麻黃杏仁荊芥桔梗甘草姜引水煎服射干散治咽喉腫痛射干元參各錢半牛蒡子一錢升麻八分桔梗甘草各一錢水煎服海上方治骨鯁金鳳花根打碎以米醋煎用有嘴壺盛之令患者將口銜壺嘴仰面咽之其骨即出吞藥之時勿令沾牙或用玉簪花根威靈仙根如前法治之亦可頭疼背強頭項腫遍身痛第八十九寒熱頭疼兼背強遍身痛楚苦難當更有頭項俱腫者都緣毒火未清降麻症本類傷寒倘或不避風寒未經清解邪火內迫毒攻於裡症生多端或有傷寒並作頭疼背強或頭面頸項浮腫或脈強火盛大熱作渴或麻收之後發熱而遍身疼痛種種症候在所不免急宜清火解毒如寒熱並作頭疼背強者當用表散以宣毒發表湯見第五條去升麻桔梗甘草略加白芷治之有加羌活者大非所宜頭面頸項腫者以宣毒發表湯見第五條去升麻白桔梗甘草加葶藶主之脈強火熾熱盛作渴者則以白虎解毒湯見二十六條主之如麻出稠密遍身疼痛煩躁者以涼血飲子見四十五條去赤芍加連翹牛蒡子主之如麻收後遍身疼痛者以古方黃連解毒湯見三十五條加葛根前胡白芷防風治之有加升麻羌活者亦非所宜朱曰時醫不敢用表散蓋慎之也惟麻證則必須表散如項腫遍身痛以及腹腫腹痛證皆毒邪閉塞證雖凶猛用清熱解毒佐以表散無不奏效如神腹痛第九十腹痛原因毒內攻首尾治法不相同清解通利消飲食更分虛實莫朦朧腹痛之症不一總由火毒內郁而不能出或為風寒壅滯遏抑或因飲食停滯不化而皆能致痛若見於初熱正出之間風寒壅遏毒反內攻而腹痛者急與疏表麻出透而痛自止以宣毒發表湯見第五條去升麻桔梗甘草淡竹葉或葛根解肌湯見第五條去赤芍甘草加枳殼或葛根疏邪湯見三十三條治之若飲食過傷腹滿脹痛者以枳實導滯化毒湯去山楂厚朴檳榔甘草治之有用平胃散加神麯山楂麥芽枳殼木通治之者治腹痛滿固當而治麻腹痛亦非所宜方仍附收大便秘者加丑牛或大黃以利之小便赤澀不通者加豬苓澤瀉以導之若於正收及收未盡之時而腹痛者乃外邪未盡而復入里所致宜兼清中外法當疏托佐以清解使毒復出而痛自止以清熱透肌湯見二十五條加枳殼木通黃芩治之如麻全斂之後而腹痛者治宜清涼解毒佐以風藥兼分利餘熱使毒內消而痛自愈以化毒清表湯見十六條去知母花粉桔梗甘草加枳殼治之又須驗其有無他症分別屬虛屬實而治若邪熱內結而腹痛者以通利大便為主以河間涼膈散見二十六條去甘草治之如麻後脾氣不調而致腹痛面目四肢浮腫者以分利小便為主以導赤散見二十六條治之腹疼而小便不通者以導赤散見二十六條加芍藥治之若麻症毒重腹痛煩躁潮熱者以連翹敗毒散去赤芍甘草治之倘腹痛不止加黃連麥冬治之若麻症首尾肚痛者此皆由毒火內蘊而然宜先發散以防風敗毒散見第五條去桔梗甘草治之後以山楂肉煎湯與服至若元氣大虛陰陽不能升降小水不利遍身浮腫喘促兼見者則難治矣枳實導滯化毒湯枳實青皮麥芽木通連翹赤苓牛蒡子山楂肉檳榔厚朴甘草燈心引水煎服連翹敗毒散連翹防風牛蒡子荊芥木通赤芍甘草水煎服平胃散治胃中宿食不化藜藿之人宜之厚朴去皮薑汁炒蒼朮米泔水浸去皮麻油拌炒黃色各四錢陳皮去白炙甘草各二錢姜引水煎服腰痛第九十一麻疹腰痛症候惡嬰兒罕有男婦多男為腎敗女血耗治法不同切莫錯麻疹之症原系胎毒所感而發而臟腑所蓄之毒因之而泄故諸經皆有見症惟腎為清淨之府不宜見症腰者屬腎膀胱之絡系焉故凡麻症多忌腰痛如見腰痛則為逆候然腰痛之症幼孩罕有惟男婦多有腰痛者何則蓋男人有五勞六慾之傷腎多虛弱麻乃火候丙丁熬煎壬癸必涸麻收之後陰血必虧津精重耗故多見斯症乃為腎敗之候最為難治宜以四物湯見二十五條合六味地黃湯見七十八條加枸杞杜仲故紙之類主之如尚有餘毒未盡者更加牛蒡子連翹治之如兼有潮熱者加酒炒黃連黃芩鹽酒炒黃柏地骨皮等藥治之如初熱正出已出之時腰痛者則於宣發清解藥中多加生地黃當歸以滋養之若婦人出麻之際或值經來之時或因熱重迫血妄行天癸非期而來血既下行已經暴耗兼之毒火熬煎耗中加耗人身之血能有幾許當此重耗未有不生腰痛之疾者凡有此候急宜以四物湯見二十五條多加元胡索主之倘仍有餘毒未清者或兼有潮熱者則仍加炒黃連炒牛蒡連翹之類以解其餘毒清其餘熱如見於初潮已出之間者則亦於宣發清解藥中多加生地黃元胡索當歸治之總宜急為調治免致奪血而亡之患朱曰治腰痛法皆井井有條氣痛第九十二氣疼皆因風邪干內有餘熱與風摶此症逢之休妄治法當寒熱分兩般麻症氣痛皆因內熱未泄外為風寒所襲食熱相搏內外夾攻致有此候然有寒熱之分寒者易治熱者難為治之者先宜探其寒熱而施治方無差謬凡遇此候先以冷飯炒熱以絹包裹乘熱而揩其胸喜揩而痛稍減者此寒多熱少以香茱湯與之頓服得吐則寒邪外泄而痛即止不吐亦即痊愈若揩之而更加痛者此內熱已極外感最深熱毒風寒搏結胸中吐之難減下之不利溫之增劇涼之弗息延經一二日肺胃腐敗而死雖用清熱保肺清胃之劑亦僅十全一二而已朱曰試氣痛寒熱法甚精然炒熱鹽試之亦未嘗不可腹痛不僅有寒熱兩證因氣因血因痰因食且有虛痛有實痛原因不一香茱湯治寒痛絞腸痧等症香附米吳茱萸五靈脂俱用醋炒臺烏藥各三錢水煎濃汁頓服中病即止頭溫足冷下體冷過膝四肢身體冷如冰第九十三麻症屬陽身宜溫身不溫暖有災迍首尾不溫非美候變症一見謁閻君頭溫腳冷症候逆初出見之且莫急正出正收腳仍冷縱有神方也無益遍身發熱麻之常若不發熱苦難當收後下體冷過膝此為腎敗治無方四肢身體冷如雪初熱見之毒難出正收收後逢斯症脾胃敗壞死可決痘症頭溫足冷為順如麻見頭溫足冷之症則為逆候然而麻症有下身冷者亦有順逆但有先後之分耳何則麻之為症上膈主之必從頭上熱至腳其初熱時上身壯熱下身及腳涼冷必須壯熱至足麻方得出故初發熱之時下身及腳涼冷此為順候若出後及正收之時則上身下體俱以不冷為佳此時下身冷者則為逆候至於麻收之後則宜遍體溫涼如常倘有麻收之後雖遍身溫涼如常獨下體厥冷過膝上止者此為腎敗不治之症若初出之時腰以下不熱毒不能透而反漸收者亦為逆候急當溫養脾腎或有得生者溫脾如白芍藥炙甘草之類果仁白朮等味在所宜禁養腎如熟地黃當歸之屬杜仲枸杞等味又在所必忌只可用養陰湯見三十二條去麥冬元參薄荷荊芥川芎加炙甘草以補其脾養其腎耳夫麻乃肺胃邪熱所發本屬於陽故四肢身體常宜溫暖若四肢身體反冷如冰者則是大逆症矣若初出正出之時四肢身體冷如冰者則毒不得透而麻必漸收若正收及收後肢體冷如冰者此乃脾胃敗壞氣血大虛毒必不盡定不治矣瘧疾第九十四麻疹寒熱似瘧症柴苓湯兒加減進收後患瘧用鱉甲神而明之醫中聖麻症初熱已出之時有寒熱似瘧者此時切不可專以瘧疾施治宜以葛根疏邪湯見三十三條加薄荷葉主之至出盡之時如有寒熱似瘧者以柴苓湯去人參半夏肉桂白朮加貝母骨皮治之如麻後竟成瘧疾者治法以清涼健脾開胃為主宜以靜遠主人鱉甲飲主之渴者加熟石膏少許不渴者方中之麥冬知母須除去之夫瘧多因脾虛生痰而作若出麻之後果是瘧疾並無餘毒則柴苓湯中之人參半夏又何妨施用但肉桂白朮不可輕使耳又何必拘泥麻初常法麻後餘邪等症之不宜用燥悍之藥耶如小柴胡湯見二十二條正所宜用所謂神而明之存乎其人者此也朱曰瘧之原因甚多當因其見證而治之不必拘於一證亦不必拘於一方柴苓湯柴胡半夏人參黃芩甘草豬苓澤瀉白苓白朮肉桂薑棗引靜遠主人鱉甲飲九肋鱉甲新瓦上焙以醋淬數次至黃色研為末再用醋拌炙乾二錢山楂肉去子三錢麥冬薏苡仁炒各五錢白茯苓二錢橘紅二錢五分知母一錢二分乾葛白芍各一錢五分柴胡二錢貝母三錢淡竹葉一錢炙甘草七分姜引水煎服沉睡昏睡似寐非寐煩躁不眠第九十五沉睡昏睡似寐同卻有分別在其中更有煩躁不眠者臨症無訛是良工沉睡者謂沉沉熟睡精神意志清白者是也夫麻原屬火候火症得安靜沉睡本為上吉然當分首尾而治正熱出現之時其人精神困倦沉睡少醒者則為逆候何則蓋緣正氣虧損邪火內郁而未能發揚於外乃正氣不勝所致後必變大發煩躁者有之宜以養陰湯見三十二條去熟地黃川芎白芍加生地黃主之若正收及收後能食而安靜沉睡者蓋緣氣血俱虛火毒退去而得安寧此為順候治法當以補脾養血為要以四物湯見二十五條加薏苡仁白茯苓主之又有一等名曰昏睡昏睡者調昏昏而睡不知起止雖睡多久醒來不知人事掐其頰車合谷二穴而不知痛者是也又有一等似寐非寐者此兩症無問正出收後見之良非吉兆多難治療當察其兼見何症而施治之夫沉睡昏睡兩症雖相彷彿而實不同昏沉二字醫家最當詳辨庶幾臨症無訛又有麻疹挾熱作麻不出煩躁不眠者法當解毒清涼以白虎解毒湯見二十六條加連翹牛蒡子以清解之熱除麻出而煩躁自寧可以安寢矣若收後煩擾而反不得寐者是餘火復燃急須滋陰養血以六味地黃湯見七十八條合四物湯見二十五條加生棗仁二三錢與服則陽自斂而得寐矣朱曰麻後煩擾不寐用六味丸加減亦是一法中惡第九十六麻疹收完幸平復動止如常飲食足心腹絞痛忽然亡此是氣虛中惡毒麻疹收完之後動止飲食如常忽然心腹絞痛而死者此是元氣虛弱兼之偶中疫癘之氣正不勝邪邪伏於中外若無病內已虧損故一中即死謂之中惡發搐第九十七痰熱聚於心胞絡喉中哈哈發驚搐未透之時反為吉慎勿妄投金石藥麻毒流連為壯熱煩躁不寧時搐掣養血散火清心肝神爽身涼生可決發熱無休神漸昏忽然瘛瘲似堪驚莫將瘋癇同調治小便通利即安寧麻之發搐不同常論乃痰熱聚於心胞絡中所致若見於發熱初出未透之時俱為無害而反吉治法宜以疏散之劑少加清涼之藥治之以清熱透肌湯見二十五條去生甘草杏仁加栝蔞霜淡竹葉治之若收後而發搐者則為難治法當消痰清上焦之火兼利小便只宜用輕清之劑調之不可誤用鎮驚金石之藥以加味導赤散見四十九條去薄荷石膏加貝母栝蔞霜主之如痰壅甚者以栝蔞仁一味煎湯與服以湧吐之如麻後渾身壯熱不除未至羸瘦但多搐掣煩躁不寧者此乃熱在心肝二經然不可與急驚同治以當歸養血湯去川芎甘草加酒炒黃連地骨皮與黃連安神丸相間而服或以安神丸去冰片甘草或導赤散見二十六條去甘草加人參麥冬煎汁送下治之小便清長者可治小便短少者不可治宜以抱龍丸與服若搐而喉中無痰鳴或自吃指者是非麻之發搐乃正虛不能主持之候也必死不治朱曰以栝蔞仁一味煎湯取吐為吐法另立一法當歸養血湯當歸川芎生地黃麥冬木通梔仁甘草淡竹葉燈心引黃連安神丸黃連當歸龍膽草硃砂各二錢全蠍水洗糯米拌炒乾七隻石菖蒲薑湯泡去毛薑汁蒸白茯神各一錢五分為末滾水和作餅蒸熟以獖豬心血同搗為丸以硃砂為衣黍米大燈心湯下十丸安神丸黃連當歸身麥冬白茯苓甘草各五錢硃砂一錢冰片二分五釐為末滾水和丸蒸熟以獖豬心血同搗合丸黍米大燈心湯下十丸抱龍丸琥珀天竺黃白檀香人參各一兩五錢白茯苓一兩五錢甘草去節三兩枳殼麩炒枳實麩炒各一兩辰砂五錢金箔一百張山藥去黑皮炒熟一兩牛膽南星一兩為末每藥一兩取新汲井水一兩同入乳缽內搗勻為丸如皂子大勿見日陰乾曬則燥烈每用一丸薄荷葉煎湯化下譫語第九十八手厥陰經心胞絡熱邪壅滯譫妄作正收收後兼涼血發熱正出用疏托譫語妄言其症皆由熱邪熾盛火毒壅滯於心胞絡而作若初發熱而煩躁狂言或麻隱而不出者以宣毒發表湯見第五條去升麻桔梗甘草煎汁調辰砂滑石末治之有用第二條納荊防敗毒散去柴胡川芎羌活人參甘草加木通豆根骨皮治之者並註記聽用若發熱未出正出之際而譫妄者俱為火邪內伏不得透表而致藥宜疏托佐以清涼分治之品以葛根解肌湯見第五條去赤芍甘草加麥冬赤茯苓石膏知母枳殼治之甚則加蜜酒炒麻黃以發越之使麻得以盡出肌膚而譫語自止若麻已出之後狂言亂語者以淡竹葉燈心煎湯調辰砂滑石末治之正斂及斂後譫語者藥宜清涼解毒佐以分利涼血之劑以白虎解毒湯見二十六條去天花粉加牛蒡子連翹木通赤苓以清解涼血而分利之有以竹葉石膏湯去人參半夏甘草梢粳米加生地黃治之者實為無濟使火退毒清而譫語自止矣慎勿遲延以致不救如熱輕餘毒未除者必先見諸氣色宜預防之始終以消毒飲見二十二條除甘草加連翹枳殼木通赤苓以分利之有用蘇葛湯加減黃連解毒古方治之者並註記聽用若麻收後餘熱內攻循衣摸床譫語妄言神昏志衰者死症也朱曰譫語有輕有重傷寒胃中熱甚上乘於心心為熱冒譫語不休其證至重故必下之此則僅僅妄言證之輕者故可以辰砂生地木通或白虎輩清之虛羸第九十九麻毒流連熱不除渾身似火毛髮枯尫羸漸漸成疳瘵得遇良工病可蘇麻疹收後身有微熱者此虛熱也不須施治待氣血和暢自然退去若麻疹既收其毒不解邪火拂鬱渾身發熱晝夜不退精神倦怠飲食減少或咳嗽不止或便泄不已或身熱不除形體羸瘦毛髮枯豎皆真元虛損所致若不及時調理恐成疳瘵之患倘不早治以致睡則揚睛口鼻氣冷手足厥逆微微瘛瘲變為慢風不救者多矣並宜以雙和湯去川芎以和之有嗽加橘紅貝母咳加麥冬百合有瀉加土炒白朮與炒扁豆如食難消化加砂仁麥芽如氣血俱虛以雙和湯合四君子湯見七十二條隨症調治之切禁用寒涼傷犯脾胃之藥專力資培緩圖平復可也愚按虛羸之候雖系真元虛損故不宜用寒涼傷犯脾胃之藥亦不宜驟用大補之劑但當清其餘熱滋其陰血和其脾胃平其肝氣殺其疳蟲使營衛和暢脾胃健運自然日漸平復神全體肥若以雙和散而治虛羸竟用耆桂是猶抱薪救火非惟無益而又害之矣曷若以柴胡四物湯見三十條去川芎加薏苡仁與清熱除疳丸去川芎加薏苡仁相間而服實為妥當若麻後元氣不復而羸瘦身無潮熱者乃脾胃虛弱所致調理脾胃平其肝木必漸漸康強以白芍湯主之或以八珍湯去白朮人參加芡實米薏苡仁治之慎勿輕用人參白朮恐閉其餘邪致難清理如麻收之後失於調理以致體瘦氣弱且又泄瀉將成疳積者宜以奇效神應肥兒丸或健脾肥兒丸治之如麻後眼青體弱精神不如平日又有咳嗽氣急者以蘇子四君湯加薑汁炒芥子光杏仁治之氣急甚者加籮卜子栝蔞仁治之若熱大甚或日久不減而漸羸瘦者總宜清熱平肝以柴胡麥門冬散見三十條加酒炒黃連黃芩骨皮治之甚則以古方黃連解毒湯見三十五條合人參白虎湯見六十四條與柴胡麥門冬散見三十條相間而服以治之朱曰清餘熱滋陰血和脾胃平肝氣殺蟲疳凡此數法真治小兒麻後虛羸之聖法清熱除疳丸黃連當歸各二錢龍膽草川芎各一錢青皮陳皮蘆薈煅乾蟾頭又名蛤蚾即蝦蟆火炙酒淬君子肉麵粉包煨去殼並黑皮各錢半為末神麯糊合丸米飲下白芍湯白芍藥炙甘草此二味為君蓮肉山藥扁豆龍眼肉青黛麥冬此六味為臣合三四劑水煎服八珍湯當歸川芎熟地黃白芍藥人參白茯苓白朮甘草薑棗引奇效神應肥兒丸治肌瘦面黃或面青而白泄瀉少食肚腹脹大青筋滿腹或傷飲食常有吐瀉尿如米泔及一切疳症人參三錢如力微者用一兩或以乳汁蒸北直參一兩代之大川黃連酒炒二錢臭芫荑炒擦去皮取淨者五錢君子肉麵粉包煨去殼並去內黑皮四十五粒夜明砂淘去土砂取淨砂醋炒乾一兩漂白朮陳壁土炒五錢不宜白朮者以薏苡仁炒代之吳神麯炒五錢生麥芽炒五錢天漿子即五穀蟲肉湯浸洗淨炒一兩淮山藥炒三錢小青皮醋炒三錢胡黃連酒炒三錢山楂肉去子湯洗三錢干蛤蟆火炙醋淬極焦三隻花檳榔三錢等合研為細末每早空心以米飲調下二三錢健脾肥兒丸人參陳皮甘草各五錢黃耆蜜炙扁豆炒山藥炒白朮泔水洗漂土炒白苓炒各一兩神麯炒楂肉去子各二兩百合當歸去尾各八分黃連酒炒三錢白芍酒炒地骨皮去骨酒洗各六錢陳皮去白五錢為末蜜丸彈子大老米為飲化下一丸雙和湯熟地黃白芍酒炒各一錢黃耆蜜和酒炒當歸各七分川芎炙甘草各四分上肉桂三分有熱者去之生薑一片紅棗一枚去核為引水煎服妊娠出麻第一百孕婦麻症若相當潮熱蒸蒸胎易傷子去母應無害事症輕子母兩無殃大熱蒸蒸血海乾毒火內攻胎不安急宜清熱養營血治不依法生禍端古云胎遇熱則墜麻為火候內必有熱最易墜胎孕婦出麻此症極險當於初熱未出之時須察其熱之輕重正出之際須驗其麻色之紅淡法宜疏解佐以清涼滋血安胎之藥不可犯動胎氣初熱時宜用參蘇飲去人參半夏木香陳皮加條實子芩大腹皮以發之或以四物湯見二十五條加子芩荊芥蘇葉蘄艾主之或以四物湯見二十五條加白朮錢半子芩蘄艾枳殼砂仁各二錢主之或以安胎散罩胎散主之始終以安胎清熱為主則胎不動而麻易出此理誠當愚按孕婦出麻初熱之時而用四物湯加白朮艾葉砂仁與夫安胎散罩胎散方中之人參白朮川芎砂仁香附白芍等味恐燥悍之藥觸動毒火而熱轉甚酸收之味斂固毒火毒只內攻麻難得出症必增危非但墜胎且難保妊婦無虞即如參蘇飲雖曰除去人參半夏木香陳皮而要知桔梗甘草亦不宜遽用莫若以宣毒發表湯見第五條去升麻桔梗甘草枳殼木通加當歸條實子芩生地黃元參酒炒黃連主之使麻毒透出內熱自退而胎自安矣麻出之後則宜以四物湯見二十五條加條子芩黃連牛蒡子之類主之至於麻收之後亦宜以四物見二十五條為主如安胎散罩胎散四物加白朮砂仁蘄艾及安胎飲等方俱可加減選用倘無溏瀉而大便閉澀結滯者則人參白朮又當慎用大抵凡一切實脾行氣溫燥之藥既礙麻症復傷子氣咸宜禁用為是朱曰妊娠出麻在不知者必詫為希奇其實男子在三十以內亦間出麻蓋麻為先天遺毒於本人氣血原相融洽故能留藏許久而始發出所云燥悍之藥觸動毒火酸斂之味斂固毒火真是至理名言當奉為金科玉律參蘇飲人參三分蘇葉桔梗葛根前胡各四分木香一分五釐陳皮茯苓各五分枳殼三分半夏甘草各二分生薑引水煎服安胎散人參白朮茯苓甘草川芎當歸身陳皮白芍藥大腹茸連殼砂仁蘇葉香附米條實子芩早米引水煎服初發熱加升麻葛根連翹麻太多加酒炒黃連牛蒡子山楂肉口渴加麥冬知母天花粉若系痘症痘不起發加牛蒡子倍用白芍罩胎散白朮當歸白芷白芍茯苓柴胡川芎阿膠陳皮砂仁甘草糯米引水煎服一書加乾柿蒂七個苧麻根七寸甜瓜蒂一個將藥入銀器內放水二鍾以薄荷葉蓋定煎至七分去渣仍將薄荷葉蓋之溫服按苧麻根蘇葉妊娠出麻初潮用宣毒發表湯內宜加入安胎飲孕婦出麻宜用條實子芩沉水者加二錢白朮當歸身白芍藥人參各一錢川芎陳皮蘇葉大腹皮黑豆水浸洗淨各八分連殼砂仁薑汁炒甘草各五分糯米一撮引婦人出麻適值經行及經水非正期而來第一百零一女人麻症最難醫陰質從來血多虧待得疹子將發日又恐天癸正行期發熱經行非正時火邪迫血血奔馳急須涼血停為美若待中虛悔卻遲正理論云嬰兒女子益以滋水以女子陰質血常不足也麻症血若不足多生變症故女子十四歲以後有出麻者常恐天癸正行血走氣虛而成伏陷也宜以養陰湯見三十二條去白芍川芎熟地黃加生地黃主之若女子出麻於發熱之時經水忽來卻非經水正臨之期此乃毒火內蘊擾亂血海迫血妄行故經水不依時下也宜以涼血飲子見四十五條去赤芍木通或涼血地黃湯見四十五條去甘草或元參地黃湯見五十八條去升麻白芍甘草俱加荊芥連翹牛蒡子主之或以古方黃連解毒湯見三十五條加生地黃當歸炒荊芥連翹牛蒡子治之總以涼血為主必得經止方妙如服藥不止久則中虛氣弱麻必隱伏產後出麻出麻胎墜第一百零二產後如逢出麻疹此時胎去免憂惶只憑補益功最效莫犯寒涼生氣傷嬰兒尚在母腹中天行麻疹正臨躬大熱蒸蒸胎因墜治法莫與產後同婦人血常不足產後則血更虧如產後又值出麻須當養血而略兼解毒之品以四物湯見二十五條少加荊芥牛蒡子主之不可妄用寒涼恐傷生髮之氣有用十全大補湯主之者但方內白芍肉桂須宜酌用若欲用之當俱以酒炒用以逐瘀生新白朮須以芡實米易之若系孕婦出麻熱甚胎墜不拘已現麻未現麻則竟以四物湯見二十五條加生蒲黃牛蒡子黃連黃芩連翹炒荊芥主之以去其舊汙生其新血解其毒而清其熱自獲奇效又不可拘產後之例宜用補氣血也十全大補湯人參白朮白苓甘草川芎熟地黃當歸白芍黃耆各一錢肉桂三分姜三片紅棗一枚引水煎服產婦麻後無乳第一百零三產婦麻後乳汁干心火煅煉竭津泉惟有養血為急務莫施峻劑塞乳源乳汁乃津液化成婦人產後去血過多兼之麻火煅煉血枯津涸故乳汁干竭宜養血以滋生化之源切不可妄用峻補之藥塞其湧泉之源也宜以四物湯中見二十五條加花木通主之麻後遍身腫第一百零四遍身浮腫因何作只因麻後氣血弱嬰兒閨秀從無此老翁婦人此候多麻後遍身浮腫童孩罕有此候惟老人婦人多有之蓋老人氣血本虧兼之麻火耗血以致出麻之後遍身浮腫宜以四物湯見二十五條合四君子湯見七十二條去白朮加薏苡仁甜葶藶治之若女人麻後遍身浮腫必系初熱正出已出之間適遇經行陰血重耗故麻後遍身浮腫如無餘熱便閉等候則當以養榮湯或四物湯見二十五條或四君子湯見七十二條俱多加甜葶藶以治之養榮湯治脾肺氣虛營血不足驚悸健忘寢汗發熱食少無味身倦肌瘦人參白朮土炒黃耆蜜炒炙甘草陳皮去白桂心當歸各一錢熟地黃五味子蜜炒此味宜除白茯苓各七分遠志肉五分白芍藥薑棗引水煎服餘邪為殃第一百零五麻後餘邪最作殃幾經惡候甚郎當時行癘氣相傳染疫鬼勾魂赴北邙麻疹出盡得安寧邪未盡時症未平拂拂煩熱邪尚熾頻頻嘔吐毒猶蒸麻疹於欲出未出之時宜早發散以解其毒則無餘邪之為後災也若不知解毒於初使麻盡出以致毒停蓄於中未有不為殃者或為壯熱日久枯瘁或為驚癇或為泄瀉或咳促咳血喘急或嘔濃膿而成肺癰或作疳䘌而死此雖一時癘氣之染彼此相傳所致而未有不由於人事之未盡者也業斯道者但見先出疹者有為餘邪之發死而不治則後之初發者即早為之預解使無餘邪為害而不致於夭札方稱良工但凡麻疹只要出得盡則毒便解而正氣和平矣若麻正收之際而猶拂拂煩熱不寧如蛇在灰如蚓在塵之狀或嘔吐或泄瀉者此乃毒邪壅遏尚未盡出故也煩熱者以古方黃連解毒湯見三十五條加麥冬生地黃地骨皮牛蒡子赤茯苓治之嘔吐者以柴胡橘皮湯去人參半夏加枇杷葉木通治之倘果麻未出盡以苧麻蘸酒或蘸胡荽酒戛之待麻出盡則煩熱自除嘔瀉自止矣如麻收後只發熱而無他症者以加減清肌湯加黃連治之如麻後有餘毒未盡而發壯熱者以古方黃連解毒湯見三十五條加生地黃鮮地骨皮木通枳殼主之如麻後身熱不除者以柴胡四物湯見三十條去人參白芍川芎加酒炒黃連或生地骨皮湯見三十條加黃連治之如麻後餘毒未清餘熱未盡者以十仙湯加骨皮或連翹清毒飲去赤芍桔梗甘草加黃連黃芩地骨皮生地黃治之如麻後餘毒未清留滯肺經致吐痰如黃膿者乃成肺癰之候以桑連散治之如不愈以百部湯治之倘不全愈以花蕊石丸治之並以白芨為末用豬肺切薄片蒸熟蘸白芨末食之若用此數方不愈則成肺痿宜以紫菀湯治之柴胡橘皮湯柴胡橘皮黃芩白茯苓人參半夏甘草竹茹一團生薑一片引水煎服加滅清肌湯柴胡黃芩生地黃當歸地骨皮茯苓知母淡竹葉七片引水煎服十仙湯柴胡葛根元參黃芩黃連梔子赤茯苓枳殼生地黃陳皮生薑引水煎服連翹清毒飲連翹防風荊芥牛蒡子石膏赤芍桔梗甘草水煎服桑連散綠豆粉桑白皮蜜蒸苦參各五錢黃連天花粉各二錢為末白湯送下三四茶匙百部湯地骨皮麥冬天冬知母元參栝蔞仁百部根百合地茄根水煎服花蕊石丸地骨皮百部百合天冬麥冬各五錢薏苡仁花蕊石各一兩寒水石胡黃連各三錢真熊膽三錢為末綠豆粉合丸白湯下紫菀湯人參三錢桔梗茯苓各一兩知母貝母各一錢五分阿膠紫菀甘草各五分水煎服不食吃食太早貪食不厭第一百零六數日不食有何妨麻色淡潤保無殃吐蟲自汗相兼見果系脾熱用瀉黃胃火蒸蒸食頻頻通利小水便安寧吃食太早生奇症咬指嘶唇好怕人麻於初熱未出之際多有不食者乃胃經火邪熾甚故飽而不索食也但得麻色淡紅潤澤雖數日不進飲食亦無妨害不必強與之食蓋熱毒未解內蘊實熱自必不食若見初熱未出及正出之時以白虎解毒湯見二十六條去天花粉黃連山梔仁麥冬加荊芥葛根牛蒡子連翹主之使麻透盡內熱清散自能食也出盡而不食者宜清解胃火以石斛清胃散見五十九條去赤芍甘草量加健運之味治之麻收之後如仍不食者以四物湯見二十五條加神麯山楂麥芽或更加砂仁以三劑與服則自能食但方內有熟地黃胃虛弱者宜少用之如元氣蔞頹者急須培補防有虛羸之患若麻收後胃虛而不納五穀者當以理脾養胃為主宜以六仙散見七問內治之若麻後身熱不除煩躁不食者此屬膈熱以河間涼膈散見二十六條去芒硝大黃加丑牛以治之如麻後身大熱口渴不食唇裂眼腫大便秘小便不知出者以河間涼膈散見二十六條通利三四次即愈若麻後臉青唇紫赤身熱不食乃毒火太甚或瀉或渴或咳嗽俱宜以古方黃連解毒湯見三十五條倍用梔仁加薄荷葉地骨皮以二劑與服即愈若麻收後而不思飲食鼻乾無涕者以清肺消毒湯除桔梗甘草加桑白皮貝母主之若因先服涼藥過多有傷脾胃身熱虛煩不食者以四君子湯見七十二條去白朮加薏苡仁連翹牛蒡子解毒之味治之但方中之人參必要察人之虛實而施須其臉不紅口不渴唇不赤方可用之否則不宜若麻不食而兼吐蟲則為胃敗不治之症若麻後不食而吐蟲又兼自汗者真是虛症最為難治用藥不當變症多端不可依麻初常法當用辛溫解散之劑如果系脾熱則以瀉黃散酌量加減而治之凡出麻之後胃氣未平飲食不可驟進宜以清粥緩緩調和使胃氣舒暢漸進飲食自無後患麻後若吃食太早咬指甲撕口唇𢳄眼毛看手咬人等症宜以解毒化滯湯去甘草桔梗加青皮治之又有麻收之後貪食不厭者乃胃火太盛所致宜以大連翹飲見十八條去赤芍甘草柴胡加地骨皮黃連石膏知母生地黃治之六仙散螞蟻花燒灰蓮肉薏苡仁各二錢藕節一兩釵石斛陳早米炒各五錢為末米湯送下三錢清肺消毒湯防風枳殼各五分連翹前胡黃芩桔梗各一錢荊芥甘草各四分水煎作十餘次服瀉黃散防風四錢梔仁炒黑一錢藿香葉七分石膏五錢甘草二錢為末白湯送下或用蜜酒拌略炒仍以白湯送下解毒化滯湯防風荊芥枳殼炒神麯炒麥冬去心炒各五分連翹黃芩酒炒前胡各七分茯苓七分楂肉甘草各三分桔梗一錢水煎作十餘次服麻後生瘡麻後遍身瘙癢第一百零七浴早水氣泊腠里乾疥濕瘡由斯起莫道小疾難為患只愁終身瘡不已不知避忌見風早遍身瘙癢如蟻蚤此症不因浴早致消風疏解癢如掃瘡疥之生多見於麻收之後皆緣生水洗浴大早水氣流泊肌腠而發是以麻後洗浴必須過一月之後者慮其生瘡也如遇此症即以防風荊芥艾葉煎湯洗之或用苦參四兩石菖蒲二兩煎水臨洗時加入豬膽汁二三個於水內洗之或縛牆楓艾葉楓樹葉柑子葉紅浮萍煎水洗之勿用生水洗亦不用治瘡方藥熏洗恐致閉毒入里變生他患為害非小然不早治必致每歲對出麻之月而發雖云小疾亦須慎之如麻後生瘡不已此乃餘熱未盡所致宜以連翹生地黃湯或生地化毒煎及胡麻丸加何首烏刺蒺藜白芷薄荷之類煎服治之或用苦參湯治之如麻後餘毒未潰變生癰疽瘡癤者以解毒湯加防風荊芥牛蒡子治之或用陳氏苦參丸荊防敗毒散見第二條去人參加連翹金銀花治之若瘡如癩者以胡麻散主之如膿水淋漓以羌活當歸散主之若麻收之後遍身瘙癢者又非浴早之比乃見風太早所致以消風散疏解之其症即愈如皮膚瘙癢不能忍者以二味消風散治之連翹生地黃湯治麻毒未盡生瘡不已連翹生地黃金銀花元參黃連荊芥穗木通胡麻仁甘草水煎服生地化毒湯生地黃金銀花白蒺藜炒去刺連翹元參胡麻仁白附子烏豆水煮透何首烏烏豆水煮俟干威靈仙黃連木通薄荷葉荊芥穗甘草梢乾紅浮萍為引水煎服胡麻丸治風熱癮疹及疹後瘙癢生瘡日久不愈胡麻仁四錢防風威靈仙苦參各一錢石菖蒲一錢獨活一錢白附子烏豆水煮一錢甘草五分為末米糊合丸白湯下苦參湯苦參大楓子去殼荊芥防風白芷獨活何首烏烏豆水煮乾白附子烏豆水煮乾威靈仙胡麻仁北全蠍糯米炒殭蠶薑汁蒸白蒺藜炒去刺牛蒡子炒姜引一方無獨活又一方有甘草解毒湯治一切熱毒腫或風熱瘙癢黃連金銀花連翹水煎服陳氏苦參丸治遍身瘙癢癬疥癰瘡苦參四兩元參黃連大黃獨活枳殼防風各二兩黃芩梔仁白菊花各一兩為末蜜丸桐子大食後或茶或酒送下三四十丸日三服胡麻散治風熱癮疹瘙癢並治癩胡麻仁一兩苦參荊芥何首烏各八分防風威靈仙石菖蒲牛蒡子炒白菊花蔓荊子白蒺藜各六錢為末食後薄荷葉煎湯下或以茶下亦可羌活當歸散治癮疹瘙癢膿水淋漓羌活當歸川芎升麻防風白芷荊芥連翹牛蒡子黃連酒炒黃芩酒炒甘草以酒總拌曬乾酒煎服或以水煎用酒對服消風散治風熱咳嗽通身疥瘰小兒痘疹餘熱頑麻癮疹川芎羌活防風荊芥穗藿香葉人參赤茯苓殭蠶各一錢陳皮厚朴薑汁炒炙甘草各五分蟬蛻一錢一方無藿香有薄荷水煎服如久病頭風目翳日三服此方妙用全在厚朴人參當知肌表之疾無不由胃而發故用厚朴清理其內即以人參助諸風藥消解風熱於外則羌活防風荊芥輩方始得力耳二味消風散治皮膚瘙癢不可忍薄荷葉北蟬蛻去頭足土炒為末食遠酒下見毒醫毒勿泥麻法第一百零八風寒葷腥失禁忌現點即收不透肌毒歸於內肚角腫見毒且將毒來醫麻有至六七日稍受風寒未忌葷腥致四肢面部略有麻疹影點點現而即收不見不能透發於肌表以致毒歸於里忽然肚角紅腫似毒非毒初用玉樞丹與服令瀉數次繼用活命飲服之後以人參黃耆白朮蟬蛻木通當歸之類托出大毒起頂出膿用外科敷藥與膏藥治之自愈此見毒醫毒之法不可拘泥麻喜清涼而竟不敢用補也玉樞丹又名太乙紫金錠解諸毒治諸瘡通治百病有起死回生之功山茨菰洗去皮毛淨五倍子打破洗淨焙乾各二兩上麝香揀淨皮毛明硃砂明雄黃各三錢紅芽大戟綿大戟紅柴胡切不可用去蘆根洗淨一兩五錢千金子去殼油取淨者一兩為細末秤過等分配合以糯米粉攪糊和丸或作錠子聽用活命飲又名活命丹治麻出即收忽爾作毒毒將出及毒出後並宜當歸獨活杜仲秦艽細辛白茯苓桑寄生上肉桂熟地黃北防風川芎黃耆甘草加人參水煎服
