body:
  text: 卷之二四方麻名第一粰糠痧瘄艄溫疹其實屬麻一證名方語原來各有別治同一例應如神麻證之名各方不同在京師呼為溫疹在河南呼為粰瘡山西陝西呼為糠瘡山東福建廣東廣西雲南貴州四川俱呼為疹子江南呼為痧疹浙江呼為瘄子湖廣江西俱呼為麻疹又呼為艄子聞人氏呼為膚疹雖四方之命名有別其實皆一麻也調治之法原無異耳歲氣第二麻疹須明歲氣先勿輕汗下作傷寒察人虛實施良劑無伐天和損壽元麻疹之證其初發熱與傷寒相似但麻則面頗紅咳嗽噴嚏鼻流清涕目中淚出呵欠喜睡或吐或瀉或手掐眉目鼻而之為異耳不可誤作傷寒施治而妄用汗下也妄汗則增其熱而為衄為咳嗽為口瘡咽痛為目赤痛為煩躁為大小便不通妄下則虛其里為滑泄為滯下經曰必先歲氣毋伐天和言不可妄汗下也是以治麻者務須先明歲氣如時令溫暖以辛發之藥發之用防風敗毒散見第五條如時令暄熱以寒涼之藥發之用白虎解毒湯見二十六條或黃連解毒湯如時令大寒以辛熱之藥發之用桂枝解毒湯或葛根桂枝湯如時令時寒時暖以辛平之藥發之用荊防敗毒散或葛根解毒湯倘兼疫癘之氣則以人參敗毒散主之又要看人之虛實如吐瀉不止以人參之類補之如便秘煩躁以酒蒸大黃微利之無實實無虛虛倘損不足而補有餘夭人性命非關天數醫殺之也能知損有餘而補不足者方為良工朱曰麻疹之候有下列八證見數證即是不必全具黃連解毒湯黃連黃柏黃芩梔仁荊芥知母石膏大青元參木通防風桔梗甘草水煎服桂枝解毒湯荊芥防風牛蒡子麻黃桔梗人參川芎赤芍羌活甘草桂枝生薑引葛根桂枝湯葛根防風甘草桂枝赤芍升麻姜三片淡豆豉一錢引荊防敗毒散荊芥防風茯苓枳殼前胡柴胡桔梗川芎羌活獨活甘草薄荷五葉引除荊防加人參名人參敗毒散葛根解毒湯葛根荊芥前胡牛蒡子防風連翹淡竹葉人參柴胡桔梗赤芍藥羌活升麻甘草水煎服預解宣毒第三凡遇冬溫大不祥民多疫癘發瘡瘍如逢麻疹相傳染可用湯丸預解良麻毒從來解在初出盡毒解憂可無腹中脹痛邪猶伏喘促昏沉命必殂春溫夏暑秋涼冬寒此四時之正氣也若冬應寒而反溫乃陽氣暴泄火令早行人感之者至於來春必發癰瘡未出痘疹者必感之而出然疹雖胎毒未有不由天行時令而發者故一時傳染相似遠近大小皆發為父兄者但見境里痘麻正行宜先以消毒保嬰丹代天宣化丸以預解之可使毒徹而不為已甚此雖先賢活人之婆心而要知麻疹之證只怕一時不能得出若得出盡則毒便解到底治麻者於初熱未出之時宜以宣毒發表湯去升麻桔梗甘草或葛根解肌湯二方俱見第五條去赤芍甘草葛根疏邪湯見三十三條去骨皮防風敗毒散見第五條去石膏知母淡竹葉桔梗甘草加前胡葛根等味隨用而發之但得麻出則毒解而始終無虞矣如用一劑而麻仍不出又再進一服外以酒煎胡荽噴被蓋之切要空露頭面或以苧麻蘸胡荽酒遍身戛之令其毛孔疏開麻方得出也切勿泥歲氣條照時令寒暄而用辛熱寒涼之劑助其炎威阻其發機致成壞證如三四次發之不出又用臭椿樹根皮煎湯熏洗倘仍不出加之腹作脹滿氣上喘促昏眩悶亂煩躁不寧譫語妄言者必死無疑矣有云當歸紫草茸紅花牛蒡子之類服之即現斷不濟事朱曰桔梗甘草為仲景之桔甘湯桔梗開提肺氣甘草生用能清熱解毒謝君以甘桔同為舟楫之劑諸藥有此一味不能下沉雖出自石頑之說究非神農本旨我輩於當用時仍可放膽用之毋為其所囿也消毒保嬰丹纏豆藤不拘黃豆綠豆根上纏繞細紅絲藤於八月內生氣之日採取陰乾聽用一兩五錢大黑豆三十粒赤小豆七十粒牛蒡子炒辰砂水飛過生地黃山楂肉各一兩荊芥穗防風獨活當歸黃連桔梗生甘草各五錢老絲瓜隔年經霜者兩個要連藤帶蒂五寸燒灰升麻赤芍各七錢五分為細末以沙糖合丸如李核大濃煎甘草湯化下凡修合此丸宜春分秋分或正月十五七月十五十月十五等日灑掃靜室焚香至誠修合勿令僧尼道士婦女有孝服人及六畜見之合畢於日出時焚香叩齒東向吸氣一口吹於丸藥之上向太陽覺咒曰神仙真藥體合自然嬰兒吞服天地齊年吾今奉太上老君急急如律令一口氣默唸七遍此段修合方法未可信留存文獻一九五七年三月代天宣化丸即韓氏醫通所載五瘟丹甘草甲己年化土以此味為君黃芩乙庚年化金以此味為君黃柏丙辛年化水以此味為君梔仁丁壬年化木以此味為君黃連戊癸年化火以此味為君連翹為佐山豆根為佐如逢甲子己巳年則以甘草為君黃芩黃柏梔仁黃連為臣連翹豆根牛蒡為佐乙庚等年俱仿此君藥一兩臣藥用五錢佐藥用二錢五分共為細末於冬至日以雪水煎升麻汁拌麵粉攪糊合丸用辰砂為衣以淡竹葉煎湯化下諸潮亦能發麻第四傷寒傷風與傷食驚風等候諸潮熱久而不去亦非宜麻疹因而乘間出手足微冷惡寒無汗面色青慘而不舒左額有青紋者傷寒之熱也手足微溫發熱有汗面赤而光者傷風之熱也並宜用惺惺散除人參白朮發散之目胞腫或右頰有青筋發熱而頭額肚腹之處最甚或兼嘔吐腹疼者傷食之熱也以備急丸下之面色青紅額上中心有紋手掌心有汗時作驚惕手絡脈微動而發熱者此驚熱也以瀉青丸牛黃清心丸主之身熱而倍能食唇紅頰赤大小便閉脅下有汗者此風熱也以宣風散主之以上諸熱久而不去內外感發則所蘊痘麻之毒亦能乘間而出矣惺惺散治風熱咽喉不利脾不和三焦膽經渴小便不利人參桔梗白苓白朮栝蔞根甘草各一錢細辛三分薄荷葉五分防風川芎各一錢水煎溫服備急丸木香二錢五分大黃牽牛各五分為末神麯糊合丸綠豆大食前用楂肉煎湯下五七丸瀉青丸羌活大黃炒川芎當歸防風龍膽草梔仁為末蜜丸雞頭米大淡竹葉煎湯加沙糖調下一丸牛黃清心丸治發熱甚心煩不寧生黃連五錢川鬱金二錢黃芩梔仁各三錢牛黃二錢五分辰砂一錢五分為末用冬雪水調麵粉糊丸黍米大燈心湯下七丸宣風散大熱利其小便而不愈者以此下之檳榔二個陳皮甘草各五錢生丑牛二兩炒丑牛二兩為末二三歲孩兒用五分四歲孩子用一錢食前蜜湯調下易老加防風本方有青皮初潮認證第五麻為胎毒發於心肺與相連熱毒侵咳嗽鼻中清涕出更兼兩目淚盈盈麻疹之證面必紅呵欠咳嗽鼻流濃汪汪眼淚頻頻嚏休作傷寒別證攻麻疹初潮未現標時必身熱憎寒頭疼咳嗽或吐或乾嘔或瀉或腹痛或鼻塞或鼻流清涕噴嚏呵欠眼胞浮腫目淚汪汪腮赤體疼煩躁不寧夫麻乃胎毒所發毒者火也麻疹小而色紅碎密其行於皮膚之間者屬手少陰心經君火也五臟心肺相連肺位乎上心經火旺則肺受之故麻之發惟肺受毒最重其咳嗽者肺因心火炎上而肺葉焦舉也鼻流清涕者鼻為肺之竅以火爍金而液自流也目中淚出者肺熱則移於肝肝之竅在目也肝屬木木能生風故有呵欠也吐與乾嘔者心火流入於胃也肺與大腸為表裡肺熱流於大腸故眼胞浮腫腹痛而泄瀉也腮赤煩躁心火旺也噴嚏肺經火邪也或手掐眉目唇鼻及面者肺熱證也然麻雖胎毒未有不因時氣冒感而發者故其證與傷寒相似而身熱憎寒頭疼體痛也但治麻者莫作傷寒施治當先以肺為主總宜瀉火清金而瀉火當用黃連黃柏梔仁大青元參連翹之類清金當用黃芩知母貝母麥冬石膏天花粉牛蒡子地骨皮桑白皮杏仁之類夫麻初起既與傷寒相似而認麻須細看兩耳根下頸項連耳之間以及背脊之下至於腰間必有三五紅點此即麻之報標如無紅點以為證佐則當以別證施治此屢試屢驗者也若果有紅點及現有前證相符則是麻候宜用宣毒發表湯去升麻桔梗甘草或少加蘇葉或少加胡荽或並去淡竹葉主之或用葛根解肌湯去赤芍甘草加防風或更加蘇葉枳殼主之或用防風敗毒散去桔梗甘草石膏知母或並去淡竹葉加前胡葛根主之俱以燈心為引與服以疏風解肌托之出外可以坐享平安雖有吐瀉亦不必拘泥麻出而吐瀉自止蓋麻屬熱候熱沖胃則吐熱沖大腸則瀉此麻之常候麻出熱解吐瀉之證不治自止不必更憂吐瀉之不止而妄治也朱曰認麻法凡二十九字於認麻時注意及之自無錯誤熱沖胃與大腸有吐瀉二證自是經驗之談且不治自止有小兒者知此可少解憂慮宣毒發表湯治麻發熱欲出未出時各證並宜凡地方麻疹發作之時初潮之際未明是否麻證當以此方主之縱非麻候即是冒感傷寒用之無礙並附加減法於方尾薄荷葉八分葛根防風荊芥穗連翹牛蒡子炒木通枳殼淡竹葉各一錢升麻桔梗甘草燈心引勿用生薑姜皮冬天寒月可加蘇葉八分又加蔥白為引暑月炎天可加生黃芩一錢總除升麻甘草桔梗不用初潮無咳者宜用留白陳皮以甚其咳有咳切勿再加初起往來潮熱者除淡竹葉免解膚熱致麻難透表在寒月仍宜加蘇葉蔥白以疏表之初潮潮熱太甚者加赤茯苓生地黃並可加生黃芩不必拘麻初用寒涼毒伏麻不得出之說正當用之以保肺受火克之虞但春冬寒月黃芩等分宜略少耳初潮無汗加蔥白以發之更略加衣被穿蓋以取其汗使毒透切不可遽用胡荽酒𨠭之法免助邪火內攻肺金重受其克藥中略加胡荽作引稍可初潮不食不必治之蓋熱毒內蘊自必不食熱毒一解自然能食切勿加進食開胃之藥初潮即見喘促加黃芩葶藶栝蔞仁以清肺開胸或更加薑汁炒白芥子家蘇子萊菔子以降之初潮嘔吐加竹茹柿霜如無柿霜用柿餅亦可初潮呃逆加枇杷葉竹茹初潮鼻衄加鮮茅根初潮即現咽喉痛者加射干倍用牛蒡子初潮即現唇乾齒燥舌胎枯黃口渴等候加麥冬花粉黃芩甚則加黃連黃柏梔仁等味以預解之初潮熱甚大便堅實者加火麻仁二三錢以潤之用枳實以導之免至閉塞而熱毒不得發越致變紫黑如便不通者加生黑白丑牛末以利之如利之不通者必生氣喘鼻扇逆證即用黃連解毒湯加大黃牛蒡子連翹地骨皮桑白皮以通之如兼口渴者並加麥冬天花粉初潮大便溏者方內之枳殼等分減用以為開泄之路庶可免便閉之患初潮溏泄而有微汗除薄荷竹葉不可兼用止汗止泄之品以堵其發越之門初潮泄瀉者除枳殼初潮洞泄者除枳殼加豬苓澤瀉以分利之不可止泄以塞其舒暢之機初潮小便赤者除薄荷葉加赤茯苓或更加車前子以利之初潮小便不通者合導赤散方見二十六條除甘草加車前子以通之初潮溺血者如生地黃黃連黃柏黃芩梔仁俱可隨意加入更加牡丹皮以去其滯血免使留而為殃冬月寒天無汗不咳者量加蜜汁和酒炒麻黃二三分其餘諸證不能備悉宜因所見之證加減而用至於等分之輕重須量人之大小若月內半周嬰兒只宜以杯許與服當令乳母代服使藥性流入乳中兒食母乳如同服藥葛根解肌湯治麻初起發熱咳嗽或乍冷乍熱已現麻路並宜初潮未明是否麻證加減同宣毒發表湯並附已現麻路加減於尾總除赤芍甘草不用葛根前胡荊芥穗牛蒡子連翹去子蟬蛻各八分木通七分赤芍甘草燈心引桑白皮蜜蒸貝母去心薑汁蒸隨意加入後藥已現潮熱大甚者加生地黃地骨皮赤苓更可加黃芩已現口渴者加麥冬天花粉已現無咳者不妨少加留白陳皮已現無汗者加蔥白已現氣喘加葶藶栝蔞霜喘甚者加白芥子蘇子蘿蔔子俱薑汁炒已現嘔吐者加柿霜竹茹已現鼻衄者加茅根衄甚者更加黃芩黃連俱生用已現大便堅者加枳實火麻仁已現大便閉者加丑牛已現大便閉用丑牛仍不通者加生大黃黃連黃芩已現大便溏者加赤苓澤瀉洞泄者亦如之已現小便赤澀者加赤苓澤瀉已現小便閉塞不通者加車前子並加枳殼防風敗毒散加減照前二方酌用總除甘桔二味不用防風荊芥穗連翹牛蒡子石膏知母木通薄荷枳殼淡竹葉桔硬甘草燈心引初熱未明是否勿峻發表第六初熱之時證未明醫家診視生疑心此時且勿峻發表略施清解得安寧初熱不見麻路不可發表略宜清解用利咽散主之如見麻路當以葛根解肌湯見第五條去赤芍甘草加防風枳殼蔥白主之更加蘇葉亦可或以蘇葛湯去赤芍柴胡甘草加枳殼蔥白主之如麻不出則用蘇葛湯去柴胡赤芍甘草加蜜酒炒麻黃以發之或以宣毒發表湯見第五條去升麻淡竹葉桔梗甘草加蘇葉蔥白或加蜜酒炒麻黃開提腠理或用厚衣綿絮蓋之得汗自頭至腳漸減衣被使皮膚通暢腠理開豁而麻易出縱不出不可再汗恐致亡陽之變只宜頻以蔥白湯與服使毛竅中微汗潤澤其麻自出庶無熱閉發搐之患既出之後可用防風敗毒散見第五條去淡竹葉石膏知母桔梗甘草主之不可無表防其內伏既出而潮熱甚或兼口渴者則石膏知母竹葉並宜用之且更可加地骨皮生地黃麥冬之類以清其熱而涼其血以生其津也更可加枯黃芩以清肺生黃連以瀉心而諸候不生矣朱曰不發表麻何從出勿峻發表恐發之太過或變生他證耳利咽散治咽喉腫痛牛蒡子炒元參防風水煎服蘇葛湯聯杏心法方治麻初熱未明證候蘇葉粉葛木通元參黃連微炒用連翹防風黃芩柴胡赤芍甘草無汗加蜜酒炒麻黃發熱太甚者加牛蒡子炒五分發熱太甚不止加鮮骨皮生地黃如熱不太甚者黃連黃芩俱去之加枳殼荊芥穗蔥三根引水煎熱服避風寒第七麻證須當避風寒不避風寒膚燥干腠理閉密毒難出後生危證有千般風寒本自外來麻證終始最宜速避如或不謹失於避忌一受風寒則令肌膚乾燥腠理閉密遂至麻毒不得發越而難出矣初潮之時若能避忌麻則易出毒則易解自無後患正出之際不知避忌麻為風寒所觸出必復收致毒積於內而不得解變證生焉已收之後切宜避忌若不避忌留毒難盡變證無窮輕者證延日久咳嗽與痰疾終身不愈重者必變危證而難救也是以麻收之後必待二七之後熱退身涼無痰不咳飲食如常精神復舊方可不避慎之慎之忌恣食生冷物驟用寒涼藥第八麻屬火候多煩渴病者時喜食涼物初熱未出也須禁縱之恣食毛孔密麻用寒涼本所宜也須審時而察機大寒遽用麻難出伏毒內攻咎在醫麻本火候自發熱至出透之日未免有口渴煩躁故多喜食冷物蓋麻證屬火食冷雖曰無妨然生冷等物麻證始終當忌何則夫麻最要透表只宜溫暖飲食以候其透表若於初潮未出之際而食生冷冰伏火邪則毛孔閉密而毒火難出矣即透表之後亦忌食生冷但柿餅秋白梨連藕荸薺可以略用桃李梅子柑橘石榴菱角等物又在所必忌然非但患麻者生冷等物忌食即醫家治麻寒涼之藥亦不可驟用夫麻初發熱之時而最忌寒涼之品者蓋恐冰伏麻毒使毒氣鬱遏而不得出而成內攻之患也古人謂天氣暄熱宜用辛涼之味如黃連解毒湯之類不知天時之暄熱熱氣豈寒涼之藥所能解也今若驟用寒涼恐不足以解外熱而適足以阻內熱使之不得出也曾見有一歲孩子出麻發熱未見點時而發驚搐醫家認作急驚用寒涼之藥攻治致麻毒隱隱在皮膚之內不得出表後一醫以滋陰為主用四物等劑亦不獲效煩悶聲啞數日而死此可以知驟用寒冷冰伏麻毒之為害也今因天時暄熱而執泥歲氣之說驟用寒涼豈理也哉故治麻者凡於麻初出之時雖有身熱煩渴等證宜以宣毒發表湯見第五條去甘草桔梗升麻少加酒炒黃芩三五分以清之切不可遽投黃連黃柏梔仁等味恐冰麻毒而內伏致麻不得外出後雖設法宣表而麻終不得出矣可不畏哉朱曰前條避風寒與本條忌生冷皆病家所最易患者中途變證往往因此故此二條醫生對於病家務必再三叮嚀忌食辛辣熱物誤用辛熱藥餌第九辛辣香甜與熱湯嬰兒乳母俱忌嘗果能禁謹不違法管教始終保安康麻喜清涼最忌溫燥熱藥餌勿沾唇誤用能助其邪火壅蔽內攻救無門辛辣之味與熱湯水患麻之人多酷好之何則蓋麻屬火候火蘊於內得辛辣熱物而痰火暫快故多喜食兒患麻者須宜禁戒庶無後患如或因其喜飲遂以胡椒茱萸作湯或醇酒姜蒜韭薤之類與食而順其欲暫雖快暢久則痰火益甚至麻變紫黑或二便閉結或成血痢腸頭露出或生牙疳或唇舌破裂或喉中痰響齁䶎或五竅出血或大熱不止至胃火益甚而飲食即吐不能下者種種惡候因而生焉若食乳孩子乳母亦當禁忌倘不禁忌而食辛辣等物凡食其乳必至變證不測可不慎乎夫患麻之人辛辣之物既當忌食而治麻醫家用藥立方辛熱燥悍之品慎勿妄施如桂枝麻黃羌活獨活白芷川芎蒼朮香附果仁白朮丁香木香砂仁肉豆蔻肉桂之類不可輕使若於麻初熱之時而誤用之反助其毒使毒氣壅蔽而不得出致有內攻之患即有麻疹初起而見四肢逆冷者乃火極似水之故不可妄投熱藥麻現自然溫和昔人謂天氣大寒宜用辛熱以桂枝湯之類發之不知天氣大寒只宜置之暖室謹避風寒可也且天氣縱極嚴寒而人身中之熱毒未必因天寒而減而因天寒遽用辛熱以治麻證豈理也哉庸工執泥歲氣時令大寒宜用辛熱之藥發之之說譬諸麻疹初出而有嘔吐醫不知此為常候而用蒼朮以平胃丁香砂仁以暖胃設有頭疼而用川芎白芷羌活獨活以治頭疼譬有手足稍冷者遂即用桂枝肉桂以溫其手足殊不知麻證之作嘔吐者乃火熱蒸於胃也頭疼者乃火毒上攻也今反以辛溫之藥攻之是猶抱薪救火也至於手足稍冷者乃熱極似寒之象俟麻出透而手足自溫醫家不明而謂桂枝可達於四肢之末肉桂可以溫經回陽而遽用之是誤之又誤陷人性命良可嘆也執天寒而用辛熱之說者何殊乎是倘有誤服辛熱之藥助其邪火煩渴便閉致麻不出危篤之極者以清陽湯去升麻桔梗甘草主之愚按邪火內攻渴煩致麻不出而兼有便閉者加黑白丑牛以下之是亦釜底抽薪之義也朱曰驟用寒涼與誤用辛熱又醫家所最易患者蓋麻正出時必仍發熱醫者為退熱計而驟用寒涼此大誤也又醫者不知麻為熱證或用麻黃附子細辛湯辛溫解散亦足誤事清陽湯荊芥穗防風前胡連翹元參各四分薄荷葉牛蒡子枳殼黃芩木通麥冬淡竹葉各三分桔梗四分升麻三分甘草二分薑燈心引姜皮並宜忌食諸肉雞魚鹽醋五辛等物第十疹家禁忌法須防葷鹹辛酸不可嘗欲不從心方是福物若爽口定為殃麻證禁忌肉魚雞欲食須過七七期鹽醋五辛通是禁務宜食淡免禍機麻疹禁忌比痘尤甚蓋痘初起則宜慎口至起水之時雞肉食之正可助漿若麻證馬牛豬羊鵝鴨魚腥等味鹽醋甘甜麵食五辛滯氣煎爆等物必麻收後四十九日之外方可食用惟宜食淡庶無後患若七七之前不知禁忌則終身但遇天行麻必復出即不復出亦有後患食鹽太早令人咳嗽食五辛太早能生驚熱食葷腥太早必生奇證是以自麻收後宜慎口四十九日但豬肉一味雖可先食亦必俟身涼不咳並無涉及他證者方可先食其餘必須遵期謹戒非但出麻之人當慎即乳兒乳母亦必禁忌蓋麻之為病有類傷寒葷腥不謹禍生不測曾見麻案有云賀少君患麻家人不知以肉飯與食適繆仲淳至見而驚曰爾主出麻此麻證之極重者何可食葷急備虻虎湯三劑與服而麻盡現遍體皆赤又以原方進二劑麻雖盡出而煩躁不寧勢尚不可保乃以三黃石膏加檉葉湯一大劑濃煎與服煩躁定而痊口腹之為害匪輕可不慎乎朱曰此條忌食病家尤所當遵嘗見小兒喜食鹹物證成哮喘喜食香甜牙齒生蟲放縱一時貽害一世此家長之責也虻虎湯西河柳麥冬各兩許淡竹葉七十片元參貝母又名虻去心薑汁蒸各三錢石膏一兩五錢知母五錢水煎服三黃石膏加檉葉湯檉葉即西河柳黃連黃柏黃芩各五錢石膏麥冬去心各三錢西河柳知母各一兩淡竹葉二百片水煎服忌兼用補澀第十一麻疹證治法最廣當補當瀉須究講清解補澀謬兼施殺人性命如反掌麻初出時多有泄瀉不止者其毒火因瀉而減此殊無妨若麻出盡之後而瀉紅黃色糞者乃內有伏熱也與泄瀉過甚者俱宜以加味三苓散與之一服即愈切不可用參朮訶蔻補澀之劑以圖速止醫家若不識禁忌未經講究一見有瀉遂用補澀乃曰吾於清解藥中兼用參朮訶蔻等分又輕何礙於事一服不見功效不知改方醫治又曰參朮訶蔻等分輕少故不應耳於是多加參朮訶蔻分兩而再與服致麻變證重則腹脹喘滿而不可救輕則變為休息痢而纏綿不已然非僅麻出齊之後瀉紅黃色者不宜兼用補澀即麻已收之後而泄瀉黃紅色亦不宜兼用補澀仍以加味三苓散治之兼用補澀且不可若專用補澀者則殺人不待反掌之久矣業斯道者可不慎歟加味三苓散豬苓木通車前子赤茯苓各七分澤瀉八分黃芩酒炒牛蒡子炒研各五分黃連酒炒二分燈心五十寸引水煎食後服升發清涼解毒當分先後第十二升發清涼與解毒此乃治麻之大法用之須當分先後次第由來混不得治麻用升發清涼解毒法所宜然然當分先後而施不可混用何也麻初發熱恐難透表故當用升發疏表解肌之劑使之易出見標之後與正出未透之間宜發表而兼清涼使血涼肌解麻易出透至麻到通身上下俱紅總成一片壘壘如珠手足之末上下相同無有空處此為出透斯時則當用清涼解毒之劑不必兼用發表之藥一解即愈若於初熱正出之際而即用寒涼解毒之劑則氣滿血凝肌膚閉密不得開通至麻不出多生危候是以於初熱未出之時及正出之際只宜辛散如荊芥葛根薄荷前胡牛蒡子防風蘇葉淡竹葉石膏之類可以施用即麻黃亦當因證而施使之易透正收及收後宜用寒涼解毒之劑如元參青黛麥冬黃柏栝蔞根黃連黃芩連翹貝母知母梔仁山豆根淡竹葉等藥俱可施用使毒火易得消散方無後慮朱曰何時當用疏表解肌之劑何時當用發表兼清涼之劑何時當用清涼解毒之劑作者一一指點苦口婆心𨠭麻當分天時第十三𨠭麻之法大非宜強用須當分天時春冬寒月猶似可夏秋炎日切莫施古有𨠭麻之說雖近有理然亦當分天時如春冬嚴寒麻為風寒所遏閉而不出𨠭之以取汗使腠理開豁猶曰可也若夏秋炎熱之時只宜令之於無風之處坐臥以單被蓋之勿令其冒風冒暑耳豈可𨠭助倘炎熱而用𨠭法則火熱愈甚麻必焦紫致變壞證而不救者多矣補中第十四麻證從來喜清涼首尾不用補中方緣何麻後議補中為救過涼脾胃傷麻證屬火肺胃實熱者多虛寒者少千人之中虛寒者偶有其一故治麻俱宜先用疏散寒涼之藥者此之謂也而古人又有議補中之說者何哉蓋指麻收之後而言非指初熱正出正收時之謂也緣由麻證先用寒涼之藥過多而脾胃受傷敗壞以致麻收之後多得嘔吐泄瀉青色唇白身冷當審其輕重而用補中之法所以人參白朮白苓砂仁霍香陳皮薏苡仁蓮肉等味在所不忌但當佐以清涼之藥加川黃連枯黃芩俱微炒而用之夫既補中而又加清涼之品者其義蓋恐中氣實而邪火復作故兼用之耳至於白朮嘔泄太甚者用之始宜如吐瀉輕者則又不宜輕用若其人素稟虛弱當出麻之際過於發散出透之後又過用寒涼解毒以致虛弱之極骨瘦神疲面無紅色且又不能多食食多即吐者即急以香砂六君子湯去半夏加麥芽釵石斛以補之香砂六君子湯人參白朮炒白茯苓炙甘草陳皮半夏木香砂仁水煎空心服正麻奶麻風癮不同第十五痘後出麻為正疹此由胎毒發於心一次出現不再出正麻名兒始為真嬰兒初離母胎中遍身斑駁似硃紅亦由胎毒生斯候莫作時行麻疹攻嬰兒當值炎熱天遍身忽似出麻然此名風癮非胎毒不須用藥也會痊正麻之出由於胎毒其出也必在出痘之後或隔兩三月或隔半年一年之久甚至八九年之遠感正麻之氣而出一次後再不復出矣奶麻者小兒初生未滿月時遍身紅點斑駁如朱皆由兒在母胎中受有熱毒所致故生下發見於皮膚不可認作時行麻疹妄用湯劑蓋嬰兒臟腑嬌脆氣血怯弱不能勝受湯丸宜以溯源解毒湯與乳母服之可耳若風癮者亦有似於麻疹乃發在幼孩甫生一月半周一歲之間時值天氣炎熱感風熱而作此不由於胎毒乃皮膚小疾感風熱客於脾肺二家所致不在正麻之列常見出一次又出一次亦有連出不已者天關大利害不必用藥而自散倘身熱不退只宜微用疏風清熱之劑一服即愈以荊防發表湯除紅花主之如身不熱者不必用藥免致誅伐無過然亦當慎風寒戒葷腥生冷辛辣等物勿以其無關利害而忽諸恐觸動風熱而生他病論云風癮身熱不退宜疏風清熱以荊防發表湯主之細按方內止有荊芥防風疏風之品並無清熱之藥且川芎上行頭目當歸血中氣藥楂肉長於消肉積甘草雖能和藥解毒其實有調中益氣之功桔梗性上升能阻各藥不得下達並非清熱之品且云除紅花反不若紅花之能散赤腫解疹毒之猶為可用也愚意莫若用防風敗毒散見第五條去甘草桔梗杏仁加元參黃芩地骨皮以疏風清熱退潮之為妥當耳朱曰此三種各有主名各有治法醫家必先識此始不混亂遡源解毒湯又名解毒湯解胎毒良方當歸身川芎生地黃白芍藥人參連翹黃連陳皮木通生甘草淡竹葉引荊防發表湯此方大能疏風清熱能散風熱客於手足太陰致發風癮及麻疹連熱三四日而始見標而不甚煩躁荊芥穗防風桔梗枳殼麩炒蘇葉川芎當歸各五分乾葛八分紅花二分杏仁去皮尖炒牛蒡子炒研各七分楂肉去核一錢生甘草去皮三分連翹五分水煎服夏天炎熱加酒炒黃芩五分冬月嚴寒加麻黃三分或加羌活五分小便赤澀黃加木通去皮七分溫麻第十六胎毒風熱兩相摶又值時令癘氣傳人如感之出溫疹調治乖張變多端溫麻者由於胎毒感於風熱又值時令疫癘之氣流行城市鄉村傳染迅速異常調治若不得法立刻變證治法於初熱時及欲出未出之際宜以宣毒發表湯見第五條去升麻桔梗甘草主之已出紅腫大甚者用化毒清表湯去桔梗甘草主之出透流毒成痢者用清熱導滯湯見第七十二條主之此三方以之加減變化無論正麻溫麻每用定獲奇效然凡出過正麻之後即不再發溫麻化毒清表湯治麻已出紅腫大甚併為麻疹已現主方並附加減法於方尾總除甘桔二味不用前胡乾葛知母連翹桔梗各七分牛蒡子炒七分木通六分元參一錢黃連酒炒防風梔仁炒黑各三分薄荷黃芩酒炒各五分天花粉地骨皮各八分淡竹葉一錢生甘草去皮三分燈心五十寸為引加生犀角三分更好潮熱輕者除淡竹葉梔仁黃連薄荷潮熱重者加生地黃地骨皮赤苓枳殼黃連黃芩生用口渴加麥冬熟石膏如不作口渴除知母花粉大便澀加炒火麻仁枳殼大便閉加枳殼炒白黑丑牛如二三日不通者加大黃小便赤澀加木通澤瀉等分小便不通者加車前子無咳加留白陳皮無汗加蔥白紫色加紫草茸紅花赤色加牡丹皮當歸尾夾紅紫斑加紫草茸牡丹皮熱甚不減去防風薄荷加生地黃川貝母咽痛加射干山豆根麥冬譫語加生地黃木通齁䶎加栝蔞蔞葶藶除天花粉淡竹葉薄荷氣促加蘇子萊菔子去天花粉淡竹葉薄荷呃逆加竹茹柿霜枇杷葉嘔吐亦宜痘夾麻出第十七痘出之際熱烘烘紛紛麻點遍身紅脾肺遊火夾痘出托出麻疹痘成功初現痘點數十粒遍身紅點細密密此是大痘夾疹子由於脾肺風熱出麻疹有於出痘之時相夾而出者當出痘之際發熱蒸蒸才現痘苗數十顆遍身通紅碎碎密密形如出麻似非出痘其實大痘夾麻而出是痘為正出而麻不過脾肺兩家之風熱遊火隨痘而出現也不甚關利害遇此等症不必驚慌以元參升麻湯除升麻甘草加黃芩連翹一二劑與服宣托麻疹盡出而消散正痘自然依期起灌而慶成功此等夾麻之痘而痘出必多疏稀元參升麻湯治痘夾麻夾斑夾丹等症元參一錢升麻五錢防風荊芥牛蒡子炒研各七分生甘草去皮三分水煎溫服蓋痘解毒麻第十八痘回水時將結痂身復發熱驚醫家倏爾遍身上下紅現出蓋痘解毒麻痘至回水結痂之際復又發熱遍身上下通紅細看痘粒膿漿充足此乃蓋痘解毒之麻出也其名云何蓋痘者痘之上蓋一層麻也解毒者此麻一出可以解痘毒也宜以大連翹飲去赤芍柴胡甘草加熟石膏天花粉淡竹葉地骨皮各一錢以清解其餘熱此等症候蓋因痘起灌之時痘已稠密醫家極力催漿過用補劑以致熱滯脾肺而作也大連翹飲治濕毒利小便連翹去子一錢牛蒡子防風荊芥黃芩赤芍各七分梔仁酒炒滑石研各五分車前子炒谷瞿麥木通當歸柴胡去蘆各八分蟬蛻去頭足洗去土十二隻生甘草去皮三分熱甚大便閉加酒炒大黃一錢生薑一片引前方去梔仁加紫草名連翹行風湯治痘麻熱毒壅閉小便不通痘後出麻第十九太痘秀實症已平倏爾麻疹又來侵此時胎毒曾經解惟宜用藥養肺金出痘已經收靨落痂痘症已平此時胎毒已經清解適值天行麻疹發現旋即出麻惟宜清金養肺為主以參貝散主之愚按痘後即出麻雖曰胎毒曾經清解然痘當起灌之時豈有不施補劑催漿灌膿之理其間定有餘熱留毒今痘後相繼出麻未必絕無毒火全因天行而發者雖宜清金養肺而方中之桔梗甘草仍須停用即沙參亦當以玄參易之更宜加枯黃芩瀉肺以清肌表連翹牛蒡子以解心肺之留毒赤苓枳殼利二便而泄心與大腸之火則肺金清而毒盡解尤為妥當參貝散沙參貝母桔梗各一錢西河柳二錢甘草五分水煎服閉症第二十麻見閉症眼腫赤聲啞鼻乾發喘渴腰腹脹痛人昏沉唇掀煩躁二便血麻初出時眼胞腫白夾赤色聲啞唇腫掀翻鼻乾鼻扇氣喘煩躁口渴腰痛腹脹人事昏沉口鼻出血煩亂狂叫二便出血此乃毒火鬱遏於內名曰閉症最為難治宜用宣毒發表湯見第五條去升麻甘草桔梗加酒炒黃芩七分酒蜜炒麻黃五分或更加元參山豆根治之若能托出麻標外現漸次發出者可以望生如仍閉而不出則無望矣朱曰麻見閉證最為危險當此病家驚心動魄之時全賴醫者有膽有識方不誤事首尾調和第二十一麻喜清涼痘喜溫痘麻治法不同倫麻苗痘實無人解首尾調和法宜遵痘麻兩症皆系胎毒均屬心火而麻則喜清涼之藥如古方化斑湯以元參易人參去升麻甘草早米萬氏升斑湯去白桔梗甘草是也痘喜溫補之劑如保元湯是也故麻喜清涼痘宜溫補人皆知之而首尾調和之道人多不曉何也夫麻只要發出得盡則毒便解若於初熱將出時而一味寒涼冰伏其毒麻必難以透表而毒不得解所以初出至正收宜安處暖室勿用峻寒之劑使之易透是麻亦喜和暖也痘則必待苗而秀秀而實膿成而後毒解若於痘成實之時用大溫熱之藥則反潰爛不收是痘後亦喜清涼也業斯道者須知治麻貴乎審首治痘貴乎審尾無過寒妄熱使溫涼相宜而陰陽自和矣古方化斑湯人參石膏知母牛蒡子連翹地骨皮淡竹葉升麻甘草早米一撮引萬氏化斑湯元參知母石膏牛蒡子麥冬淡竹葉桔梗甘草水煎服熱有遠近而出第二十二麻熱遠近難定期半月七八日有之發熱四日疹始現輕清平安順症時麻症發熱有近則五六日而出遠則八九日或十日半月乃出總以發熱四日內現標者其麻多輕然必須解毒若初熱之時既表之後紅影見於肌膚切宜戒口避風如或不禁則皮毛閉密毒氣難泄或變紫黑或生痰涎致變驚搐而不治若遇此候宜以消毒飲去甘草加犀角汁主之如極渴欲飲水者只宜少與蔥白湯以滋其渴又有作寒作熱至於終日不退者然始熱之際必見面赤眼腫多涕多淚咳嗽連聲等外症宜詳察之慎勿臨症恍惚夫麻之出其狀如粟紅壘而起間有不出或只頭面有四肢無者此則天行時氣濕熱在脾以致昏睡發熱麻不出現者當以消風散去人參川芎厚朴加連翹牛蒡子粉葛荊芥枳殼薄荷羌活只用三分治之如或不應以小柴胡湯去半夏人參加牛蒡子當歸身熟石膏治之倘風熱不散久必咳嗽不已愚按消風散小柴胡湯二方內之人參川芎羌活厚朴殭蠶柴胡半夏甘草及陳皮等藥麻方禁用之藥依法刪去之合二方僅得赤茯苓黃芩蟬蛻俱系三味耳而用以治濕熱在脾昏睡發熱致麻不出現等候其有濟耶此的系坊間誤人斷不宜用愚意莫若以宣毒發表湯見第五條去升麻桔梗甘草加豬苓澤瀉以泄脾濕以解其肌之為當也消毒飲治麻出一日為風寒所沖而收麻毒內攻急用此方免致胃爛不救牛蒡子四錢荊芥二錢防風五錢生甘草一錢加烏犀角屑更妙水煎服消風散子和方人參川芎羌活殭蠶厚朴陳皮蟬蛻茯苓為末白湯下小柴胡湯半表半裡和解之劑人參黃芩柴胡半夏甘草姜三片紅棗三枚引不熱第二十三麻疹出現全憑熱身不熱兮麻不出潮熱和平方為福症逢不熱大非吉不熱者謂身溫涼而無熱也初起不宜大熱及至正出之時不宜無熱如不熱者即系逆候以宣毒發表湯見第五條去升麻甘草桔梗淡竹葉或葛根解肌湯見第五條除甘草淡竹葉赤芍以疏托之亦有用越婢湯者不可以此為法出盡及收後而不熱者是毒盡也不須用藥朱曰不熱即系逆候病家常因小兒發熱不退請醫生設法退熱者是不知正出之時不宜無熱也越婢湯治風水惡寒一身悉腫脈浮不渴續自汗出無大熱者越婢者發越濕土之邪氣也水濕之氣因風中外流播兩相激摶勢難分解不得不借麻黃以祛之從表而越以石膏清之從里而化也麻黃去節五錢石膏八錢炙甘草一錢生薑三片紅棗三枚引水煎分作三次服微熱第二十四由麻不怕火燒天若逢微熱休安然初起之際猶無忌正出之時卻又嫌微熱者言熱輕而不壯也初起之時則宜正出之時熱不宜微微熱則麻出而不能透矣宜用疏托之劑以葛根解肌湯見第五條去赤芍甘草淡竹葉主之未收及收後微熱者此毒輕而盡也不必用藥朱曰自微熱至渴熱凡五條辨證之細最足增人識見乍熱第二十五發熱數日熱便退再隔數日熱又來時熱時涼為乍熱用心調理免受災熱而又退退又熱初潮正出此為逆收盡乍熱毒未盡病後治本免疏失乍熱有二一則熱數日而止過數日熱又作者一則一日之間有早發熱而午涼午發熱而夜止者此二者皆謂之乍熱也若未出之間見乍熱名曰毒未得透藥宜疏散以宣毒發表湯見第五條去升麻桔梗甘草或葛根解肌湯見第五條去赤芍甘草加赤茯苓主之正出之際甚不宜見乍熱見之則為逆候此由毒出而邪熱未解復有內攻之意必須疏托以化毒清表湯見十六條去天花粉桔梗甘草或清熱透肌湯去甘草加生地黃地骨皮主之又有因大病之後中氣虛甚而然者以治本為要藥宜溫補以四物湯加連翹元參臨症斟酌而用之若收後及未收之間見乍熱者皆為毒氣未盡急宜涼解分利如清熱透肌湯去甘草加黃連黃芩生地黃地骨皮宣毒發表湯見第五條去升麻甘草桔梗加黃連黃芩生地黃地骨皮俱可施治清熱透肌湯治麻未透熱甚而咳元參石膏牛蒡子荊芥防風前胡葛根杏仁各八分生甘草四分水煎熱服四物湯治一切血虛凡血症通宜當歸酒洗生地黃酒洗各三錢白芍藥酒炒二錢川芎酒炒一錢五分涼心血加酒炒黃連涼肝血加酒炒條黃芩涼肺血加酒炒枯黃芩涼大腸血加酒炒子實黃芩涼腎膀胱血加黃柏涼脾血多用酒洗生地黃涼胃血加酒蒸大黃涼三焦血加酒洗鮮地骨皮涼心胞絡血加酒蒸牡丹皮涼小腸血加炒梔仁川木通清心與胞絡氣加麥冬清肺氣加炒枳殼清肝氣加酒炒柴胡醋炒青皮清脾加酒炒白芍清胃加乾葛石膏清小腸加赤茯苓清大腸氣三焦氣加連翹清膀胱加滑石琥珀血虛加龜版血燥加乳汁瘀血加桃仁紅花韭菜汁童便行之暴血加薄荷葉酒洗元參血不止加炒蒲黃京墨加黃柏知母元參名滋陰降火湯治陰虛有火加酒炒黃連酒炒胡連名二連四物湯治虛勞血虛五心煩熱熱入血室夜分發熱加黃柏黃芩甘草名三黃四物湯治陰虛潮熱加桃仁紅花名元戎四物湯治臟結便閉撲損瘀血加羌活防風一方用北秦艽名治風六合湯治風虛眩暈風秘便難加木香檳榔名治風六合湯治血海虛滯或血氣上衝本方去白芍藥加防風名防風當歸散治發汗過多而成痙症宜去風養血壯熱第二十六大熱經日不退休將出出盡實可憂正出之時逢壯熱此為順候不須愁麻本火候非熱不出故最喜有熱如熱勢甚者以白虎湯去炙甘草粳米加西河柳連翹牛蒡子木通枳殼葛根主之然治麻大法總以解毒為主若麻初熱時有毒火不退而熱甚者宜以解毒湯去桔梗主之若發大熱而經日不退是為壯熱初起發熱間即發壯熱直至出時而不退者其症必重以清熱透肌腸見第二十五條去甘草加地骨皮生地黃黃連黃芩主之有咳甚者加貝母大便結滯加火麻仁枳殼小便赤澀加赤茯苓木通治之或用宣毒發表湯見第五條去升麻桔梗甘草加枯黃芩生地黃地骨皮黃連梔仁治之若先熱輕正出現之時其熱方甚者此為順候出盡而壯熱不退者又不宜也急宜用涼解疏托之劑以化毒清表湯見十六條去桔梗甘草加麥冬熟石膏治之大便閉者加丑牛以通之小便赤澀者合導赤散去甘草加車前子以利之或以竹葉石膏湯去人參半夏炙甘草粳米加荊芥元參地骨皮治之亦可收後而壯熱不退者更不宜也急宜涼解為上以化毒清表湯見十六條去甘草桔梗加生地黃山豆根治之或以河間涼膈散去炙甘草芒硝治之收後而壯熱兼大渴者以白虎解毒湯加元參黃柏治之白虎湯清肺金瀉胃火實熱小便赤者宜之小便白者慎用石膏八錢知母三錢炙甘草二錢粳米半合水煎服解毒湯治麻熱甚火毒不退初出亦宜黃連黃芩梔仁木通桔梗水煎服一方有貝母無桔梗導赤散治心熱發搐及小腸實熱小便赤澀生地黃五錢川木通生甘草梢各一錢淡竹葉一握燈心引一方有車前子溺血者加辰砂五分竹葉石膏湯治大病後煩熱作渴傷寒解後嘔渴少氣生石膏淡竹葉麥冬人參半夏炙甘草粳米有渴者去半夏姜引水煎服河間涼膈散治瘟疫時行表裡實熱及心火亢盛目赤便閉胃熱發斑大黃酒浸二兩芒硝連翹黃芩各一兩梔仁八錢薄荷七錢炙甘草六錢淡竹葉十五片生蜜五匙引水煎日三服夜二服得下熱退為度一書姜三片棗三枚蔥白一根引易老去大黃芒硝加淡竹葉桔梗治胸膈與六經之熱以手少陽三焦足少陽膽腑俱在胸膈同相火遊行一身之表乃至高之分故用桔梗舟楫之藥浮而上之以去胸膈六經之熱也症重者用河間方輕者用此方白虎解毒湯石膏四錢知母天花粉黃連黃芩梔仁各一錢麥冬生地黃各二錢淡竹葉十片水二鍾煎至一鍾去滓入犀角汁於藥內俟病人要湯水飲時以此藥與之代茶服潮熱第二十七熱如潮水來及時初出見之並無疵出盡若還遇潮熱退陽益陰妙方施潮熱雖然無重輕初出見之不須驚出盡收後如潮熱急以四物益其陰潮熱者一日至晚一度如潮水之及時而來不失其信也麻疹初出多見此候若出盡及收後見之此因氣血虛弱而然宜退陽益陰為主以四物湯見二十五條加人參治之渴熱第二十八麻發於心肺受先火甚津枯生口乾瀉心清肺多奇效治不違時病早安渴屬肺胃熱盛候唇口如丹發渴時清金瀉火生津液治分虛實兩般治麻症如焚飲水饒炎邪未許一杯澆咽喉乾燥心家熱津液乾枯胃脘焦渴乃肺胃兩經熱盛之候唇口必紅若唇口如丹是麻發渴之候也此因內熱所致火甚津枯故作口乾治當瀉火清金生津然當審察虛實而治之若二便結澀則為熱甚宜用清熱涼利之劑以門冬甘露飲去甘草主之若二便清利唇口淡而不紅而但渴者此必過用寒涼之藥損傷中氣與氣血所致脾虛不生津液而渴也以七味白朮散去木香以山藥易白朮加粳米主之初熱作渴者以白虎湯見二十六條去甘草粳米加麥冬天花粉牛蒡子連翹治之或以葛根麥門冬散去人參升麻赤芍甘草加天花粉連翹牛蒡子治之渴甚者以黃連解毒湯見第二條去甘草桔梗主之出現之時渴者以白虎湯見二十六條去甘草粳米加麥冬天花粉牛蒡子連翹治之出現之時渴甚者以白虎解毒湯見二十六條治之渴而煩躁者以白虎解毒湯見二十六條加黃柏治之正收之時而渴者以竹葉石膏湯見二十六條去人參半夏炙甘草粳米加元參牛蒡子黃芩黃連生地黃地骨皮治之朱曰唇不紅而但作渴者脾虛而津液不生也辨證之精如此門冬甘露飲治麻熱甚而渴麥冬去心二錢元參黃芩栝蔞根連翹各一錢生甘草五錢燈心三十根淡竹葉二十片引七味白朮散治胃虛津氣不行而渴人參白朮炒白茯苓木香各一錢藿香葉葛根各八分炙甘草六分水煎服葛根麥門冬散治熱毒斑頭疼壯熱心神煩悶葛根麥冬去心各一錢石膏升麻赤芍人參甘草白茯苓各五分淡竹葉七片水煎服口渴恣飲致成水蓄第二十九熱甚作渴饒飲水解毒生津功莫比若還縱飲不知休水蓄於中災異起麻症原是火邪心火內亢肺焦胃枯津液乾涸發熱之時未有不渴不可以冷水與飲只宜以綠豆或芝麻或炒陳米煎湯飲之治法宜生津解毒以加味人參白虎湯去人參甘草糯米加連翹牛蒡子元參主之若任其恣飲冷水必生水蓄之病如水入肺則為喘為咳宜用葶藶以瀉肺中之水如水入脾則為腫為脹為白利水入胃則為嘔為噦宜用豬苓澤瀉以瀉脾胃之水如水入心則為驚為悸宜用木通赤苓以瀉心中之水如水入肝則為脅痛宜用陳芫花以瀉肝中之水如水入腎與膀胱則小便不利宜用車前子木通以瀉腎與膀胱之水渴而腹脹不食者乃本虛實滯為敗症而難治也加味人參白虎湯人參知母熟石膏葛根天花粉麥冬淡竹葉甘草糯米一撮為引水煎以米熟為度復熱第三十麻疹收後喜無熱若逢復熱毒未息治宜和解與清涼莫因收盡遂輕忽復熱者謂熱已退而復作也此候先無必待麻收後熱退身涼越六七日而又復熱此症非因復感風邪而然必因餘熱未清餘毒復還所致治宜清涼和解為妙以柴胡麥門冬散去人參甘草或以生地骨皮湯去甘草主之然麻初起喜熱惟忌麻愈之後復熱何也蓋麻發熱多至十一二日少亦不下七八日熱久元氣虛矣加之出麻之後飲食不進今復重熱陰陽虛耗不死何待急須調治故再熱者必大補氣血可也以柴胡四物湯主之朱曰已收復熱在病家未有不引以為憂者然總不外此三因治之得法必無妨礙柴胡麥門冬散治收後甚熱柴胡酒炒人參元參各五分龍膽草三分麥冬去心八分甘草水煎服生地骨皮湯地骨皮生地黃元參麥冬龍膽草牛蒡子連翹黃芩酒炒梔仁炒赤茯苓木通甘草梢燈心引舌有白胎加荊芥防風舌有黃胎加酒炒連翹便閉加枳殼火麻仁閉甚再加丑牛柴胡四物湯治麻後餘熱柴胡黃芩人參生地黃當歸身川芎白芍藥知母麥冬淡竹葉地骨皮水煎服始終潮熱第三十一始終潮熱總不休飲食不進亦堪憂咳嗽口渴與痰候養陰退陽妙方投麻症初起最喜潮熱正收與收後又喜無熱若自初起至收後而始終潮不退者或飲食不進或咳嗽或口渴或見痰症俱屬血虛血熱夫麻症屬陽血多虛耗滋陰補血其熱自除此養陰退陽之義也宜用四物湯見二十五條按症加減主之如口渴加麥冬天花粉或犀角汁如咳加栝蔞霜杏仁霜如有痰加貝母陳皮如有喘加芥子葶藶總宜加元參骨皮黃芩黃柏之類以治之切忌用人參半夏白朮之類朱曰始終潮熱非血虛即血熱滋陰補血治法最佳加法亦合拍煩躁第三十二心火內熾煩躁干急宜瀉火清心源若因久病元氣虛法用養陰病即痊麻本火候火者手少陰心經主之心火內熾故煩躁不寧若麻症火邪太甚煩渴便閉致麻不出危篤之極宜清心瀉火清金以清陽湯見第九條除升麻桔梗甘草生薑倍用麥冬黃芩玄參以三劑與服而麻即出或以加味人參白虎湯見二十九條去人參甘草粳米加黃芩元參主之若系久病之人元氣虛弱或變煩躁口渴麻竟不收凝滯在皮膚間者此血虛故也則不宜用前二方當以養陰湯主之此乃養陰配陽之義也朱曰煩渴便閉致麻不出亦麻證之至險者知瀉火清金之法雖險必安至本條所示清陽湯及加味人參白虎湯內中皆有散藥所以為佳養陰湯熟地黃牛蒡子炒研各八分當歸白芍藥麥冬冬七分荊芥三分川芎薄荷各二分元參連翹各五分二劑水煎服後劑加黃連二分五釐出不快發不出第三十三欲出不出亡立待一出即收死反掌毒歸五臟生四症只因邪留正氣傷寒鬱熱邪不得出隱而不現非早收宜用湯丸急早治發而不出一命休麻症初起必發熱咳嗽渾身脹痛有似傷寒之候惟乾咳連聲目赤多淚嘔惡便溏確為麻症之驗然發熱之時既明麻症而麻於耳後項上腰腿上先現然後遍及手足者為齊總以頭面更多者為佳麻頂尖長形小而勻者吉也若麻疹將發之際或為風寒暴襲或因肢體坦露寒鬱熱邪不能外出此全盛之勢未萌與麻出早收不同其有初熱吐瀉交作者是為順候乾嘔悶亂者則為逆症欲出不出者危亡可立而待也一出即收者死在反掌間矣何也夫麻以出盡則毒解邪氣鬱遏則毒留而不去正氣損傷則人困而不伸毒歸五臟而四症生焉毒歸於脾則泄瀉不止毒歸於肝心則煩熱不退而生驚搐毒歸於肺則咳嗽血出毒歸於胃則牙齦腐爛而成疳蝕凡有出不快者總宜用解毒之劑如消毒飲見二十二條去甘草宣毒發表湯見第五條去升麻甘草桔梗淡竹葉或葛根解毒湯見第五條去赤芍甘草加枳殼或防風敗毒散見第五條去甘草桔梗或用葛根疏邪湯等劑以發之若無汗而出不徹者外用胡荽同蔥搗爛和酒糟蒸熱以絹包裹自頭面及手足逐一揩之勿令見風衣被溫厚自然出快如有氣粗喘促腹中脹痛煩躁不寧致麻不出者急以麻杏甘石湯合三味消毒飲俱去甘草以治之輕則仍以宣毒發表湯見第五條去升麻桔梗甘草主之若因觸犯風寒霧露隱現不能發出者以新豬糞沖湯隔水蒸之冷則更添滾者並取豬糞燒灰以蔥白湯調下二三錢此乃痘科治痘黑陷用燒人糞之變方即用燒人糞與服亦可若發之而仍不出者則不治矣朱曰出而不快尚是邪氣鬱遏至屢發不出正氣受傷危險極矣麻之初出耳後項上腰腿上先現然後遍及手足頭面多者最佳麻頂尖長形小而勻者吉也葛根疏邪湯葛根防風荊芥蘇葉牛蒡子連翹地骨皮前胡赤茯苓枳殼木通燈心引麻杏甘石湯治發汗後汗出而喘無大熱者麻黃去節三錢杏仁去皮尖研碎二十粒石膏五錢炙甘草一錢水煎服此乃麻黃湯去桂枝而兼越婢湯也專祛上焦濕熱痰氣三味消毒飲荊芥牛蒡子各一錢五分甘草二錢水煎服過期不出第三十四過期不出毒犯藏孔閉膚干勢可惶刻限必求麻疹現麻黃散子是仙方過期不出勢淹延毒閉身中難出現急用透肌休怠玩豈堪臟腑受熬煎發熱六七日以後明是麻症卻淹延不出此腠理厚密毛孔盡閉皮膚乾燥堅厚毒氣拂鬱於內或又為風寒襲之曾有吐利乃伏而過期不出也急用托裡發散之劑以麻黃散去升麻加胡荽子以發之或用獨聖散加胡荽子牛蒡子連翹春冬寒月再加蜜酒炒麻黃以發之又有治麻欲出不出者以消毒散加麻黃穿山甲以治之似乎大猛不若以消毒散去殭蠶蟾酥加胡荽蔥白葛根蟬蛻春冬寒月更加蜜酒炒麻黃以發之或外用胡荽酒以苧麻蘸戛為當若當出不出而無他症者以葛根疏邪湯見三十三條主之如不出急取向東狗糞燒灰存性水調服之即現若當出而參差不齊者以黑芝麻用冷水擂服若當出而過期不出反見煩躁悶亂腹脹氣喘手足冷者不治倘一向未更衣者此毒盛於裡伏而不出用河間涼膈散見二十六條去甘草加牛蒡子主之或從權施治以七物升麻丸解之發之解之不出者死症也麻黃散秘本方麻黃去根節濾去黑汁盡酒蜜拌砂人中黃瓦盛火煅牛蒡子炒蟬蛻去頭足升麻酒炒水煎服朱曰麻黃治恥實之藥古法去節與先煎去沫蜜酒拌炒皆後人之私心自用不足為法獨聖散又名檉葉散西河柳一名觀音柳一名垂絲柳又名檉柳小干弱枝葉細細如絲花穗長三四寸水紅色如蓼花之狀花遇雨即開為末以茅根煎湯下三四錢白水下亦可消毒散牛蒡子地龍即蚯蚓曬乾研末各二錢殭蠶貝母去心防風荊芥各一錢蟾酥二錢為末淡竹葉煎湯下一錢七物升麻丸凡覺四肢大熱大便艱難或二三日不更衣服之取微利不利再服更衣即大便也升麻犀角黃芩朴硝大黃各二兩淡豆豉微炒二升梔仁二兩為末蜜丸黍米大白湯下五六分已出熱甚不減第三十五麻出渾身似火燒毒邪壅甚急難消解肌只許皮膚暖救里宜令便溺調麻本火候非熱則不得出麻疹欲出則遍身發熱或煩躁或頭疼或身拘急及既出則身便涼清此一層麻隨收矣若麻既出而熱甚不減此毒邪壅遏宜以古方大青湯去甘草解其表如便澀者以古方黃連解毒湯加牛蒡子連翹川木通枳殼石膏知母或以大連翹湯以地骨皮易柴胡去赤芍治之若大便不通者以河間涼膈散見二十六條去甘草加牛蒡子以解其里既出發熱不退飲食少進者此毒逼胃宜以加味地骨皮散去赤芍甘草加酒蒸石斛治之朱曰熱甚不減總是毒邪壅遏古方大青湯大連翹湯加味地骨皮散方中或用荊芥或用防風或用葛根即托邪外出不敢一味清涼阻塞向外之機也古方大青湯治斑疹解毒良方大青元參知母石膏木通生地黃荊芥穗鮮地骨皮甘草淡竹葉十二片引古方黃連解毒湯治火毒痘麻通用黃連黃柏黃芩梔仁水煎服加大黃名金華丸潤腸瀉熱大連翹湯解裡熱良方連翹防風瞿麥荊芥穗木通車前子當歸蟬蛻黃芩滑石梔仁柴胡赤芍藥各等分加紫草茸五分水煎食前溫服加味地骨皮散地骨皮三錢桑白皮麥冬各二錢葛根柴胡赤芍藥各一錢生犀角屑甘草各五分水煎服已出紅腫太甚第三十六麻喜如珠紅潤澤紅腫太甚又非吉春火壅遏勢堪憂急治免教變紫黑麻出連串如珠顆粒分朋紅活光潤方為美候若麻出而紅腫太甚者此毒被壅遏所致倘不急治必變紫黑乾枯隱伏惡症宜以化毒清表湯見十六條去桔梗甘草或清熱透肌湯見二十五條去甘草加黃連黃芩枳殼木通山豆根葶藶以治之朱曰紅腫太甚熱入血分清熱透肌湯中雖有元參仍當再加涼血之品不透表第三十七隱隱藏於皮膚中欲出不透後多凶疏托消毒與分利須詳三因始為工麻疹不能透表者謂混身麻疹藏於皮膚之中欲出而不能透也古云隱暗之麻後多凶為難治然此不透之症有三因治者當詳審而施治一者因風寒鬱遏未能疏托以致皮膚乾燥毛竅竦立而然此宜以疏托為主以宣毒發表湯見第五條去升麻桔梗甘草合越婢湯見二十三條去炙甘草生薑紅棗加蔥白胡荽以發之或用葛根疏邪湯第三十三條加胡荽蔥白髮之亦可如表虛不勝疏托者當以蔥白一味煎濃湯時時與服但得微汗風寒即解而麻自透一者因火毒內熾熱極不能透表者此症麻疹根地頭粒混成一塊而色紅紫急宜消毒清熱以白虎解毒湯見二十六條加荊芥元參連翹牛蒡子治之一者因中氣本虛而不能透表者此症皮膚不燥唇口淡白二便如常雖有蘊熱不可輕用寒涼即用峻劑升發亦終不得出透但當分利使之內化可也宜以消毒飲見二十二條去甘草合三苓散加連翹枳殼以分利之假使虛熱內熾唇口雖紅其色亦淡此等症候雖欲透而不能透也只宜消毒以消毒飲見二十二條去甘草加山豆根連翹主之又有一等惟胸腹腰背暖處止有一二處現有麻疹粒頭赤紅頭面手足之間乍見乍無此症必纏綿難已且有收後五七日復發如前兩三次而愈者此乃氣候之異非不透之症此只宜辛涼透表以清熱透肌湯見二十五條去甘草治之漸次求安欲冀速效轉增危殆朱曰不透表證之風寒火毒二因尚為易治惟中氣本虛似宜加入參耆恐非升發分利所能奏功三苓散茯苓豬苓各二錢澤瀉三錢水煎服傷暑者用硃砂燈心引盡透表第三十八粒頭尖小收根者此為盡透表症也扁闊癢赤不離肉熱邪中伏大非雅麻盡透表方無後患何以見其透表但得粒頭尖大離肉收根及粒頭細小收根二者俱為盡透表也其有一種扁闊焮赤成塊塊上覆有小粒平塌不起而未見塊上離肉又有一種結成小塊如風毒遍身瘙癢偏高而紅腫但粒頭不尖者此二症雖透表其中必有熱邪伏留後必變症並宜用竹葉石膏麥冬連翹牛蒡子以滋潤之或以化毒清表湯見十六條去桔梗甘草薄荷防風加麥冬主之縱有餘熱從此渙散矣朱曰指出盡透表之形狀而後未盡透表者自易分別一齊湧出第三十九一齊湧出莫驚惶頃刻渾身朱錦裝似痘出時隨又收如斑紅赤卻成瘡痘以三四次出謂之出勻麻貴一齊湧出謂之出盡故凡麻只要得出毒便輕減以火照之遍身如塗朱之狀此將出之兆出形細密與痘相似但麻則隨出隨收非若痘之漸長而漸大也出形鮮紅與傷寒之發斑相似但麻則粒粒成瘡非若斑之皮紅成片如蚊咬之跡也故凡麻以一齊湧出為最美候不須用藥朱曰麻雖貴一齊湧出但當成粒不當成片醫家務須辨別麻色分治第四十麻亦渾身似錦紋白色血少要滋營黑麻一現最凶惡解毒消斑用大青痘瘡赤豔癢來攻麻疹鮮紅毒得松白色血虛猶可治黑斑惡候莫相逢痘麻之色不可同論大抵痘怕大紅皮嫩易破必生瘙癢麻疹之色最喜通紅何則夫麻發於心心屬火紅者火之正色也故麻鮮紅者毒得盡發而吉也若麻色淡白者乃心血不足也治宜養血為主以養血湯除甘草或益營湯去人參赤芍藥甘草或養血化斑湯去人參治之又有以四物湯見二十五條加升麻葛根治之者四物雖屬血劑而白芍川芎麻症不宜用而加升麻尤為不宜莫若養血湯隨症加減而用實為妥當也若麻色赤如錦紋者以古方化斑湯見二十一條去人參升麻甘草早米加元參或萬氏化斑湯見二十一條去桔梗甘草治之然俱宜加生黃芩生黃連治之如色大紅豔或微紫血熱也或出太甚者並宜以秘本大青湯去升麻桔梗或以古方大青湯去升麻桔梗俱加牛蒡子連翹黃芩黃連生地黃主之黑斑者死症也亦當以秘本大青湯去升麻桔梗加生地黃黃連黃芩火煅人屎末服之大便秘者加酒蒸大黃利之朱曰麻疹之色最喜通紅其或淡白或赤如錦紋者皆證之偏寒偏熱治法尤不可混養血湯治麻出白色生地黃當歸身紅花陳皮甘草生薑一片引益營湯治麻色白人參當歸酒炒紅花酒炒赤芍藥桂水炒甘草水煎服養血化斑湯治白疹人參當歸身生地黃紅花蟬蛻生薑引秘本大青湯大青元參知母石膏木通梔仁人中黃火煅研細桔梗升麻水煎調人中黃末服陰陽兩部多少第四十一麻本火候先動陽陽部多時症候良陽部若是稀少者恐有後患須當防先動陽分後歸陰陰部陽少症亦輕胸腹四肢向內者若逢稀少喜盈盈麻症雖肺胃主之而多屬於火發則先動陽氣而後歸於陰經面本為陽所以人身之中麻疹陽部宜多而不宜少陰部宜少多亦無妨何為陽部頭為諸陽之首面乃陽中之陽背與四肢向外者皆屬陽但得此數處麻多而透表則無後患何為陰部胸為陰腹乃陰中之陰腰與四肢向內者皆為陰但得陰部少而陽部多或陽部透表而陰部不能盡透均為順候若陽部少而陰部多者須防後患如解毒湯見二十六條除去桔梗清陽湯見第九條除去升麻桔梗甘草生薑等劑俱可隨症加減而用若陰陽兩部俱少者此乃麻毒輕也不在此例紅潤不起已出不紅第四十二紅潤尖聳如珠狀此等麻疹最為上若紅不起二便澀急用清熱透肌湯出而不紅髮熱甚煩躁頭疼或身疼葛根疏邪解表方須宜早用莫遲延麻疹色貴紅潤形貴尖聳若色雖紅潤而麻不起發者或兼二便艱澀宜用清熱透肌湯見二十五條去甘草治之如麻色淡而不起二便如常者此屬本虛當兼培養氣血以清熱透肌湯見二十五條去石膏甘草加生地黃當歸治之若已出而標不紅已現而發熱轉甚者或頭痛身痛煩躁者以葛根疏邪湯加元參麥冬主之或更加連翹地骨皮亦可凡欲解散表邪但表實邪甚者此方最宜葛根疏邪湯葛根防風荊芥蘇葉牛蒡子連翹地骨皮前胡赤茯苓枳殼木通燈心引鮮紅色淡紅色第四十三鮮紅光豔有重輕粒頭離肉膚潤平若是低塌不高聳清肺瀉火保安寧麻色淡紅正所宜本來肺胃毒少稀若是粒頭不離肉低塌色焦又貴醫麻色鮮紅內多有熱鮮紅者必光活而有豔色是也若是粒頭離肉皮膚活潤症還輕平倘粒頭低塌不高者其症多重急宜清肺瀉火如黃芩知母麥冬天花粉牛蒡子石膏清金之藥黃連梔仁連翹元參大青黃柏瀉火之品在所必用以黃芩瀉肺湯去桔梗大黃甘草加麥冬牛蒡子元參主之至若麻色淡紅麻所正宜蓋肺胃之毒原輕麻色故淡再得粒頭高聳而離肉此上吉之候若粒頭低塌而色焦枯燥又因風寒外折藥宜疏散之劑以葛根解肌湯見第五條去赤芍藥甘草治之又有一等初出粒頭不高色帶赤淡紅大便閉結唇口燥赤者此火邪內郁大熱症也急宜用大寒涼之劑佐以疏托之藥以白虎解毒湯見二十六條去竹葉加元參荊芥治之若不早治過數日後色變紫黑而難治矣朱曰鮮紅淡白在成粒高聳與低塌不高上分吉凶審證何等的確黃芩瀉肺湯治肺熱裡實症黃芩梔仁枳殼薄荷葉連翹杏仁大黃桔梗甘草水煎食後服粒紅膚白麻如肌白第四十四麻出成片被風押忽然一變為白色若是粒紅只膚白毒從血化症候吉麻之粒頭高聳色紅淡潤而肌膚白者此肺胃之火原輕乃上吉之症不須服藥又有毒從血化而見此候者亦有因熱毒從汗解而見此候者俱不必用藥而愈若初出之時麻色如肌膚一樣白不分肉地惟粒頭高聳晬時即收者邪熱本輕也然有表氣本虛而色白者調護溫暖無冒風寒越二三日而自變紅活也古云白疹溫暖而後滅者此之謂也又有一等正出之時為風寒所遏致麻色如膚白者其人必見毛竅竦慄此等症候必用疏散之劑解毒散風方得紅活以葛根疏邪湯見三十三條或葛根解肌湯見第五條去赤芍甘草加蘇葉薄荷枳殼赤茯苓主之倘若失治致毒難盡變症多端又有一種麻出成片一被風寒所折即變為白色身不發熱而毒反內攻煩躁腹痛痰喘氣急者危候也如毒攻於胃則嘔吐清水毒攻於脾則腹脹不食毒攻於肺則鼻塞喘促毒攻於心則唇舌焦裂不省人事搖頭掣手毒攻於肝腎則變黑色而不救矣朱曰白色除粒頭高聳邪熱本輕而外非風寒所遏即毒反內攻醫家遇此切勿大意紫黯色第四十五麻遇紫黑內熱極光活潤澤生可得紫赤干晦無起意縱是仙翁也費力麻遇紫色內熱極也但得光活潤澤粒頭尖聳者可治宜用清涼解毒之劑佐以消痰定喘之藥以涼血飲子去赤芍加貝母枳殼葶藶連翹牛蒡子主之譫語煩躁者以古方黃連解毒湯見三十五條調辰砂滑石末治之若既出之時而色紫紅乾燥晦暗者乃毒火熾甚急以生地芩連湯去白芍防風粉葛加枳殼紫草連翹或涼血地黃湯去甘草加木通枳殼紫草連翹牛蒡子黃芩黃柏解之或以四物湯見二十五條加酒炒紅花紫草地骨皮黃芩連翹牛蒡子黃連粉葛之類以滋陰涼血而內熱自除所謂養陰退陽之義也若麻收之時身上麻形肌膚帶紫色或青色者此內毒實熱之候以大連翹飲見三十五條去柴胡赤芍甘草加地骨皮枳實黃連牛蒡子以利二便使實熱從二便而泄如熱極甚者再加大黃以治之又有一等見暖則紅活不暖則焦枯此為風寒所閉治法雖應涼解而不可太過以暖為是宜用養陰湯見三十二條用生地黃去白芍川芎加防風荊芥以治之若麻紫而不光潤顏色枯燥而不起者則難為矣涼血飲子生地黃一錢五分黃連五分黃芩荊芥元參各一錢紅花三分丹皮赤芍各八分木通七分水煎溫服生地芩連湯生地黃黃連黃芩連翹紅花防風粉葛梔仁元參木通石膏當歸牡丹皮白芍藥燈心引如大便三四日不通合河間涼膈散利之見二十六條涼血地黃湯生地黃當歸尾黃連梔仁元參甘草水煎服粒頭焦第四十六麻粒頭焦實可驚熱極急將肺胃清治之若還不及時變成紫黑命歸陰麻疹透表而粒頭焦者不論麻色紅淡皆為熱極之候急宜清肺涼胃分利小便並且以白虎解毒湯見二十六條重用石膏加木通澤瀉或加車前子治之如干燥無汗加蜜酒炒麻黃以汗之大便燥者宜於清解劑中佐以血藥而潤燥以全書除熱清肺湯加當歸火麻仁枳殼治之如不通者方以承氣湯或河間涼膈散見二十六條去甘草下之倘治之不早多致紫黑難救矣有等原發小疥而頂焦有似於麻焦而實非麻焦臨症須詳審朱曰紫黯色粒頭焦皆熱極之候當於清熱解毒涼血諸法中求之小疥似焦尤須注意全書除熱清肺湯清肺金瀉心火主方麥冬黃芩石膏元參生地黃貝母赤茯苓壯熱加地骨皮黃連氣粗加炒葶藶子栝蔞霜便閉加當歸火麻仁枳殼承氣湯治少陽膽經陽明大腸症生大黃四兩厚朴姜汗拌炒六錢枳實麵粉拌炒三枚水煎服加芒硝三合名大承氣湯雲頭片第四十七麻如雲片焮紅赤或作腥臭出膿血一因表火一因里治分內外免疏失麻出有如雲頭大片其形微起此症有二一證現大片焮紅赤腫而微離肉者一證於紅腫大片之上復有小紅點現於片上者皆因表火熾甚所致當分內外用大寒涼之劑或分利之以白虎解毒湯見二十六條加葛根元參治之若麻出如錦紋斑爛或出膿血腥臭不幹心胸煩悶嘔吐清水身溫熱者以白虎解毒湯見二十六條加貫仲以散結積諸毒而除濕熱加防風荊芥穗以治風而消瘡毒有加蒼朮治之者雖云甚當然似乎當慎慎勿遲延恐致不救若麻稠密身痛煩躁者以涼血飲子見四十五條去赤芍加紫草連翹牛蒡子治之倘系癮疹遍身狀如雲頭片斑點乍有乍無者則當以消風散治之朱曰雲頭大片加以腥臭出膿血外證已極險惡認定表火熾甚以散結毒除濕熱諸法治之自可轉危為安若系癮疹雖狀如雲頭片而斑點若有若無其分別在此消風散當歸生地黃防風蟬蛻知母苦參荊芥胡麻仁牛蒡子石膏各一錢木通五分水煎食遠服一方有蒼朮甘草發熱而發斑屑是成癮疹第四十八發熱蒸蒸便已硬皮紅似錦是名斑莫將麻毒雷同看笑殺庸醫一樣觀斑症血勝氣不足麻候營血虧耗多初熱皮膚覺似斑莫作真斑用寒藥麻症初起全類傷寒但中指冷者乃是麻候若發熱時大便閉結或已硬皮膚上紅如錦者乃熱留胃中是發斑症非麻症也不可認作是麻而妄用發散之劑用之反增危劇宜以加味人參白虎湯見二十九條去人參天花粉甘草粳米加大青元參生地黃枳實木通主之一則可以化斑屑二則無礙乎麻候如大便不通者以三黃丸微利之夫發斑之症乃血有餘而氣不足也麻症乃是火熬血分血多虛耗陽氣多旺遂得有此若發熱之時皮膚上有覺似斑屑者此實非斑乃風寒協熱在表而成癮疹此等症候只宜疏散之劑內加清解之藥俟麻一透癮疹自退慎勿認作真斑而施苦寒之品遂用紫草紅花石膏等化斑之藥以致大便水泄不止元氣日衰致麻內陷而難救也如葛根解肌湯見第五條去赤芍甘草可以施治若麻已出而夾斑者以犀角紅花飲主之朱曰中指冷者為麻候發斑忌用發散癮疹之異於發斑如此三黃丸黃連黃芩各一兩大黃二兩為末水泛丸白湯送下犀角紅花飲犀角磨汁紅花生地當歸尾丹皮連翹牛蒡子木通枳殼水煎服易收早收難收第四十九麻出高聳潤澤點清解重施肺無險自表至里漸次收膚無瘡痕名為斂麻出一日即便收非冒風寒即挾熱誤食酸物亦能致三者源來有分別旋出旋收病勢輕連綿不盡勢堪驚化斑解毒令消滅莫使餘邪集病身麻疹出收合陰陽出以溫和收以涼連出不收陽氣盛遲遲間出是陰強麻疹出收常以六時為準如子後出午時即收午後出子時即收乃陽生陰長陰生陽成造化自然之數也凡此旋出旋收者乃為易收其症則輕然麻之易收必須先時麻出高聳粒尖淡紅色潤以其毒輕而肌表易清肺無加咳故易收也又有一等火毒雖重而重施清解以致肺胃火邪悉退而易收者有之然必於三日之間從肌表而漸收於裡或三日之間一時收盡膚上並無瘡痕形影者方為易收治者當詳審之若麻出一日而收者乃見風大早為風寒所沖麻毒內攻未清爽者非為易收急宜施治若不早治必致胃爛而死宜以葛根疏邪湯見三十三條主之雖不復出亦無後患即三日後麻已收斂明白如有被風寒所襲者亦宜以此方主之至於早收則與易收不同早收者麻出未經三日或一二日或半日而收盡周身肌膚暖處絕無紅影乃為早收終變危候若雖未經三日而早收肌膚上暖處尚未全收其毒未盡而攻於內急宜清毒解肌透表以救之宜用解毒快斑湯去楂肉生甘草川芎桔梗紫草茸加石膏知母元參治之發之不起當審其所因而與內解何則早收之候有三因一因正出未透之際而胃風寒麻因風寒所遏邪反內攻以致早收宜以葛根疏邪湯見三十三條加蔥白與之熱服或以消毒飲見二十二條去甘草加蔥白葛根與之熱服服後便透者吉不透再用消毒飲見二十二條去甘草加酒蜜炒麻黃有更加穿山甲者當酌量而加以治之不急治必發喘脹而死亦有遍身青紫熱腫喘脹氣急此毒滯血凝半匿肌表急用河間涼膈散見第二十六條去大黃芒硝甘草加元參紫草茸丑牛蜜炒麻黃石膏以發越之若腹脹喘促溺清臍突者以河間涼膈散見二十六條去大黃芒硝加丑牛葶藶芥子治之庶或可救一二一因內挾熱痰火毒抗劇而伏匿煩躁或腹脹喘急不省人事者以白虎解毒湯見二十六條除天花粉淡竹葉加元參牛蒡子連翹栝蔞霜治之一因誤食酸醋收斂之物以致肺臟不通毛竅閉密而伏匿壯熱喘咳煩悶者以豬膽汁煮甘草煎湯續續與服或以苦瓠同生甘草煎濃湯灌之以探吐吐中便有發越之義然仍宜疏托當以消毒飲見二十二條去甘草與服如誤食豬肉喘脹氣急者亦以消毒飲見二十二條去甘草加枳殼丑牛楂肉以下奪之有用枳殼湯去厚朴甘草加神麯麥芽治之者確無濟於事若誤食桃李生冷喘咳聲喑者以消毒飲見二十二條加木通枳殼石膏馬兜鈴去生甘草主之果得熱退身安氣息漸調者方可無虞又有因大病或久病之後而出麻其人中氣虛耗致毒不能發越而收早者或有因初潮始熱之時泄瀉久經不止或未發熱之先曾經洞泄者亦致中氣虛損麻才出盡而隨即收者此數者雖用疏托之藥而毒終難發盡惟當健運中氣略兼解表清熱之劑如香砂六君湯去半夏少用白朮木香砂仁等分加麥冬連翹牛蒡子酒炒黃連酒炒黃芩荊芥防風葛根之類可以施用愚意當以沙參易人參薏苡仁易白朮木香砂仁可除更可加貝母但與微整門戶仍即用消毒之劑如消毒飲見二十二條又宜繼用慎勿遲延恐致肺胃敗爛而不救若麻已出而復收有用當歸紅花飲加蔥白牛蒡子連翹葛根治之者大為不妥姑錄是方證謬或出不盡心慌啼哭不止十分危急死在須臾或下痢腹痛有用黃芩白芍二味治之者不妥須當以解毒快斑湯去桔梗甘草楂肉紫草茸川芎加枳殼赤茯苓隨症加減治之大抵麻在三四日之後覺漸次收斂方為順候然必待肌表清涼麻方能收若麻出致三四日五七日不收者肌膚必然壯熱此為難收之症宜用解肌涼血之劑佐以利水之藥以涼血飲子見四十五條除去赤芍加木通赤茯苓枳殼葛根主之若一出連綿至四五日不收者乃陽毒大甚須用化斑解毒湯去升麻大黃加黃連黃芩生地黃地骨皮以解之便閉而有腹疼者並用大黃以利之或以秘本大青湯見第四十條去升麻桔梗加黃連地骨皮黃芩生地黃以解之便閉腹疼者加丑牛以利之解其毒使之發於外庶里無餘邪免生後患若解之而仍逡巡不出者乃風寒外束皮膚秘密也宜以葛根疏邪湯見三十三條加薄荷地骨皮治之若麻點帶白燥色隱隱於肌表之間似收非收而實不收者此必因風寒所絆而不能透表非難收也宜急用疏托之劑佐以寒涼之藥以葛根解肌湯見第五條內去赤芍藥甘草加防風黃芩治之若肌膚之上無點粒惟見如片膚平不高此為易收而未收盡也宜用解肌之藥亦以葛根解肌湯見第五條去赤芍甘草隨症加減治之如見有內熱之症亦宜清內熱倘內熱不除多致不能盡收如生地骨皮湯見三十條去甘草古方黃連解毒湯見三十五條加味導赤散俱可選用加減而施張璐先生曰西北水土剛勁稟質亦厚麻必五七日乃收東南風氣柔弱麻出不過二三日即收邇來地運變遷無分西北東南體質均弱未有不綿延日久方收者當非難收之比若三四日後麻疹點燥色白隱隱於肌膚之間而難收者此必衛氣素弱不能掀發或因衣被單薄致冒風寒阻其發越之機以致延綿多日法當用辛散透表之劑如荊芥葛根前胡牛蒡子西河柳麻黃之類以發散之淡竹葉元參薄荷蟬蛻之類以透肌切不可遽用寒涼閉其開泄之路此訓可以為萬世治麻大法朱曰予治麻必經六七日始收從未有三日即收者今讀張石頑先生此訓乃恍然解毒快斑湯麻疹現形一二日宜用連翹牛蒡子防風荊芥穗當歸尾桔梗各七分生地黃楂肉各八分蟬蛻去頭足七隻黃芩紫草茸各六分乾葛一錢西河柳五分川芎五分生甘草去皮三分水煎以犀角磨汁對服枳殼湯厚朴去皮薑汁炒陳皮薑湯泡去白各三錢枳殼麩炒四錢炙甘草三錢水煎服香砂六君湯治氣虛痰滯食滯氣滯等症人參白朮白茯苓炙甘草陳皮半夏木香砂仁紅棗姜引當歸紅花飲治麻已出而復收系備用方當歸酒炒紅花葛根連翹牛蒡子甘草水煎服一書有升麻一書有生白芍桔梗化斑解毒湯元參知母石膏牛蒡子連翹大黃酒蒸人中黃火煅另研淡竹葉升麻水煎調人中黃服加味導赤散薄荷葉四分生地黃酒洗木通元參車前子炒研末淡竹葉各七分連翹六分黃連二分燈心石膏引
