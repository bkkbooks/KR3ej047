body:
  text: 卷之三咳嗽第五十發熱蒸蒸咳嗽頻涕流鼻孔淚滿睛面浮眼腫雙腮赤此是天行麻毒侵發熱蒸蒸咳聲頻目腫面浮氣上行坐臥不安痰唾少肺葉焦舉熱邪蒸麻症百聲咳不歇初熱未出正相宜不咳少咳皆不順啓咳須要用陳皮正收收盡宜無咳此時有咳須早醫清金瀉肺為先務若待危時悔已遲麻毒連綿上氣咳發作百聲終不歇胸高肩聳衄長流擺手搖頭泉下客天行麻疹與傷寒相似惟麻則噴嚏鼻流清涕眼胞腫目淚汪汪之為異耳但見此等症候便是麻症夫麻原發於心心火內亢則肺金受克以致肺葉焦舉故有咳嗽朱曰釋麻證之咳嗽要言不煩法當清金瀉火以加味人參白虎湯見二十九條去人參甘草糯米加牛蒡子連翹主之有用白虎湯見二十六條去甘草糯米加牛蒡子薄荷葉治之者或以三味消毒散合瀉白散二方俱去甘草治之方中桑白皮採取鮮者多用為妙熱甚煩渴者加知母天花粉石膏黃芩之類如咳甚者以二母散或麥門冬湯除去升麻赤芍甘草或清肺湯去桔梗甘草加蘇子或祕本清肺湯去桔梗甘草或聶氏清肺飲去柴胡陳皮桔梗甘草等方隨症而用之然確宜清熱透毒不可止咳故古人多用清揚飲子去甘草加連翹主之慎勿用五味子及收斂等藥祕塞肺竅令咳嗽終身不已朱曰收斂等藥祕塞肺竅切記勿用只宜清餘熱消痰壅而咳自止貝母麥冬飲除甘草桔梗加連翹牛蒡子黃連黃芩之類前後咳嗽俱可施用夫麻有咳則肺氣疏通毛竅開豁而麻則易於出透所以麻症初熱未出之先最喜咳嗽朱曰麻有咳之故不可不知多咳則為順候俚言所謂撲麻是也麻疹出透則心經火息肺無克伐而咳自止朱曰麻出透自不咳心火息而肺不受刑也正出之際若無連聲咳嗽及少咳與不咳者則腠理閉密麻難透表急於升發藥中多加留白陳皮以啓其咳使毛竅開泄腠理舒暢朱曰加留白陳皮以啓咳即疏通腠理之意而麻自易出透矣已出之後及將收收後則又以無咳為佳如麻已出而咳不止身熱作渴煩躁不食脈洪者以古方黃連解毒湯見三十五條加生地黃鮮骨皮治之肺熱如咳喘者用生地黃散去陳皮加黃芩葶藶桑白皮治之喘甚者加栝蔞霜白芥子蘇子萊蔔子治之出盡及收後微微咳嗽者此餘邪未盡肺氣未平也不須服藥若欲治之則以瀉白散合三味消毒散俱去甘草與服如肺燥塞不利而咳者以利金湯去陳皮桔梗甘草生薑加麥冬牛蒡子黃芩桑白皮治之麻盡透而壯熱咳嗽大便閉者以除熱清肺湯去赤芍甘草加黃連黃芩地骨皮火麻仁枳殼以清利之或加大黃下之如出盡及收後咳嗽甚而仍不止者是屬瘀熱治宜清熱降火佐以消痰之品以清咽滋肺湯去玉竹桔梗甘草加黃連枯黃芩或聶氏清肺飲去陳皮柴胡桔梗甘草加貝母黃連主之出盡收後咳嗽不止而多痰者以清咽滋肺湯去玉竹麥冬桔梗甘草加枳殼茯苓陳皮治之或聶氏清肺飲去柴胡桔梗麥冬加枳殼治之若麻至五六日而仍咳嗽氣粗外熱不退乃尚有餘毒留於肺胃宜用孟介石清肺飲除殭蠶柴胡陳皮桔梗甘草加地骨皮桑白皮葶藶治之或以靜遠主人清肺飲去桔梗甘草加石膏黃芩治之如麻後咳嗽聲音不清不思飲食眼目不清唇口乾燥者以清肺消毒化痰湯去桔梗甘草治之若麻後氣喘咳嗽連聲不住者此乃毒流於肺經肺中伏火金虛葉焦故咳嗽連聲不住也以祕本門冬清肺湯或用骨皮清膈散俱去桔梗甘草糯米治之如體熱者亦以祕本門冬清肺湯去甘草桔梗糯米加黃連黃芩牛蒡子治之咳嗽甚而氣喘連聲不住甚至飲食嘔水者此熱毒乘肺而然也亦以祕本門冬清肺湯去甘草桔梗糯米加蜜炙枇杷葉治之見血者再加茅根阿膠治之如咳嗽有吐血者以麥冬清肺湯去楂肉桔梗加生地黃主之兼有嘔水者亦以此方除楂肉桔梗治之如麻後咳嗽氣急者以枳殼前胡湯除甘草桔梗以蘇子易蘇梗加芥子萊蔔子葶藶栝蔞霜以治之然亦有加沉香者在麻後似亦無害如麻後但氣粗者以聶氏清肺飲仍除柴胡桔梗甘草加芥子蘇子萊蔔子葶藶治之如麻後咳嗽不止內熱不清心神不寧夜臥不安以天真膏除黃耆白朮薏苡仁加酒炒黃連酒炒黃芩辰砂主之如麻後咳嗽失聲發熱者以葶藶丸加地骨皮天花粉酒炒黃連黃芩水煎與服麻後咳嗽腹脹喘急煩躁泄瀉聲啞唇青口青者以賈蘭峰傳方除麻黃陳皮桔梗甘草白芍加麥冬骨皮芥子治之或不除白芍更加柴胡亦可此在麻後治法變通在乎其人然切不宜遽用白朮等味如麻後久咳不止以生地黃當歸身白茯苓川貝母桑白皮杏仁柿霜等味以養血涼血清金而咳自止然竟有以四物湯見二十五條合枳桔二陳湯加栝蔞霜杏仁治之者雖曰無礙反不若以前之七味治藥簡而功捷也如兼渴者加麥冬枳殼兼喘者加蘇子芥子治之或更加葶藶萊蔔子亦可其有感觸風寒咳嗽煩悶嘔逆清水眼赤咽痛口舌生瘡者以防風敗毒散見第五條加生黃芩治之如咳嗽氣喘唇焦熱結在內煩躁不寧或口鼻出血不拘前後並宜以犀角解毒化痰湯去赤芍甘草加麥冬杏仁葶藶治之或用聶氏清肺飲去陳皮柴胡淡竹葉甘草桔梗加黃連當歸尾治之收後如見此候以加味人參白虎湯見二十九條去人參甘草糯米加生地黃地骨皮黃芩以滋潤之倘或久咳不止面浮目腫胸高如龜肩聳氣喘搖手擺頭口鼻出血面色或青或赤或白而枯鼻燥昏悶者皆不治之症也朱曰不治之症加此三味消毒散治咽喉疼痛及麻疹已出未出與未出勻又治一切瘡毒並能涼膈消痰牛蒡子炒研二兩荊芥穗二錢五分甘草五錢研末每用三錢水煎服瀉白散治喘嗽並脾肺經有熱目黃口不吮乳桑白皮蜜炙地骨皮各一錢炙甘草五分糯米一百粒引水煎食後服加人參白茯苓知母黃芩名加減瀉白散治肺炎喘嗽二母散治麻後咳嗽甚及肺熱咳嗽知母貝母去心童便洗生薑一片引水煎服或為末白水下一錢麥門冬湯即二十八條內葛根麥門冬散去人參淡竹葉麥冬去心葛根熟石膏各一錢茯苓赤芍藥酒炒各六分升麻四分炙甘草四分水煎服清肺湯治麻後咳甚枯黃芩貝母桔梗各七分防風炙甘草各四分水煎服祕本清肺湯治不時咳嗽寒熱唾紅黃芩當歸麥冬防風赤茯苓生地黃連翹蘇葉前胡桔梗甘草各五分桑白皮一錢水煎服聶氏清肺飲治麻後氣粗咳嗽桑白皮蜜炒地骨皮去骨各五分麥冬去心一錢五分天花粉元參各八分柴胡六分桔梗黃芩酒炒川木通去皮各三分熟石膏生地黃各一錢陳皮生甘草去皮各三分淡竹葉燈心引水煎加羚羊角磨汁對服清揚飲子麻疹主方西河柳五錢麥冬元參各二錢牛蒡子炒葛根各一錢五分知母蜜炒蟬蛻肚洗去土薄荷葉荊芥穗甘草各一錢淡竹葉三十片水煎服貝母麥冬飲貝母麥冬薄荷葉元參栝蔞仁桔梗甘草水煎服生地黃散治麻肺熱喘咳斑疹身熱口乾心煩生地黃一錢麥冬五分杏仁款冬花陳皮各八分水煎服準繩有甘草一書並有桔梗利金湯治肺燥塞不利而咳貝母茯苓枳殼陳皮桔梗甘草生薑白蜜引除熱清肺湯治麻盡透而壯熱咳嗽大便閉結石膏三錢麥冬去心一錢五分元參生地黃貝母栝蔞根赤芍藥各一錢甘草五分水煎溫服清咽滋肺湯治麻後餘熱咳嗽聲喑元參牛蒡子荊芥貝母麥冬栝蔞根馬兜鈴明玉竹桔梗各八分甘草四分水煎服此方繆仲淳有薄荷無馬兜鈴孟介石清肺飲熟石膏生地黃各一錢五分麥冬二錢淡竹葉七分陳皮七分元參柴胡各一錢當歸尾黃芩知母炒桔梗各七分殭蠶炒五隻甘草去皮三分燈心五十寸引靜遠主人清肺飲治麻後傳肺胃二經咳喘急麥冬牛蒡子防風茯苓桑白皮地骨皮知母桔梗甘草水煎服清肺消毒化痰湯牛蒡子荊芥穗防風貝母各五分連翹黃芩前胡茯苓各七分枳殼桔梗各一錢甘草三分水煎作十餘次徐徐服祕本門冬清肺湯天冬麥冬知母貝母杏仁去皮尖炒研石膏骨皮牛蒡子款冬花桑白皮馬兜鈴桔梗甘草糯米引水煎服骨皮清膈散黃芩二錢五分石膏七分滑石七分五釐地骨皮當歸知母桑白皮紫菀茸蜜炒白茯苓桔梗甘草各五分姜三片引水煎服此方加人參柴胡白芍白朮黃耆蜜炙各五分名人參清膈散治肺熱鼻乾涕唾稠黏麥冬清肺湯麥冬知母貝母黃芩杏仁天花粉枳殼陳皮丹皮楂肉桔梗水煎服枳殼前胡湯枳殼前胡防風赤茯苓蘇梗桔梗甘草水煎服氣急者以沉香磨水對服天真膏治麻後咳嗽不止內熱不清心神不寧夜臥不安或生瘡疥生地黃麥冬元參白茯苓紫菀茸知母陳皮桑白皮沙參生黃耆薏苡仁棗仁丹皮茯神當歸身白朮此方以生地麥冬元參沙參黃耆苡仁炒白朮為君白茯苓炒棗仁茯神當歸丹皮陳皮紫菀茸為臣炒知母桑白皮為佐入砂鍋內以長流水浸用桑柴文武火煮兩時之久水減再添水於內取出去滓將藥水澄清復入砂鍋再熬加蜜和成膏以瓷罐收貯每用三匙滾水調服葶藶丸治麻出氣喘將成龜胸葶藶子隔紙略炒漢防己牽牛子略炒杏仁去皮尖油萊蔔子煎服大便溏滑者除牽牛賈蘭峰傳方黃連黃芩連翹元參知母杏仁乾葛麻黃牛蒡子陳皮厚朴白芍桔梗甘草水煎服枳桔二陳湯半夏薑汁蒸三錢陳皮去白白茯苓各一錢甘草五分枳殼桔梗各八分姜引水煎服犀角解毒化痰湯治麻後咳嗽氣喘唇焦結熱或煩躁不安或口鼻出血犀角磨汁丹皮連翹貝母天花粉薄荷紫草茸甘草梢各一錢當歸八分牛蒡子九分赤芍六分生地黃二錢黃連五分淡竹葉三十片水煎服氣促發喘鼻扇胸高第五十一氣促原因肺未清開口出納喘候真鼻扇痰鳴肺將絶胸高必定歸幽冥氣促之症多緣肺熱不清所致治法當分時候若見於未出及正出之時藥宜疏托以清熱透肌湯見二十五條去甘草主之如見於正收及收後藥宜降火及瀉肺氣以清咽滋肺湯見五十條去玉竹桔梗甘草加茯苓陳皮以消痰若開口而作出納胸脅高疊起止不常不定是為喘症乃屬痰火之候熱邪壅遏肺竅氣道阻塞而然也然喘症有虛實之分實者易治虛者難為欲察其虛實之確在於大便之溏泄小便之清利大便之堅結小便之赤澀上別之朱曰虛實之分當於見證求之若大便溏泄小便清利唇白而身無大熱皆為虛症治以半夏蘇子芥子葶藶桔梗甘草萊蔔子陳皮南星茯苓之類以清痰潤肺多難獲效實則大便堅燥小便赤澀唇紅而身發壯熱用甘草桔梗陳皮枳殼蘇子栝蔞仁杏仁桑白皮黃芩黃連天冬麥冬等味多易於取效果系實者以竹葉石膏湯見二十六條去人參半夏炙甘草粳米加栝蔞仁貝母白芥子治之冬月更加蜜酒炒麻黃少許可以隨手而應大抵未出時喘者易治收後而喘者難治如發熱時多喘邪熱壅於肺故也慎勿用定喘之劑惟宜以大劑石膏知母竹葉湯或柳葉葛根湯去甘草主之初發熱而喘者以麻黃湯去甘草加連翹牛蒡子枳殼或以清金散火湯去桔梗甘草加酒炒黃芩杏仁連翹枳殼治之初發熱未出之時而喘者以三拗湯去甘草加荊芥石膏芽茶治之如肺炎喘嗽以加味瀉白散去人參甘草主之發喘而鼻黑乾燥者以白虎解毒湯見二十六條主之如痰實壯熱胸中壅悶臥則喘急以前胡枳殼散去甘草加貝母黃連黃芩栝蔞霜治之如麻已出而喘者用加味清肺降火湯主之如麻出三日後而作喘者急以靜遠主人清肺飲見五十條去知母桔梗甘草加古仁栝蔞霜芥子治之或以生地黃散見五十條治之如麻後發喘以清咽滋肺湯見五十條去玉竹桔梗甘草合白虎湯見二十六條去甘草粳米以滋潤肺胃若麻後而喘日久胃虛不可用白虎湯見二十六條只宜以靜遠主人清肺飲見五十條主之麻後如有日久發喘不歇者以小柴胡湯見二十二條以貝母易半夏沙參易人參加五味子從權治之若喘而無涕兼之鼻扇者則難治矣蓋鼻扇症肺氣將絶若鼻扇而喘滿痰鳴者此必不治如鼻扇而咽喉清利無喘滿而精神如故不減者十救二三宜滋培肺氣藥以潤肺清痰為主以補肺阿膠散治之收後而鼻扇者不治若麻喘而胸高者乃肺經熱甚而脹起者也其症多見於正收及收後凡麻見胸高之症為肺壞乃不治之候有用葶藶桑白皮散治之者亦僅十全一二而已若冀其施無不應未之有也石膏知母竹葉湯石膏五錢至一兩肥知母一錢至二三錢淡竹葉三十片至一百片麥冬三錢至五錢薄荷葉三錢西河柳兩許水煎服柳葉葛根湯西河柳前胡葛根荊芥穗貝母元參知母麥冬甘草水煎服麻黃湯麻黃泡去緑汁杏仁去皮尖油甘草各五分石膏臘茶葉各一錢一方去石膏加桑白皮水煎服清金散火湯麻黃泡去緑汁蘇葉牛蒡子桔梗甘草水煎服三拗湯麻黃去節三錢杏仁去油皮尖二十粒生甘草水煎服加桔梗荊芥名加味三拗湯加味瀉白散桑白皮地骨皮白茯苓知母黃芩人參甘草糯米一百粒引水煎食後服前胡枳殼散前胡枳殼赤茯苓炙甘草各五錢大黃量兒加減每服三錢水一盞煎六分旋服加味清肺降火湯治麻出喘急陳皮枯黃芩麥冬桑白皮生地黃貝母梔仁栝蔞仁天花粉石膏葶藶子地骨皮蘇子炒燈心二十根引水煎服補肺阿膠散治肺虛有火嗽無津液而氣梗鼻扇阿井膠蛤粉炒一兩五錢能補血液清肺滋腎益血補陰氣順則不梗液補則津生火退而嗽寧馬兜鈴一兩象肺故入肺清熱降火牛蒡子炒香一兩利膈滑痰而潤肺解毒能治火嗽杏仁去皮尖七錢潤燥散風降氣止嗽粳米一兩即米云米益脾胃炙甘草一兩益脾胃水煎服李時珍曰補肺阿膠散用馬兜鈴非取補肺取其清熱降氣而肺自安也中間之阿膠米云米乃補肺之正藥要知清熱降氣瀉之即所以補之也若專於用補反能助肺火而增咳嗽葶藶桑白皮散治胸高氣喘葶藶子隔紙炒香研漢防己杏仁貝母蘿蔔子薑汁炒研家蘇子薑汁炒研桑白皮蜜炒枳殼黃芩白芥子薑汁炒研水煎服胸高而喘者加蜜炒麻黃齁䶎第五十二喉中齁齁痰䶎䶎毒火不得發越者未出正出十全一正收收後難為也麻屬肺胃如喉中有痰齁䶎而鳴者其症屬痰火之候此因毒火內結之極邪熱阻逆不得發越所致也若見於未出正出之間治當清肺降火消痰為主十中可救一二以除熱清肺湯見五十條去赤芍甘草主之若見於正收及收後者必邪熱未透毒火傳裡或露風早收餘熱內攻而肺氣受傷也實為難治此症宜防之未得之先朱曰此證餘熱內攻肺氣受傷十救一二醫者病者當預先防之喑啞聲音不清第五十三咳嗽咽傷聲喑啞非與痘瘡同例也此乃麻疹之常候認作危症是愚者麻本屬火喑啞乃麻之常候多吉無凶不可以痘瘡喑啞比例蓋因肺胃熱邪為風寒所襲不能盡達於表咳甚咽傷故喑啞也治宜清肺降火消痰為主以清咽滋肺湯見五十條除去玉竹桔梗甘草加黃芩木通主之若肺熱咳嗽聲啞者以萬氏清肺飲去菖蒲訶子仁桔梗加黃芩貝母主之若聲喑而咽痛者以射干消毒飲去甘草加黃芩山豆根主之如麻後聲音不清咳嗽不思飲食眼目不清唇口乾燥者以清肺消毒化痰湯見五十條去桔梗甘草加麥冬黃連天花粉主之如心虛聲音不揚者以導赤通氣湯除去甘草人參加沙參主之如系肺熱聲音不清響者以甘草清金散主之兼有咳者以清金降火湯主之或以驗方治之朱曰音啞聲嘶證頗駭人讀此詩始釋然射干消毒飲射干元參連翹荊芥牛蒡子甘草水煎溫服萬氏清肺飲麥冬荊芥穗天花粉知母桔梗各一錢石菖蒲訶子仁各八分水煎服導赤通氣湯木通生地黃麥冬當歸身石菖蒲人參甘草燈心引甘桔清金散麻後肺熱聲音不清有用之而喑甚者宜刪桔梗一兩甘草連翹訶子皮各五分牛蒡子七錢為末每用一錢加薄荷葉少許水煎服清金降火湯治麻後肺熱聲啞咳嗽當歸白芍藥酒炒生地黃酒洗栝蔞仁白茯苓陳皮貝母去心薑汁蒸桑白皮蜜炒麥冬黃芩酒炒杏仁去皮尖黃連酒炒梔仁炒元參蘇梗石膏天冬甘草姜三片引水煎服治麻後咳嗽失音驗方牛蒡子黃芩天花粉薄荷葉桔梗甘草水煎服厄逆第五十四厄逆雖曰有虛實麻症實多虛無一只因逆氣上衝喉胃火炎炎作厄逆厄逆之症乃氣逆上衝而作聲也其症雖有虛實之分而麻屬火候而發厄逆乃胃火上衝所致實者八九而虛者未常見一二也治法宜以清火安胃為主如實熱痰火發厄逆者以竹茹柿蒂湯去半夏甘草加貝母石膏主之如厄逆不止者以安胃散去楂肉治之若厄逆一連二三十聲不歇者以紙條宣鼻孔中得嚏即已或以生薑汁同蜜汁煎熱頓服之亦可朱曰厄逆外治法以紙條宣鼻孔得嚏即已生薑汁同蜜汁煎熱頓服之亦治厄逆竹茹柿蒂湯竹茹柿蒂陳皮半夏甘草因惱怒發厄者加柴胡青皮黃芩安胃散陳皮麥冬木通澤瀉黃芩石斛楂肉水煎食遠服胃火甚者加石膏噴嚏第五十五噴嚏能令肺氣清始終有嚏麻必輕若還鼻塞而無嚏風邪留滯毒來侵麻症初起而多嚏者乃內火因風邪搏激而然故有噴嚏者則肺毒得解而肺氣全通矣朱曰噴嚏是麻證吉兆初熱未出之時若有噴嚏者必是先因外感而後得通也其毒縱凶可救正出之時有噴嚏者其麻必輕收後而尚有噴嚏者方為盡退乃毒得盡解可無餘患矣若嚏而多涕濁壅得泄肺氣自清最為吉兆若無嚏而鼻塞不通者必有風邪留滯如清肺湯見五十條除去桔梗甘草加荊芥薄荷葉連翹牛蒡子枳殼赤茯苓或利金湯見五十條去桔梗甘草生薑加赤茯苓薄荷葉連翹牛蒡子或全書除熱清肺湯等方俱可施用但凡遇有鼻塞不通之症總宜用辛涼之劑以透達之如荊芥乾葛牛蒡子薄荷葉麻黃辛散之品元參石膏淡竹葉栝蔞根清涼之味在所當施全書除熱清肺湯重出瀉心火清肺金主方麥冬黃芩酒炒石膏元參生地黃貝母赤茯苓水煎服壯熱加地骨皮壯熱太甚更加黃連氣粗加葶藶子栝蔞霜氣喘加蘇子芥子便閉加火麻仁枳殼便閉甚加大黃鼻通多涕鼻乾無涕第五十六始終多涕本為吉鼻乾無涕肺腑熱其間形症有數般叮嚀良工細認識鼻通多涕肺氣順也所謂多涕者鼻常有涕非鼻涕暫見比也麻症得肺腑平和鼻無阻塞此為順候初熱至出時多涕者皆為吉兆收後亦以多涕為易治至於鼻乾無涕必須鼻孔之內絶無物塞而鼻乾燥方是真候此乃肺腑熱極閉塞而不通也初熱未出之時見之其症必重以清肺飲去陳皮五味子桔梗甘草合清揚飲子見五十條除甘草淡竹葉加石膏黃芩更量加蜜酒炒麻黃以解表而疏通肺氣或以聶氏第二清肺飲去柴胡陳皮殭蠶桔梗歸尾淡竹葉合蘇葛湯見第六條去柴胡赤芍甘草加枳殼治之若已出大熱致鼻乾無涕者此症亦重宜以全書除熱清肺湯見五十五條加黃連地骨皮連翹牛蒡子枳殼治之或暫有而暫無涕者雖重亦可救以杏仁清肺湯去桔梗甘草加黃芩治之又有先無涕其後熱退鼻通有涕者又有因熱甚鼻外被塞乾結似無涕者以利金湯見五十條去桔梗甘草生薑陳皮加牛蒡子黃芩赤茯苓連翹治之或更加桑白皮杏仁治之以上數症總皆要氣血通暢雖凶可救醫家須宜詳察施治朱曰多涕者肺熱淺也鼻乾者肺熱深也兩言可以蔽之但傷風肺氣閉者亦多涕清肺飲杏仁貝母茯苓各一錢陳皮桔梗五味子甘草各五分水煎服聶氏第二清肺飲治麻出四五日尚有餘毒留於肺胃多咳嗽氣粗外熱不退熟石膏生地黃各一錢五分元參一錢柴胡一錢麥冬二錢陳皮六分枯黃芩酒炒當歸尾知母炒淡竹葉炒桔梗各七分殭蠶炒五條生甘草去皮三分燈心引水煎服杏仁清肺湯杏仁麥冬貝母款冬花牛蒡子桔梗甘草水煎服微汗自汗大汗無汗第五十七微汗常出熱不留初出未收總沐庥升發之味須禁用用之大泄反為仇自汗之症屬陽虛麻後見之更可危勿令見風成痙病治陰抑陽症自除發熱渾身汗最宜元府開豁麻出時衛中表邪從此散汗多亡陽又忌之壯熱無汗大非吉不因風寒因火鬱自始至末總無汗縱麻已收症百出麻有自汗微汗大汗無汗等症而均有宜有忌麻初出至未收之時皆宜微汗有微汗則皮膚通暢腠理開豁而麻易透發熱之際有自汗者則有發散之義乃為常候朱曰微汗自汗皆為美候蓋麻遇自汗則毒從汗解元府開而麻毒透衛中之表邪則從之而散矣不可遽止亦不可復用升發之劑若自汗而更升發恐汗大泄致有亡陽之患夫自汗之症原屬陽虛初時無妨若麻後自汗多成痙病切勿見風法當治陰抑陽使腹內虛熱清退而汗自止以四物湯見二十五條仍去白芍川芎加元參牡蠣粉主之如麻後自汗兼不食吐蛔者真是虛症最為難治朱曰自汗不食吐蛔又為難治之虛證亦宜以四物湯見二十五條加牡蠣藿香叉石斛用舊蒲扇或舊蒲席燒灰研細末入藥中調服若誤投藥餌傳變多端難收功矣切勿拘治麻初起常法而用辛溫解散之劑如果系脾熱可用瀉黃散去甘草因症加減而治則又可循麻初之常法矣若自汗而煩渴氣壅脈數者則以靜遠主人化斑湯加栝蔞霜主之至於大汗過多之症則有二因一因衣被蓋厚而致大汗過多者一因用升發之劑過甚而發汗過多者二者皆不宜也朱曰大汗本非正治只可偶用蓋恐大汗過多致有亡陽之變輕則症難脫體重則多有不救倘遇麻有隱暗不透之壞症從權施治而用升發之劑取其大汗使毒從汗解此特語其變而非正治也然亦多凶經曰汗多亡陽急須止之以祕本黃連湯或當歸六黃湯外用溫粉撲法治之有以人參白虎湯合古方黃連解毒湯治之者似乎未當方仍列後備用若婦人麻後汗多心慌神昏者亦有因而致不可不察有因麻症初起適遇經行麻乃火候心火旺盛榮血多虧今又月期適至血又下泄虧耗大過至麻收之後氣血兩虛未有不成汗多怔忡神昏等候朱曰麻後氣血兩虛又有汗多怔忡等證急宜以玉屏散加牡蠣粉與服以止其汗免至亡陽旋用人參養榮湯去桂心五味子多加牡蠣粉龍骨數大劑與服須宜急治遲則不救若麻症初起壯熱而無汗者多因外感風寒太重以致皮膚乾燥毛竅不開麻疹壅滯而汗亦難出多成內攻之症朱曰麻證無汗多成內攻之症寒涼降火清肺佐以升發是救急治法或肚腹脹痛或發喘促夏秋之間宜微升散以葛根解肌湯見第五條去赤芍甘草加木通枳殼治之春冬寒月重為發散如加味三拗湯去桔梗甘草或葛根疏邪湯見三十三條加炒麻黃治之但不可過劑使渾身常得微汗為妙有微汗則腠理潤澤而麻易出又有一等因熱極火鬱而無汗亦致皮膚乾燥而不活澤麻亦難出此症外必見唇舌破裂二便結澀昏沉壯熱或身痛肚腹脹疼多發喘促齁䶎痰鳴不拘何時無分遲早急用寒涼降火清肺之劑佐以升發之藥以白虎解毒湯見二十六條加地骨皮貝母元參牛蒡子前胡乾葛治之遲則恐成壞症大抵麻症常以微汗為順自始至末必以得汗為妙經曰微汗常出熱熱越而不留此之謂也若始終無汗麻難收斂後必有餘症宜用寒涼升發解毒為當瀉黃散防風四錢梔仁炒黑一錢藿香葉七分石膏五錢甘草二錢為末白湯下或用蜜同酒拌炒仍用白湯下加味三拗湯麻黃不去節三錢杏仁不去皮尖油二十粒生甘草荊芥穗桔梗水煎服靜遠主人化斑湯石膏知母元參麥冬牛蒡子連翹黃芩地骨皮淡竹葉水煎服祕本黃連湯黃連黃柏黃芩麥冬生地黃當歸生黃耆水煎加入燒蒲扇灰調服當歸六黃湯治自汗盜汗當歸生地黃熟地黃黃耆蜜炒各一錢黃芩黃連黃柏各五分水煎服溫粉撲法黃連牡蠣粉貝母各五錢粳米粉一升為末撲身上玉屏風散黃耆炙炒一兩大當歸六錢陳糯米一合炒黃色水煎服玉屏散治自汗不收氣虛表弱黃耆蜜炒防風各一兩白朮土炒五錢生薑紅棗引水煎服人參養營湯治脾經氣虛營血不足驚悸健忘寢汗發熱食少無味身倦肌瘦人參白朮土炒黃耆蜜炒炙甘草陳皮全當歸桂心各一錢熟地黃五味子蜜炒白茯苓各七分白芍藥酒炒八分遠志肉去骨甘草水煮五分生薑紅棗引水煎服人參白虎湯見六十四條黃連解毒湯見三十五條衄血諸失血第五十八毒邪並迫血離經衄流於鼻不須驚當知熱毒從茲解血去榮中毒少輕吐血便血與溺血當分熱甚和血甚熱入血室勞動火總而名為失血症鼻之衄血因內熱熾甚邪火沸騰血隨火載自肺胃上行而溢於鼻也麻疹本乎肺胃故初起及未出之先而衄血者是為順候亦發散之義也蓋麻毒從衄而解而榮中之毒則輕少矣不必遽止熱得開泄不藥而衄自已非錯經妄行之比但不宜久耳如衄血過多此為火迫經曰奪血者亡急須止之如衄血不已或有失血者俱宜清肺瀉火佐以涼血之藥治之以犀角地黃湯去白芍加荊芥穗枯黃芩主之凡初熱即見衄血者乃心火上衝煩悶其症不妨用生地黃梔子湯加枯黃芩以散心火之鬱熱而清肺已出而衄血者以加減犀角地黃茅花湯去甘草治之已出大便下血或小便溺血者或吐血衄血或二便閉澀熱渴赤痛以犀角解毒湯去赤芍治之如衄血不已急須止之以茅根湯加黃連或元參地黃湯去升麻白芍甘草加茅根黃連或茅花湯去甘草加黃連等方主之已收之後或出鼻血或失血者俱宜以加減犀角地黃茅花湯去甘草治之有用四物湯加茅根治之者凡麻症血熱及勞動火熱入血室吐血衄血發狂發黃者俱宜用犀角地黃湯去白芍加桃仁治之若正收及收後仍衄不止者以四物湯見二十五條加茅根麥冬以滋潤之然麻症衄血或便血溺血俱為失血之候須當分熱甚血甚施治熱甚者以黃連解毒湯見三十五條主之血甚者以犀角地黃湯去白芍主之朱曰衄血吐血證雖駭人一經清熱涼血便可奏功此等證豫治愈甚多故一見即胸有成竹犀角地黃湯治傷寒溫病本應發汗而不得汗內蓄血及鼻衄吐血不盡內余瘀血大便出血面黃或中脘作痛犀角生地黃酒浸另搗牡丹皮白芍各等分水煎服喜妄如狂加大黃黃芩吐血衄血者加扁柏藕汁童便脈大來遲腹不滿而自言滿者加當歸肉桂生地梔子湯治心火上衝衄血生地黃梔子葛根薄荷葉燈心引加減犀角地黃茅花湯犀角磨汁生地黃茅花丹皮枳殼黃芩梔仁連翹黃連麥冬當歸尾甘草燈心三十根引犀角解毒湯犀角黃連黃柏黃芩梔仁生地黃牡丹皮赤芍水煎服茅根湯茅根當歸生地黃山梔仁枯黃芩水煎加百草霜入藥中服元參地黃湯止痘疹衄元參生地黃丹皮梔仁升麻甘草各一錢五分白芍一錢水煎按此方均勿宜用升麻以塞上衝之源勿謂但屬陽明胃經即可用升麻也茅花湯治衄血淨茅花當歸頭牡丹皮生地黃甘草水煎服又茅花湯茅花鬱金生地黃黃芩水煎入百草霜調服元參解毒湯治衄血失血元參黃芩梔仁炒生地黃粉葛荊芥穗桔梗甘草水煎加茅根汁京墨汁對服犀角地黃湯治失血衄血便血尿血犀角升麻生地黃木通桔梗京芍甘草水煎服嘔吐第五十九毒火鬱遏胃氣傷初熱嘔吐原無妨欲吐不吐乾霍亂二者一見最難當麻症初起嘔吐亦屬常候而吐瀉交作者順乾霍亂者逆欲吐不吐者危夫麻症之有嘔吐者皆因胃間火毒不能發泄而鬱於內致傷胃氣而作也初熱而得嘔吐之症此毒未發出藥宜疏托以葛根解肌湯見第五條去赤芍甘草或葛根疏邪湯見三十三條主之正出及正收時而見嘔吐之症者是毒未盡藥宜清涼解毒少加疏散可也以消毒飲見二十二條去甘草加枳殼黃連治之多痰者加栝蔞霜貝母治之收後而仍有嘔吐者乃是餘毒留於胃脘所致脾胃虛而熱滯也宜用清涼脾胃之藥佐以分利之劑用石斛清胃散去赤芍甘草主之取此方中之陳皮扁豆藿香以止嘔吐若嘔一止而陳皮藿香葉扁豆又宜除之不可過用恐致燥害此症若不間以金石之品全用輕浮之藥其嘔難定如嘔吐不止者以竹茹湯主之如熱甚嘔吐者以解毒湯見二十六條去桔梗加竹茹枇杷葉主之朱曰嘔吐與瀉邪有向外之勢或清或散成法俱在均無足慮惟欲吐不吐者危石斛清胃散治麻後嘔吐胃虛不食熱滯石斛茯苓枳殼丹皮扁豆藿香陳皮赤芍各一錢甘草五分生薑引竹茹湯竹茹陳皮柿蒂楂肉水煎服吐痰麻後有痰胸口痰甚第六十吐痰之症有多般都緣肺胃火邪干俱宜清肺消痰火治者須作一例看吐痰之症有二有吐出而白者有吐出而成塊者皆肺胃之火未清而作也俱宜清肺消痰降火為急以杏仁清肺湯見五十六條去甘草桔梗加黃芩或以清肺飲見五十六條去五味子白桔梗甘草加麥冬黃芩知母石膏治之但清痰切勿用半夏南星等燥藥惟宜用天花粉貝母陳皮之類清肺降火宜用天門冬麥冬杏仁桑白皮黃芩黃連之類切勿用桔梗中州之品如麻後有痰而不吐痰者宜用加味二陳湯去半夏甘草加貝母栝蔞霜主之如麻後胸口痰甚者用經驗敷方或敷或揩治之朱曰因火生痰是麻證之輕者其治痰不用辛燥藥最有分寸加味二陳湯陳皮半夏白茯苓防風天麻連翹甘草水煎服經驗敷方治胸口痰甚吳茱萸炒一兩蔥白十餘寸為末以生薑自然汁和蔥白搗和作餅蒸溫敷胸上立效吐蛔蟲第六十一吐蛔之症是何因胃虛無谷蟲上行急宜施治免胃爛調養脾胃症自平麻前吐蛔乃胃熱不進穀食所致治法宜清肺解散以祕本門冬清肺湯見五十條去甘草桔梗主之若將出正出之際而吐蛔者是因胃間有熱膈上有痰蟲不能安故也患者能食則已不必用藥若欲用藥則以殺蟲丹與之在初熱未見麻時而吐蛔者與吐蛔過多而不能食者皆為胃氣虛敗必不能治然吐蛔之症多見於正收及收後之時亦因胃火燃甚多致少食蟲無所養故望上而出或三四條或五六條或十餘條而止不宜過多多則有害治當安胃為急久則胃爛難救矣以七味白朮散加烏梅再斟酌加減而治之蟲得酸則安矣如麻後熱退能食而吐蛔者宜調養脾胃庶無他變以安蛔散除胡粉白礬七味白朮散加烏梅等方治之若麻後吐蛔不食而兼自汗者真是胃虛最為難治以七味白朮散加烏梅牡蠣粉叉石斛治之如系脾熱則以瀉黃散見五十七條加烏梅牡蠣粉叉石斛治之朱曰吐蛔一證因胃熱而蟲不安者多如胃虛吐蛔七味白朮散加烏梅石斛尚為救急之法殺蟲丹生蔥一把炒食蟲即化為水七味白朮散治胃虛津氣不行而渴人參白朮炒白茯苓炙甘草藿香葉乾葛根煨木香水煎服安蛔散治吐蛔色赤成團而活屬熱者烏梅肉三錢黃連蜀椒藿香檳榔各一錢胡粉白礬各五錢為末每用三錢水煎如糊空心服吐沫音末口中汁也口中流涎不止第六十二清涕之中見白沫實為胃火旺所致治宜清胃並降火莫以白沫作寒治吐出痰中有白沫流涎不止均非虛都因胃中邪火旺急宜清胃免傾危吐沫者吐出清痰之中而有白珠是也乃是胃火旺甚所致治宜清胃降火為急宜以加味清胃散加連翹牛蒡子主之其不去升麻者蓋欲用之以開提胃熱故也然亦須斟酌而用如麻後有口中流涎不止者亦是胃火旺甚所致也宜以河間涼膈散見二十六條治之但方中有大黃芒硝須要察人之虛實強弱大小及大便之堅澀而施不可概用以誅伐無過朱曰口中流涎乃大人小兒常有之證亦有終身不愈者總由胃火旺甚所致加味清胃散治胃中蘊熱中脘作痛痛後火氣發泄必作寒熱乃止及齒齦腫痛出血疼引頭腦生地黃四錢川升麻一錢五分牡丹皮五錢當歸尾酒洗三錢川黃連酒蒸三錢防風荊芥石膏水煎服泄瀉第六十三麻初泄瀉最為宜瀉而日久須治之熱寒食冷便膿血數般當分新與遲麻症泄瀉慎勿遽止蓋麻有瀉而胃與大腸之邪熱得解是亦表裡分消之義也初熱作瀉者用豬苓湯去阿膠甘草加葛根連翹牛蒡子主之有用香蘇散者然終不若分利之為當也香蘇散方仍列若麻見二三日泄瀉者以透斑和中湯去升麻川芎柴胡桔梗半夏陳皮甘草生薑加連翹牛蒡子地骨皮主之若身熱煩渴泄瀉者用三苓散見三十七條加地骨皮黃連黃芩麥冬主之夏月用辰砂益元散去甘草治之如麻後泄瀉者以薏苡仁散去香附甘草主之麻後泄瀉及便膿血者皆由熱邪內陷故也大忌止泄惟宜用升散之藥以黃連葛根湯加扁豆滑石白芍藥數劑與服當自愈然麻症泄瀉須分新久寒熱傷食傷冷六般若初熱瀉者用三苓散加木通以重瀉心經之熱寒瀉則十中無一或有傷食傷冷而作寒瀉四肢冰冷肚腹不熱口不作渴小便不赤者不得已而用理中湯一劑止之久瀉不止者以六君子湯加肉豆蔻或香蔻丸止之如再不止用醒脾散與服或以五倍子罌粟殼燒灰用米飲調下澀之凡後數方蓋亦萬不得已從權而用切不可目為定規而濫用也朱曰泄瀉亦非重證惟不可久耳豬苓湯豬苓澤瀉赤苓滑石阿膠甘草水煎服香蘇散蘇葉陳皮白芷川芎香附米甘草生薑蔥白引透斑和中湯葛根豬苓澤瀉茯苓川芎升麻各七分前胡桔梗各一錢柴胡五分陳皮半夏各七分甘草三分生薑三片引水煎分作數次服辰砂益元散治暑月小便不利辰砂一錢桂府滑石水飛過六兩甘草一兩為細末清水調下二三錢老人虛人及病後傷津而小便不利者不宜用又治暑月發驚多汗小便澀痛兼瀉心火前方加薄荷葉少許以清肺熱名雞蘇散加青黛少許以散肝火名碧玉散加石膏少許以除胃熱名白玉散治同本方加紅曲五錢以治赤痢名清六丸加吳茱萸一兩以治濕熱吞酸一書治白痢名茱萸六一散加乾薑五錢以治白痢一書消飲食名溫六丸加生柏葉生車前生藕節以治血淋名三生益元散加蔥豉治虛煩不得眠名蔥豉益元散以水煎服則兼散表邪薏苡仁散薏苡仁淮山藥白茯苓穀麥芽白扁豆香附米山楂肉甘草水煎服黃連葛根湯黃連酒炒葛根升麻甘草水煎服理中湯人參白朮乾薑甘草水煎服一書加肉豆蔻去人參六君子湯人參白朮白茯苓炙甘草陳皮半夏紅棗姜引香蔻丸黃連炒肉豆蔻麩包煨訶子肉麩包煨去殼木香砂仁白茯苓為末飯丸麻子大米飲下十五丸醒脾散北全蠍五隻糯米拌炒白附子烏豆水浸蒸人參木香白茯苓天麻薑汁蒸石菖蒲去尾薑汁蒸炙甘草為末水調服糞溏水瀉第六十四糞溏之症不須除麻得斯候毒得舒始終糞如黃褐色雖有變症保無虞糞出有沫名水泄初熱正出見為吉久瀉氣陷恐成痢溺赤燥遏脾胃熱麻症糞溏理勢必然此肺胃之火所作而致不必施治何則火勢極則大便閉結麻本火候倘再便閉則火毒內作極矣麻出必險是以糞溏為正候初出與出時見此症其麻縱險可救正收與收後而糞溏色如黃褐者雖有變症可保無虞若水瀉之症糞色必黃而有沫小便赤口乾唇燥皆由脾胃有熱所致然麻症泄瀉熱邪得以開泄是為順候初熱未出之間水瀉者以三苓散見三十七條加葛根連翹木通滑石主之正出之時水瀉者亦以三苓散見三十七條加連翹麥冬潮熱甚者更加黃連黃芩主之古人有用人參白虎湯去知母加麥冬治之者實為不妥方仍收列夫麻泄瀉毒火因瀉而解雖曰美候然不可令其久瀉倘或久瀉不止則正氣必衰脾氣下陷凡在未發熱之前水瀉至正出之際而不止其為日已久則麻毒難以發越後則留毒為害不小宜以加味三苓散主之倘執泥毒邪得瀉而解之說縱其久瀉而不為之早治恐至麻收靨之後變成痢症或下紫紅血等症治療維艱正收及收後而水瀉者毒邪雖得瀉而盡然止宜瀉三五次不可過多若自首至尾水瀉不止者宜用清涼利水之藥而佐以升提古有用三苓散見三十七條加香白芷大麥冬治之者須當審理察宜隨機加減而施正收及收後水瀉過甚者須以理脾胃為主宜以枳實理中湯隨意消息加減而治若不急治多成腫脹便血痢疾等候至若麻後瀉痢不止口乾目閉四肢不溫與嘔吐不食洞泄不知者皆為不治之症加味三苓散治痘麻瀉甚小便紅黃豬苓木通赤苓車前子炒各七分澤瀉八分黃芩酒炒牛蒡子各五分黃連酒炒二分燈心五十寸引水煎食前服人參白虎湯治熱病舌乾大渴發熱背寒人參一錢炙甘草一錢生石膏一錢一書用五錢知母三錢糯米半合水煎分作三次溫服一日飲盡枳實理中湯治胃挾食及結胸本虛不能受攻者乾薑炒黑五分至一錢人參一錢至三錢白朮炒焦一錢至二錢枳實茯苓各一錢炙甘草五分至一錢水煎服瀉清第六十五麻症泄瀉本常候當分屬熱與屬寒瀉下清稀白沫者莫作熱候一般看麻症泄瀉本屬常候屬熱者多屬寒者少然亦有瀉下清稀白沫者其症喜溫腹疼喜按此屬寒瀉宜以胃苓湯去蒼朮少用白朮肉桂加煨姜治之不可一例而治也胃苓湯治飲食停積浮腫泄瀉脈症俱實者蒼朮米泔水浸去皮以芝麻油拌炒黃色四兩川厚朴去皮薑汁炒廣陳皮去白肉桂一錢炙甘草各三兩生白朮白茯苓堅豬苓各二錢澤瀉三錢水煎服平胃本平胃氣之敦阜若因脾土之虛不能消運又須稍借參苓如養胃湯之類然復有土衰不能分利而成腫脹且氣壅不勝參朮難合理中者宜合五苓以健運水土之正氣與假蘇藿以散客邪兩不易之定例也瀉而腹痛脹滿第六十六瀉下腹疼與脹滿噯氣穢息如敗卵飲食不節腹中停寬腸化食自安妥瀉而窘急腹痛脹滿或有噯氣如敗卵者此乃飲食不節停滯腹中宜用枳殼湯見四十九條去炙甘草加山楂肉麥芽木通治之咳嗽鼻衄嘔吐泄瀉首尾治法總論第六十七咳衄吐瀉麻之宜熱毒由斯消減時治法解毒同一例用方首尾不共施麻疹初出必要咳嗽使腠理疏通鼻衄則熱毒得以隨衄而解泄瀉則上下熱毒得出嘔吐均屬美候亦脾胃二經熱毒所致且麻出自肺胃其理只以解熱毒為主六一散至寶丹或四物湯見二十五條加黃連黃芩仍憑擇用若麻出之後而見咳嗽鼻衄吐瀉等候則又不宜用上三方俱宜以三味消毒飲見三十三條主之六一散治表裡三焦之熱解肌清燥滑石六兩甘草一兩為末燈心湯或薑湯下前方滑石四兩甘草一兩名曰天水散治痘乾燥而痛用蜜水調塗並白湯調服至寶丹又名祛風至寶丹防風荊芥連翹麻黃薄荷葉川芎當歸白芍炒梔仁炒黑大黃酒蒸芒硝各五錢枯黃芩石膏桔梗各二錢甘草二兩滑石三兩人參熟地川黃柏黃連羌活獨活天麻細辛全蠍白朮五錢為末蜜丸彈子大不拘茶酒任下一丸前方即防風通聖散此則加人參補氣熟地益血黃柏黃連除熱羌活獨活天麻細辛全蠍祛風自利去硝黃自汗去麻黃加桂枝涎嗽加薑製半夏大便祕第六十八火壅血燥津液竭大便因之而祕澀無分先後急通潤稽延日久變紫黑大便祕結者乃火壅血燥而耗精液故也麻之為候大便宜滑如黃褐色乃為正候若大便祕而不通大非所宜無論先後日期但大便祕者急當用通潤清涼之劑初時大便難通而堅結難出者宜微潤之不可過利以通幽湯去升麻甘草熟地黃加火麻仁枳實黃連治之如麻未出之初有面色或青或紅或唇紫或煩悶而大便祕而不通者宜以大承氣湯去厚朴加連翹牛蒡子防風葛根荊芥穗下之使毒從大腸經而出然後再用毒發表湯見第五條去升麻桔梗甘草以發出麻疹其症自痊若正收及收後大便不通者則宜用大通潤之劑以四順清涼飲治之甚則用河間涼膈散見二十六條以通利之若大便祕結發熱身痛者以大柴胡湯主之腹痛氣喘者以前胡枳殼湯見五十一條去炙甘草加薑汁炒芥子治之凡麻見便祕之症急宜早治慎勿遲延日久則麻變焦紫枯黑而難救矣通幽湯升清陽降濁陰治噎塞便祕油當歸二錢五分升麻醋浸三分桃仁研如泥一錢紅花生甘草炙甘草各五分熟地黃生地黃各一錢五分水煎以藥汁磨檳榔五分對藥稍熱服加火麻仁大黃名當歸潤腸湯大承氣湯大黃酒洗四錢芒硝三錢厚朴枳實各七分水煎服四順清涼飲一名四順飲當歸赤芍大黃酒蒸甘草各等分水煎入生白蜜一二匙對藥熱服大柴胡湯治表症未除里症又急汗下兼行用之柴胡一錢黃芩芍藥各三分枳實三分半夏五分大黃二分薑棗引小便赤澀第六十九膀胱餘熱小便澀火毒如何消散得無分初潮與收後三苓導赤為定格小便赤澀此裡熱甚之症也在初熱正出之時見之乃熱邪下滲是為正候麻出現時小便赤澀或淋者以三苓散見三十七條加燈心石膏葶藶射干治之若熱甚小便赤澀譫語驚恐者以導赤散見二十六條去甘草合三苓散見二十七條加辰砂主之夏月以辰砂益元散見六十三條去甘草加石膏主之若小便不利而嘔吐者以三苓散見三十三條加藿香竹茹枇杷葉治之一二日不通者以加味導赤散見四十九條主之若於正收及收後而見小便不通者是內有熱毒不得消散而餘熱下匿膀胱用導赤散見二十六條加麥冬或用加味導赤散見四十九條以滋氣化導利而小便仍不通者必因大便祕郁之故速宜通利大便以通幽湯見六十八條去升麻熟地甘草加枳殼丑牛合導赤散見二十六條治之大便一通而小便自利矣大小便不通第七十麻疹二便閉不通邪火熾甚在其中通關涼膈利臟腑管取一服見奇功麻疹自出至收總宜大小便滑利二便俱不宜祕祕則急宜通利若麻症有大小便俱不通者是火邪內熾之極宜以河間涼膈散見二十六條去甘草加牛蒡車前木通治之甚則以通關散去甘草人參八正散去甘草治之通關散通心經利小便良方梔仁炒大黃酒蒸各一錢木通赤茯苓車前子炒瞿麥滑石萹蓄炒人參甘草各三五分燈心十根引八正散治濕熱下注口渴咽乾淋痛尿血小腹急滿木通瞿麥車前子梔仁大黃滑石萹蓄甘草梢燈心引木通瞿麥燈心入小腸而降心火車前入膀胱而瀉肝火山梔仁瀉三焦之鬱火大黃滑石乃瀉火利水之捷藥萹蓄利水止痛甘草梢入莖止痛雖治下焦而不專治下焦必三焦通利水方能下行也一書加木香吐利並作下滯裡急後重脫肛第七十一發熱之時吐利並任他吐利不須驚胞胎蓄毒從斯解腸胃停汙自此清發熱蒸蒸吐利並或時滯下作腸鳴火邪內迫宜清解法向時行麻症尋自利甚時多變更裡急後重症隨生須為通利泄其毒若犯澀劑病更增麻症脫肛何所因火邪內迫後重成升提清熱是神手若作氣虛定傷人久瀉脫肛氣血虛治法不可一例拘養血升提成妙用破滯用下更增危麻本胎毒發熱之時吐利並作毒火因之而解此為美候如吐利並作或時下滯或作腸鳴亦是火邪內迫而然純是熱候不可作寒而治治法總宜清解依麻科憑症施治庶保無虞如上焦火甚者則吐下焦火甚者則瀉中焦火甚者則吐瀉並作朱曰此三句抉出吐瀉之因自利甚者則必見裡急後重而為滯下矣如見裡急後重之症而病者不耐猛力下氣催便而脫肛之症又勢所必致也如麻發熱之時吐多者以竹茹石膏湯去半夏加柿蒂主之自利甚者以祕本豬苓湯去升麻甘草分利之發熱時吐利並作者以三苓散見三十七條加竹茹柿蒂滑石主之朱曰柿蒂斂內蘊之熱既有竹茹石膏以清熱更加柿蒂以斂之止吐自速下滯以加味黃芩湯去白芍藥甘草加枳實連翹牛蒡子青皮以治之麻收後熱毒未曾解盡有下積滯者當以連石茱萸丸去升麻乾葛甘草白芍藥加枳殼山楂肉麥芽青皮治之但方中茱萸若非陰寒膈寒而挾有熱者亦須除去愚按下積滯之症非僅麻收後有之即將出正出之時亦常有見者愚謂不拘先後但麻見有下積者則當以清熱導滯湯見七十二條去白芍藥厚朴甘草當歸淡竹葉加山楂肉麥芽治之更為妥當自利甚而變為裡急後重者以黃連解毒湯見三十五條加連翹牛蒡子青皮治之若小便短少者更加木通滑石治之如裡急甚者則當加半生半炒黑白丑牛以利之或以銅壁山人黃芩湯去人參赤芍甘草加連翹牛蒡子丑牛以利之或以加味黃芩湯去白芍甘草加枳實木通連翹牛蒡子丑牛以利之若夫脫肛之症多見於將收已收之後而治法有不可一例者若因毒火內迫大腸枯澀肺金受傷不能傳送致成裡急後重之症而病者難忍不耐用力送氣催便以冀稍松適肛脫出不可認作氣虛施治治法總宜清熱解毒導利行滯瀉火清金兼用升提之品以加味導赤散去薄荷淡竹葉加當歸尾潤腸胃破惡血而養心血牛蒡子以消毒枯黃芩瀉肺火以涼肺血枳殼以破氣滯滑石通利六腑九竅以蕩熱散濕上五味各八分丑牛四五分以除壅滯丹皮四五分以開陷伏之邪使之外散升麻五六分以升散大腸胃膽三焦之火熱如兼有潮熱者加鮮地骨皮二三錢治之若因久瀉而脫肛者亦以加味導赤散去薄荷竹葉加當歸身錢許川芎錢許升麻六七分以養血理氣升散大腸胃膽三焦之火熱而枳殼丑牛又不宜概用矣朱曰麻證脫肛與氣虛脫肛不同所示清熱解毒諸法允為合拍竹茹石膏湯竹茹石膏黃芩陳皮半夏水煎服祕本豬苓湯治泄豬苓澤瀉滑石赤茯苓黃連升麻甘草燈心引水煎服並治病人用力催便脫肛加味黃芩湯黃連黃芩各一錢五分滑石白芍各三錢甘草七分水煎服血痢加地榆皮二錢連石茱萸丸黃連酒炒滑石飛過各一兩黃芩乾葛白芍各八分茱萸一兩升麻七分甘草四分為末以山藥研粉作糊合丸梧子大食遠用白湯送下三五錢銅壁山人黃芩湯治裡急後重黃芩黃連生地黃木通枳殼當歸尾赤芍藥人參甘草三劑水煎服初劑加大黃微利之加味導赤散生地黃酒洗一錢五分川木通川元參各五分連翹六分川黃連六分薄荷葉四分淡竹葉七分燈心引水煎服痢症第七十二熱邪內陷因成痢憑症進劑莫雷同用心調理起沉痼勿輕劫澀圖霸功麻之成痢乃熱邪內陷所致多見於正收及收後間有見於初熱未出及正出之時者亦有自首至尾而作痢不輒者又有因久瀉而成痢者當分別治療不可混施若於初熱未出與正出之時而作痢者藥宜以疏托為君行滯氣為臣為佐解毒為使以葛根解肌湯見第五條少用葛根去赤芍蟬蛻木通甘草略加青皮檳榔再加防風主之若麻已出透身熱未全退毒氣流注而成痢者以清熱導滯湯去白芍楂肉甘草川厚朴加生地黃地骨皮木通主之若麻毒未清變成赤白痢者以加減黃芩湯去白芍楂肉甘草加黑地榆連翹牛蒡子主之如麻後成痢赤白腹痛者以古方黃芩湯加枳殼治之亦有久瀉而成痢者原因氣血已虛不得已用人參黃連枯黃芩乾薑煎湯從權治之如正收及收後而下痢白色者藥宜用解毒涼血行滯氣之品以靜遠主人黃芩湯除去人參木香甘草加生地黃牛蒡子連翹防風主之痢下膿血者以白頭翁湯去黃柏加防風主之或因食積下滯者以消食化氣為主用枳殼湯見四十九條去甘草加山楂麥芽木通青皮主之若腹中作脹時痛時止者以厚朴湯去乾薑甘草加檳榔山楂主之夫麻後成痢乃積熱移於大腸以治麻後痢統方加減主之有以三苓散見三十七條加木通枯黃芩治之者麻後下痢而身熱腹痛者以古方黃連解毒湯見三十五條治之若壯盛之人內有挾食積滯能食者以三黃丸見四十八條利之若麻後赤痢以四物湯見二十五條合古方黃連解毒湯見三十五條去梔仁加當歸尾枳殼治之稍輕者以四物湯見二十五條加薑汁炒黃連地榆治之如麻後白痢以四物湯見二十五條加陳皮茯苓木香更有加生白朮者須宜酌用麻後作痢如兼小便赤澀者以四物湯見二十五條加車前子木通治之麻後痢症或赤或白者以四物湯見二十五條倍白芍當歸加大黃少許以利瀉數次麻後泄瀉成痢者以四物湯見二十五條加地骨皮酒炒黃芩主之若麻前已經泄瀉日久未曾清解至於麻後變為休息痢不問赤白但見裡急後重晝夜無停者此餘毒在大腸乃積熱移於大腸也急宜行氣養血切不可妄施澀劑以圖霸功河間曰養血而痢自止行氣則後重自除誠格言也宜以河間治久痢方去人參白芍藥主之有用古方黃芩湯合天水與香蔻丸見六十三條相間服者有用靜遠主人黃芩湯送下香蔻丸體虛者香蔻丸內更加人參腸滑者香蔻丸內加榆根白皮治之者實不若河間治久痢方之為當也如自首至尾輒痢不輟者必有風毒留滯於內宜解毒行滯而兼疏風實脾之劑庶幾立應以清熱導滯湯去當歸淡竹葉加防風荊芥治之有用四君子湯加山藥吳茱萸治之者猛而有理方並列後若痢而兼嘔吐噤口不食更腸滑不止或下鮮血或下紫黯色或下如癰膿或下如屋漏水或下如雞肝色如黑豆汁之類兼之氣喘煩渴熱甚發厄麻色紫晦者皆不治之症朱曰治痢不外數法曰清熱曰行滯曰養血曰涼血有外感者兼解表有宿食者兼消導至於日久氣虛無妨補氣陰血虧損亦可養陰惟麻證則必加以解毒清熱導滯湯黃連酒炒檳榔黃芩酒炒生白芍枳殼曲炒厚朴薑汁炒陳皮各七分青皮甘草各三分連翹牛蒡子炒研各八分楂肉當歸淡竹葉各一錢燈心五十寸引水煎加犀角末三分調服紅多者加紅花二分地榆桃仁酒炒各八分閉澀甚者與裡急後重之極者加酒炒大黃八分加減黃芩湯黃芩黃連當歸枳殼檳榔青皮澤瀉山楂槐花白芍甘草燈心引古方黃芩湯治伏氣發溢小腸膀胱三焦膽腑合病自痢黃芩一錢五分白芍六分炙甘草一錢大棗二枚引加半夏二錢名黃芩加半夏湯生薑引人參黃芩黃連乾薑湯治胃虛客熱痞滿人參黃芩黃連炮乾薑各二錢水煎溫服靜遠主人黃芩湯黃芩黃連當歸枳殼檳榔青皮川芎木香人參甘草水煎調六一散服白頭翁湯治熱痢下重白頭翁黃連黃柏秦皮各等分水煎溫服不愈再服厚朴湯治脾胃虛作脹腹中時痛時止厚朴薑汁炒陳皮去白茯苓乾薑炙甘草水煎服治麻後痢統方黃連酒炒黃芩酒炒麥冬防風天花粉元參枳殼牛蒡子木通梔仁滑石桔梗赤芍鉤藤鉤甘草二劑水煎服不愈加豬苓青皮河間治久痢方當歸白茯苓黃芩車前子陳皮人參白芍藥甘草炮乾薑少許為引水煎服四君子湯人參白朮土炒白茯苓甘草紅棗姜引附治麻後痢丹方西河柳為末以砂糖水調服四錢附萬氏治麻後痢下鮮血驗方當歸尾生地黃條子芩黃連酒炒枳殼炒烏梅肉人參白芍生甘草水煎服下蛔蟲第七十三上膈胃火盛少食蛔上不安往下行此候不須用方藥調其餘食症自平下蛔之症多見於麻收之後乃上膈及胃火壯盛少食蟲不能上安而往下行蟲往下行亦順症也與過食傷中蟲不能容而下不同但調其飲食自愈非若口中吐蟲之比耳不須施治朱曰下蛔為小兒常有之證故可勿治
